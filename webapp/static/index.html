<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>ClaudeFormula 2.0</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
  :root{
    --bg:#000000; --surface-0:#141414; --surface-1:#1C1C1E; --surface-2:#242426;
    --text:#FFFFFF; --text-secondary:#9A9A9E; --text-muted:#6C6C70;
    --border:rgba(255,255,255,0.08); --accent:#FFFFFF; --green:#33D17A; --red:#FF453A;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html{height:100%}
  html,body{margin:0}
  body{
    min-height:100%;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",Segoe UI,Roboto,sans-serif;
    background:var(--bg); color:var(--text);
    padding-bottom:calc(110px + env(safe-area-inset-bottom));
    -webkit-font-smoothing:antialiased;
  }
  .container{max-width:460px;margin:0 auto}
  .topbar{padding:18px 18px 6px;display:flex;justify-content:space-between;align-items:flex-start}
  .topbar h1{font-size:20px;font-weight:600;margin:0}
  .topbar p{font-size:12px;color:var(--text-secondary);margin:2px 0 0}
  .bell{width:36px;height:36px;border-radius:50%;background:var(--surface-1);display:flex;align-items:center;justify-content:center}
  .bell i{font-size:17px}
  .back-header{padding:14px 16px;display:flex;align-items:center;gap:12px}
  .back-header .back{width:32px;height:32px;border-radius:50%;background:var(--surface-1);display:flex;align-items:center;justify-content:center}
  .back-header .back i{font-size:16px}
  .back-header span{font-size:16px;font-weight:600}

  .content{padding:12px 16px 8px}
  .page-title{font-size:20px;font-weight:600;margin:0 0 14px}
  .label{font-size:12px;color:var(--text-muted);margin:0 0 6px;font-weight:500}
  .section-label{font-size:13px;color:var(--text-secondary);margin:16px 2px 8px;font-weight:500;display:flex;justify-content:space-between;align-items:center}
  .section-label .more{color:var(--text-muted);font-size:12px;font-weight:500}

  .hero-card{background:var(--surface-1);border-radius:20px;padding:18px;margin-top:4px}
  .hero-card .row1{display:flex;justify-content:space-between;align-items:center}
  .hero-card .lbl{font-size:13px;color:var(--text-secondary);margin:0}
  .hero-card .pill{background:rgba(51,209,122,0.15);color:var(--green);font-size:12px;font-weight:600;padding:3px 9px;border-radius:20px}
  .hero-card .amount-row{display:flex;align-items:baseline;gap:8px;margin-top:2px}
  .hero-card .amount{font-size:34px;font-weight:700;margin:0;letter-spacing:-0.02em}
  .hero-card .sub{font-size:12px;color:var(--text-muted);margin:4px 0 0}
  .spark{display:flex;align-items:flex-end;gap:4px;height:36px;margin-top:16px}
  .spark .bar{flex:1;background:var(--border-strong,rgba(255,255,255,0.15));border-radius:3px;min-height:4px}
  .spark .bar.today{background:var(--accent)}
  .spark-labels{display:flex;justify-content:space-between;margin-top:6px}
  .spark-labels span{font-size:10px;color:var(--text-muted);flex:1;text-align:center}
  .spark-labels span.today{color:var(--text)}

  .avatar-row{display:flex;gap:14px;overflow-x:auto;padding-bottom:2px}
  .avatar-row .av{text-align:center;flex-shrink:0}
  .avatar-row .circle{width:44px;height:44px;border-radius:50%;background:var(--surface-1);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;margin:0 auto 4px}
  .avatar-row .circle.more{border:1px dashed var(--border-strong,var(--text-muted));background:none;font-size:16px}
  .avatar-row p{font-size:10px;color:var(--text-secondary);margin:0;max-width:48px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  .card{border:0.5px solid var(--border);border-radius:16px;overflow:hidden;background:var(--surface-1)}
  .card + .card{margin-top:14px}
  .card-pad{padding:14px 16px}

  .row{display:flex;justify-content:space-between;align-items:center;padding:13px 14px}
  .row + .row{border-top:0.5px solid var(--border)}
  .row .name{font-size:14px;font-weight:500;margin:0;display:flex;align-items:center;gap:10px}
  .row .sub{font-size:12px;color:var(--text-muted);margin:2px 0 0}
  .row .price{font-size:14px;font-weight:600;margin:0}
  .row .meta{text-align:right}
  .row.link{cursor:pointer}
  .row.link:active{background:var(--surface-2)}
  .row .chevron{color:var(--text-muted);font-size:16px}
  .row .icon-badge{width:20px;text-align:center;color:var(--text-secondary)}

  .stat2{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:14px}
  .stat2 .box{background:var(--surface-1);border-radius:16px;padding:12px 14px}
  .stat2 .box span{font-size:11px;color:var(--text-muted);display:block;margin-bottom:3px}
  .stat2 .box b{font-size:18px;font-weight:600;display:block}

  .quick3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px}
  .quick3 .box{background:var(--surface-1);border-radius:16px;padding:14px 6px;text-align:center;cursor:pointer}
  .quick3 .box i{font-size:20px;margin-bottom:6px;display:block}
  .quick3 .box span{font-size:11px;color:var(--text-secondary)}

  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
  .stat-card{background:var(--surface-1);border-radius:16px;padding:14px 16px}
  .stat-card p:first-child{font-size:12px;color:var(--text-secondary);margin:0 0 6px}
  .stat-card p:last-child{font-size:19px;font-weight:600;margin:0}

  button{font-family:inherit;cursor:pointer}
  .btn{width:100%;background:#fff;color:#000;border:none;border-radius:14px;height:50px;font-size:15px;font-weight:600;margin-top:8px}
  .btn:active{opacity:0.75}
  .btn.secondary{background:var(--surface-1);color:#fff}
  .btn.ghost{background:transparent;color:var(--text-secondary);border:0.5px solid var(--border)}

  select,input,textarea{width:100%;padding:14px;border-radius:14px;border:none;background:var(--surface-1);color:var(--text);font-size:15px;margin-bottom:12px;-webkit-appearance:none;appearance:none}
  select:focus,input:focus,textarea:focus{outline:1px solid rgba(255,255,255,0.3)}
  textarea{resize:none;min-height:70px;font-family:inherit}
  ::placeholder{color:var(--text-muted)}

  .field-select{position:relative}
  .field-select select{padding-right:36px}
  .field-select::after{content:"";position:absolute;right:14px;top:50%;transform:translateY(-60%) rotate(45deg);width:7px;height:7px;border-right:1.5px solid var(--text-muted);border-bottom:1.5px solid var(--text-muted);pointer-events:none}

  .chip-label{display:flex;justify-content:space-between;align-items:center;padding:13px 14px;cursor:pointer;transition:background .12s}
  .chip-label + .chip-label{border-top:0.5px solid var(--border)}
  .chip-label.active{background:var(--surface-2)}
  .chip-label .l{font-size:14px}
  .chip-label .r{display:flex;align-items:center;gap:10px}
  .chip-label .p{font-size:13px;color:var(--text-secondary)}
  .tick{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;color:transparent;flex-shrink:0}
  .tick.on{background:var(--accent);border-color:var(--accent);color:var(--bg)}
  input[type=checkbox]{width:18px;height:18px;margin:0;accent-color:#fff}

  .del{color:var(--red);font-size:12px;font-weight:500}
  .empty{color:var(--text-muted);font-size:14px;text-align:center;padding:32px 16px}
  .skeleton{background:var(--surface-1);border-radius:16px;height:56px;margin-bottom:10px;animation:pulse 1.2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}

  .branch-pick{width:100%;text-align:left;background:var(--surface-1);border:none;border-radius:16px;padding:16px;font-size:15px;font-weight:500;margin-bottom:10px;color:var(--text);display:flex;justify-content:space-between;align-items:center}
  .branch-pick:active{opacity:0.7}

  .avatar{width:30px;height:30px;border-radius:50%;background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}
  .avatar.lg{width:64px;height:64px;font-size:22px;margin:0 auto}

  .tabbar{position:fixed;bottom:0;left:0;right:0;display:flex;background:rgba(20,20,20,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:0.5px solid var(--border);padding-bottom:env(safe-area-inset-bottom);max-width:460px;margin:0 auto}
  .tab{flex:1;text-align:center;padding:10px 0 6px;font-size:10px;color:var(--text-muted);font-weight:500}
  .tab.active{color:#fff}
  .tab i{font-size:20px;display:block;margin-bottom:2px}
  .hidden{display:none}

  .segmented{display:flex;background:var(--surface-1);border-radius:12px;padding:3px;margin-bottom:14px}
  .segmented .seg{flex:1;text-align:center;padding:8px 0;font-size:13px;font-weight:600;color:var(--text-secondary);border-radius:10px}
  .segmented .seg.active{background:#fff;color:#000}

  .donut-wrap{display:flex;align-items:center;gap:20px;padding:18px 16px}
  .donut{width:120px;height:120px;border-radius:50%;flex-shrink:0;position:relative;display:flex;align-items:center;justify-content:center}
  .donut::after{content:"";position:absolute;inset:14px;background:var(--surface-1);border-radius:50%}
  .donut .center{position:relative;z-index:1;text-align:center}
  .donut .center b{font-size:15px;display:block}
  .donut .center span{font-size:10px;color:var(--text-muted)}
  .legend{flex:1}
  .legend .item{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12px}
  .legend .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .legend .item b{margin-left:auto;font-weight:600}
</style>
</head>
<body>

<div class="container">
  <div id="view-home"></div>
  <div id="view-add" class="hidden"></div>
  <div id="view-reports" class="hidden"></div>
  <div id="view-workers" class="hidden"></div>
  <div id="view-settings" class="hidden"></div>
</div>

<div class="tabbar">
  <div class="tab active" data-tab="home"><i class="ti ti-home"></i>Главная</div>
  <div class="tab" data-tab="reports"><i class="ti ti-chart-bar"></i>Отчёты</div>
  <div class="tab" data-tab="workers"><i class="ti ti-users"></i>Мойщики</div>
  <div class="tab" data-tab="settings"><i class="ti ti-settings"></i>Настройки</div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready(); tg.expand();
try{ tg.setHeaderColor("#000000"); tg.setBackgroundColor("#000000"); }catch(e){}

window.addEventListener("error", (e) => {
  const el = document.getElementById("view-home");
  if (el && !el.innerHTML.trim()) {
    el.innerHTML = `<div class="content"><p class="empty">Ошибка загрузки: ${e.message || "неизвестная"}<br><button class="btn secondary" onclick="location.reload()">Обновить</button></p></div>`;
  }
});

const API = "";
const initData = tg.initData || "";
const headers = { "Content-Type": "application/json", "X-Init-Data": initData };

let CFG = null;
let ME = null;
let BRANCH = (tg.initDataUnsafe?.start_param) || null;
let selectedServices = [];
let customServices = [];

async function api(path, opts = {}) {
  const res = await fetch(API + path, { ...opts, headers: { ...headers, ...(opts.headers||{}) } });
  if (!res.ok) { tg.showAlert("Ошибка: " + (await res.text())); throw new Error("api"); }
  const ct = res.headers.get("content-type") || "";
  return ct.includes("application/json") ? res.json() : res;
}
function fmt(n){ return (n||0).toLocaleString("ru-RU") + " ₽"; }
function haptic(type="light"){ try{ tg.HapticFeedback.impactOccurred(type); }catch(e){} }
function initials(name){ return (name||"?").trim().split(/\s+/).map(w=>w[0]).slice(0,2).join("").toUpperCase(); }
function paymentLabel(c){
  if (c.payment_split) return Object.entries(c.payment_split).map(([k,v]) => `${k} ${v}₽`).join(" + ");
  return c.payment;
}
const AVATAR_COLORS = ["#FF9F0A","#FF453A","#33D17A","#0A84FF","#BF5AF2","#64D2FF","#FFD60A"];
function avatarColor(name){ let h=0; for(const c of (name||"")) h=(h*31+c.charCodeAt(0))>>>0; return AVATAR_COLORS[h%AVATAR_COLORS.length]; }

document.querySelectorAll(".tab").forEach(t => t.addEventListener("click", () => { haptic(); switchTab(t.dataset.tab); }));
function switchTab(name){
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.tab === name));
  document.querySelectorAll("[id^=view-]").forEach(v => v.classList.add("hidden"));
  document.getElementById("view-" + name).classList.remove("hidden");
  if (name === "home") renderHome();
  if (name === "add") renderAdd();
  if (name === "reports") renderReports();
  if (name === "workers") renderWorkers();
  if (name === "settings") renderSettings();
}
function skeleton(n=3){ return `<div class="content">` + Array(n).fill('<div class="skeleton"></div>').join("") + `</div>`; }
async function ensureMe(){ ME = ME || await api(`/api/me?branch=${encodeURIComponent(BRANCH||"")}`); return ME; }

async function ensureBranch() {
  if (BRANCH) return;
  const el = document.getElementById("view-home");
  el.innerHTML = `<div class="topbar"><div><h1>ClaudeFormula 2.0</h1><p>управление автомойкой</p></div></div>${skeleton(3)}`;
  try {
    CFG = CFG || await api("/api/config");
  } catch (e) {
    el.innerHTML = `<div class="topbar"><div><h1>ClaudeFormula 2.0</h1></div></div><div class="content"><p class="empty">Не удалось связаться с сервером.<br>Проверь подключение и перезапусти приложение.</p><button class="btn secondary" onclick="location.reload()">Обновить</button></div>`;
    return;
  }
  el.innerHTML = `<div class="content"><p class="page-title">Выбери филиал</p>` + CFG.branches.map(b =>
    `<button class="branch-pick" onclick="pickBranch('${b}')">${b}<i class="ti ti-chevron-right" style="color:var(--text-muted)"></i></button>`).join("") + `</div>`;
}
window.pickBranch = (b) => { BRANCH = b; ME = null; haptic("medium"); switchTab("home"); };

// ── ГЛАВНАЯ ──────────────────────────────────────────────────────────────
async function renderHome(){
  if (!BRANCH) return ensureBranch();
  const el = document.getElementById("view-home");
  el.innerHTML = `<div class="topbar"><div><h1>ClaudeFormula 2.0</h1><p>управление автомойкой</p></div><div class="bell"><i class="ti ti-bell"></i></div></div>${skeleton(3)}`;
  const { session, summary } = await api(`/api/session?branch=${encodeURIComponent(BRANCH)}`);
  const { workers } = await api(`/api/workers?branch=${encodeURIComponent(BRANCH)}`);
  const week = await api(`/api/reports/week?branch=${encodeURIComponent(BRANCH)}`).catch(() => ({ grand_total: 0, days: [] }));
  const totalSalary = Object.values(summary.washer_salaries || {}).reduce((a,b)=>a+b,0);

  const dayLetters = ["Пн","Вт","Ср","Чт","Пт","Сб","Вс"];
  const now = new Date();
  const todayIdx = (now.getDay() + 6) % 7;
  const byDate = {};
  (week.days || []).forEach(d => { byDate[d.date] = d.total; });
  const weekTotals = [];
  for (let i = 0; i <= todayIdx; i++) {
    const dt = new Date(now); dt.setDate(now.getDate() - (todayIdx - i));
    const key = dt.toLocaleDateString("ru-RU").split(".").map((p,idx)=>idx<2?p.padStart(2,"0"):p).join(".");
    weekTotals.push(byDate[key] || 0);
  }
  const maxVal = Math.max(1, ...weekTotals);
  const bars = dayLetters.map((_, i) => {
    if (i > todayIdx) return `<div class="bar" style="height:4px;opacity:0.25"></div>`;
    const v = weekTotals[i] || 0;
    const h = Math.max(6, Math.round((v / maxVal) * 36));
    return `<div class="bar ${i===todayIdx?'today':''}" style="height:${h}px"></div>`;
  }).join("");
  const labels = dayLetters.map((d,i) => `<span class="${i===todayIdx?'today':''}">${d}</span>`).join("");

  const prevAvg = weekTotals.slice(0, -1).reduce((a,b)=>a+b,0) / Math.max(1, weekTotals.length - 1);
  const trendPct = prevAvg > 0 ? Math.round(((summary.total - prevAvg) / prevAvg) * 100) : null;
  const trendPill = trendPct === null ? "" :
    `<span class="pill" style="${trendPct < 0 ? 'background:rgba(255,69,58,0.15);color:var(--red)' : ''}">${trendPct >= 0 ? '+' : ''}${trendPct}%</span>`;

  const avatars = workers.slice(0, 4).map(w =>
    `<div class="av"><div class="circle">${initials(w)}</div><p>${w}</p></div>`).join("");
  const moreAvatar = workers.length > 4
    ? `<div class="av"><div class="circle more" onclick="switchTab('workers')"><i class="ti ti-dots"></i></div><p>Ещё</p></div>`
    : `<div class="av"><div class="circle more" onclick="uiAddWorker()"><i class="ti ti-plus"></i></div><p>Ещё</p></div>`;

  el.innerHTML = `
    <div class="topbar"><div><h1>ClaudeFormula 2.0</h1><p>управление автомойкой</p></div><div class="bell" onclick="switchTab('settings')"><i class="ti ti-bell"></i></div></div>
    <div class="content">
      <div class="hero-card">
        <div class="row1"><p class="lbl">Касса сегодня</p></div>
        <div class="amount-row"><p class="amount">${fmt(summary.total)}</p>${trendPill}</div>
        <p class="sub">${BRANCH} · ${session.date || ""}</p>
        <div class="spark">${bars}</div>
        <div class="spark-labels">${labels}</div>
      </div>
      <div class="stat2">
        <div class="box"><span>Машин сегодня</span><b>${session.cars.length}</b></div>
        <div class="box"><span>В выплате</span><b>${totalSalary.toLocaleString("ru-RU")}₽</b></div>
      </div>
      <p class="section-label">Мойщики сегодня</p>
      <div class="avatar-row">${avatars}${moreAvatar}</div>
      <p class="section-label">Быстрые действия</p>
      <div class="quick3">
        <div class="box" onclick="switchTab('add')"><i class="ti ti-square-rounded-plus"></i><span>Новая машина</span></div>
        <div class="box" onclick="switchTab('reports')"><i class="ti ti-chart-bar"></i><span>Отчёты</span></div>
        <div class="box" onclick="switchTab('workers')"><i class="ti ti-users"></i><span>Мойщики</span></div>
      </div>
      <div class="section-label">Последние машины<span class="more" onclick="switchTab('all-cars')">Смотреть все</span></div>
      <div class="card">
        ${session.cars.length ? session.cars.slice().reverse().slice(0,6).map(c => `
          <div class="row"><div><p class="name">${c.car || "Машина"} · ${c.service}</p><p class="sub">${c.employee} · ${paymentLabel(c)}</p></div>
          <p class="price">${fmt(c.price)}</p></div>`).join("") : `<p class="empty">Машин пока нет</p>`}
      </div>
      <button class="btn secondary" style="margin-top:16px;margin-bottom:28px" onclick="startNewDay()">Закрыть смену / новый день</button>
    </div>`;
}
window.startNewDay = async () => {
  tg.showConfirm("Закрыть смену и начать новый день? Текущая касса уйдёт в архив.", async (ok) => {
    if (!ok) return;
    try { await api(`/api/newday?branch=${encodeURIComponent(BRANCH)}`, { method: "POST" }); }
    catch(e){ return; }
    haptic("medium"); renderHome();
  });
};
window.downloadPdf = () => { window.open(`/api/reports/pdf?branch=${encodeURIComponent(BRANCH)}`, "_blank"); };
window.delCar = async (num) => {
  tg.showConfirm("Удалить машину?", async (ok) => {
    if (!ok) return;
    haptic("medium");
    await api(`/api/car/${encodeURIComponent(BRANCH)}/${num}`, { method: "DELETE" });
    switchTab("home");
  });
};

// ── ДОБАВЛЕНИЕ МАШИНЫ ────────────────────────────────────────────────────
async function renderAdd(){
  const el = document.getElementById("view-add");
  if (!BRANCH) { el.innerHTML = `<div class="content"><p class="empty">Сначала выбери филиал</p></div>`; return; }
  CFG = CFG || await api("/api/config");
  const { workers } = await api(`/api/workers?branch=${encodeURIComponent(BRANCH)}`);
  selectedServices = []; customServices = [];

  el.innerHTML = `
    <div class="back-header"><div class="back" onclick="switchTab('home')"><i class="ti ti-chevron-left"></i></div><span>Новая машина</span></div>
    <div class="content">
      <p class="label">Марка машины</p>
      <input id="f-car" placeholder="Camry">
      <p class="label">Тип кузова</p>
      <div class="field-select"><select id="f-body">${CFG.body_types.map(b => `<option value="${b.key}">${b.name}</option>`).join("")}</select></div>
      <p class="label">Услуги</p>
      <div id="f-services" class="card"></div>
      <button class="btn ghost" onclick="addCustomService()"><i class="ti ti-plus"></i> Своя услуга</button>
      <div id="f-custom"></div>
      <p class="label" style="margin-top:12px">Мойщик</p>
      <div class="field-select"><select id="f-emp">${workers.length ? workers.map(w => `<option>${w}</option>`).join("") : `<option value="">Нет сотрудников</option>`}</select></div>
      <p class="label">Способ оплаты</p>
      <div class="field-select"><select id="f-payment">${CFG.payment_types.map(p => `<option>${p}</option>`).join("")}</select></div>
      <div class="chip-label" style="background:var(--surface-1);border-radius:14px;margin-bottom:12px" onclick="toggleSplitRow()">
        <span class="l">Раздельная оплата</span>
        <input type="checkbox" id="f-split-toggle" style="pointer-events:none">
      </div>
      <div id="f-split-wrap"></div>
      <p class="label">Комментарий</p>
      <textarea id="f-comment" placeholder="Комментарий (необязательно)"></textarea>
      <div class="card card-pad" style="display:flex;justify-content:space-between;align-items:baseline">
        <span style="font-size:14px;color:var(--text-secondary)">Стоимость</span>
        <span style="font-size:24px;font-weight:700" id="f-total">0 ₽</span>
      </div>
      <button class="btn" style="margin-bottom:24px" onclick="submitCar()">Добавить машину</button>
    </div>`;
  renderServiceChips();
  document.getElementById("f-body").addEventListener("change", renderServiceChips);
}
function renderServiceChips(){
  const bodyType = document.getElementById("f-body").value;
  const wrap = document.getElementById("f-services");
  wrap.innerHTML = CFG.services.map((s, i) => {
    const price = s.prices[bodyType] ?? Object.values(s.prices)[0];
    const active = selectedServices.includes(s.key);
    return `<div class="chip-label ${active ? 'active' : ''}" data-key="${s.key}" onclick="toggleService('${s.key}')">
      <span class="l">${s.name}</span>
      <span class="r"><span class="p">${price}₽</span><span class="tick ${active ? 'on' : ''}">✓</span></span>
    </div>`;
  }).join("");
  updateTotal();
}
window.toggleService = (key) => {
  haptic();
  selectedServices = selectedServices.includes(key) ? selectedServices.filter(k=>k!==key) : [...selectedServices, key];
  renderServiceChips();
};
window.addCustomService = () => {
  const name = window.prompt("Название услуги:");
  if (!name) return;
  const price = parseInt(window.prompt("Цена (₽):", "1000") || "0", 10);
  const percent = parseFloat(window.prompt("Процент мойщику (%):", "30") || "30");
  customServices.push({ name, price, percent });
  renderCustomList();
};
function renderCustomList(){
  const wrap = document.getElementById("f-custom");
  if (!customServices.length) { wrap.innerHTML = ""; updateTotal(); return; }
  wrap.innerHTML = `<div class="card" style="margin-top:10px">` + customServices.map((c,i) => `
    <div class="row"><div><p class="name">${c.name}</p><p class="sub">${c.percent}% мойщику</p></div>
    <div class="meta"><p class="price">${c.price}₽</p><span class="del" onclick="removeCustom(${i})">Убрать</span></div></div>
  `).join("") + `</div>`;
  updateTotal();
}
window.removeCustom = (i) => { customServices.splice(i,1); renderCustomList(); };
window.toggleSplitRow = () => {
  const cb = document.getElementById("f-split-toggle");
  cb.checked = !cb.checked;
  haptic();
  toggleSplit();
};
window.toggleSplit = () => {
  const on = document.getElementById("f-split-toggle").checked;
  document.getElementById("f-payment").disabled = on;
  renderSplitInputs();
};
function renderSplitInputs(){
  const wrap = document.getElementById("f-split-wrap");
  const on = document.getElementById("f-split-toggle").checked;
  if (!on) { wrap.innerHTML = ""; return; }
  wrap.innerHTML = `
    <div class="card card-pad">
      ${CFG.payment_types.map(p => `
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <span style="font-size:14px">${p}</span>
          <input type="number" inputmode="numeric" class="split-input" data-method="${p}" placeholder="0" style="width:110px;margin:0;text-align:right" oninput="updateTotal()">
        </div>`).join("")}
      <p class="sub" id="f-split-hint" style="margin:4px 0 0"></p>
    </div>`;
  updateTotal();
}
function getSplitValues(){
  return [...document.querySelectorAll(".split-input")].reduce((acc, inp) => {
    const v = parseInt(inp.value || "0", 10);
    if (v) acc[inp.dataset.method] = v;
    return acc;
  }, {});
}
function updateTotal(){
  const bodyType = document.getElementById("f-body")?.value;
  let total = selectedServices.reduce((sum,k) => {
    const s = CFG.services.find(s=>s.key===k);
    return sum + (s.prices[bodyType] ?? Object.values(s.prices)[0]);
  }, 0);
  total += customServices.reduce((sum,c) => sum + c.price, 0);
  const totalEl = document.getElementById("f-total");
  if (totalEl) totalEl.textContent = fmt(total);
  const splitToggle = document.getElementById("f-split-toggle");
  const hint = document.getElementById("f-split-hint");
  if (splitToggle?.checked && hint) {
    const sum = Object.values(getSplitValues()).reduce((a,b)=>a+b,0);
    const diff = total - sum;
    hint.textContent = diff === 0 ? "Сумма сходится ✓" : `Осталось распределить: ${fmt(diff)}`;
    hint.style.color = diff === 0 ? "var(--green)" : "var(--red)";
  }
}
window.submitCar = async () => {
  if (!selectedServices.length && !customServices.length) return tg.showAlert("Выбери хотя бы одну услугу");
  const emp = document.getElementById("f-emp").value;
  if (!emp) return tg.showAlert("Сначала добавь сотрудника в настройках");
  const isSplit = document.getElementById("f-split-toggle").checked;
  let paymentSplit = null;
  if (isSplit) {
    paymentSplit = getSplitValues();
    const total = parseInt((document.getElementById("f-total").textContent || "0").replace(/\D/g,""), 10);
    const sum = Object.values(paymentSplit).reduce((a,b)=>a+b,0);
    if (!Object.keys(paymentSplit).length) return tg.showAlert("Укажи суммы по способам оплаты");
    if (sum !== total) return tg.showAlert(`Сумма раздельной оплаты (${sum}₽) не совпадает со стоимостью (${total}₽)`);
  }
  const body = {
    branch: BRANCH, employee: emp,
    body_type: document.getElementById("f-body").value,
    service_keys: selectedServices, custom_services: customServices,
    car: document.getElementById("f-car").value,
    payment: isSplit ? "Раздельно" : document.getElementById("f-payment").value,
    payment_split: paymentSplit,
    comment: document.getElementById("f-comment").value,
  };
  await api("/api/car", { method: "POST", body: JSON.stringify(body) });
  haptic("medium"); switchTab("home");
};

window.openMonthReport = async () => {
  const month = window.prompt("Месяц (например: июнь):", "");
  if (!month) return;
  try {
    const r = await api(`/api/reports/month?branch=${encodeURIComponent(BRANCH)}&month=${encodeURIComponent(month)}`);
    const lines = Object.entries(r.by_worker).map(([emp, weeks]) =>
      `${emp}: ${Object.values(weeks).reduce((a,b)=>a+b,0)} ₽`).join("\n") || "Нет данных";
    tg.showAlert(`${month} ${r.year}\nИтого: ${fmt(r.grand_total)}\n\n${lines}`);
  } catch(e){}
};
window.openAllReport = async () => {
  try {
    const r = await api(`/api/reports/allreport`);
    const lines = r.branches.map(b => `${b.branch}: ${fmt(b.total)} (${b.cars} машин)`).join("\n") || "Нет данных";
    tg.showAlert(`Все филиалы\nИтого: ${fmt(r.grand_total)}\n\n${lines}`);
  } catch(e){}
};

async function renderDayReport(){
  const el = document.getElementById("view-day-report");
  el.innerHTML = `<div class="back-header"><div class="back" onclick="switchTab('reports')"><i class="ti ti-chevron-left"></i></div><span>Общий отчёт (сегодня)</span></div>${skeleton(2)}`;
  const r = await api(`/api/reports/today?branch=${encodeURIComponent(BRANCH)}`);
  const s = r.summary;
  const parts = [
    { name: "Наличные", val: s.cash, color: "#33D17A" },
    { name: "Безнал", val: s.beznal, color: "#0A84FF" },
    { name: "Карта", val: s.visa, color: "#FF9F0A" },
  ].filter(p => p.val > 0);
  const total = parts.reduce((a,p)=>a+p.val,0) || 1;
  let acc = 0;
  const gradient = parts.map(p => { const from=acc/total*360; acc+=p.val; const to=acc/total*360; return `${p.color} ${from}deg ${to}deg`; }).join(", ") || "#333 0deg 360deg";

  el.innerHTML = `
    <div class="back-header"><div class="back" onclick="switchTab('reports')"><i class="ti ti-chevron-left"></i></div><span>Общий отчёт (сегодня)</span></div>
    <div class="content">
      <div class="hero-card"><p class="lbl">Итого за сегодня</p><p class="amount">${fmt(s.grand_total)}</p><p class="sub">${r.session.cars.length} машин</p></div>
      <div class="card" style="margin-top:14px">
        <div class="donut-wrap">
          <div class="donut" style="background:conic-gradient(${gradient})"><div class="center"><b>${fmt(s.grand_total)}</b><span>Всего</span></div></div>
          <div class="legend">${parts.map(p => `<div class="item"><span class="dot" style="background:${p.color}"></span>${p.name}<b>${fmt(p.val)}</b></div>`).join("") || `<p class="empty">Нет данных</p>`}</div>
        </div>
      </div>
      <p class="section-label">По услугам</p>
      <div class="card">${r.top_services.length ? r.top_services.map(([name,count]) => `<div class="row"><span class="name">${name}</span><p class="sub" style="margin:0">${count}</p></div>`).join("") : `<p class="empty">Нет данных</p>`}</div>
      <button class="btn" style="margin-top:16px;margin-bottom:24px" onclick="downloadPdf()">Скачать PDF</button>
    </div>`;
}

  try { await api("/api/workers", { method: "POST", body: JSON.stringify({ branch: BRANCH, name }) }); haptic("medium"); renderSettings(); }

};
window.uiRemoveWorker = async () => {
  const { workers } = await api(`/api/workers?branch=${encodeURIComponent(BRANCH)}`);

};
window.uiAddUser = async () => {

document.getElementById("view-home").insertAdjacentHTML("afterend", `<div id="view-day-report" class="hidden"></div><div id="view-all-cars" class="hidden"></div>`);
const _switchTab = switchTab;
switchTab = function(name){
  if (name === "day-report") {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll("[id^=view-]").forEach(v => v.classList.add("hidden"));
    document.getElementById("view-day-report").classList.remove("hidden");
    renderDayReport();
    return;
  }
  if (name === "all-cars") {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll("[id^=view-]").forEach(v => v.classList.add("hidden"));
    document.getElementById("view-all-cars").classList.remove("hidden");
    renderAllCars();
    return;
  }
  _switchTab(name);
};

switchTab("home");
