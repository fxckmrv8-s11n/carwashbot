<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>ClaudeFormula 2.0</title>
<script>
  (function(){
    try{
      var t = localStorage.getItem("cf_theme");
      if (t === "light" || t === "dark") document.documentElement.setAttribute("data-theme", t);
    }catch(e){}
  })();
</script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
/* ── ПЕРЕМЕННЫЕ ─────────────────────────────────────────────────────────── */
:root{
  /* Единая палитра с сайтом (site-theme.css) — тема «Glass / Orb»
     (см. DESIGN_SYSTEM.md, Этап 1 миграции на main-page-concept.html) */
  --bg:#08080B;
  --surface-0:#0F1116;
  --surface-1:#15171D;
  --surface-2:#1D1F27;
  --surface-3:#262832;
  --text:#F5F6FA;
  --text-secondary:#9096A3;
  --text-muted:#5E6270;
  --border:rgba(255,255,255,0.07);
  --border-strong:rgba(255,255,255,0.14);
  --accent:#6A8BFF;
  --accent-b:#A24BFF;
  --accent-tint:rgba(106,139,255,0.16);
  --accent-gradient:linear-gradient(135deg,var(--accent) 0%,var(--accent-b) 100%);
  --green:#34D399;
  --green-tint:rgba(52,211,153,0.14);
  --red:#FF6B8B;
  --red-tint:rgba(255,107,139,0.13);
  --orange:#FFB648;
  --orange-tint:rgba(255,182,72,0.14);
  --purple:#A47CF3;
  --purple-tint:rgba(164,124,243,0.14);

  /* ── Новые токены дизайн-концепта ── */
  --glow-a:#3B6BFF;
  --glow-b:#A24BFF;
  --glow-c:#FF4FA3;
  --glass:rgba(255,255,255,0.055);
  --glass-hover:rgba(255,255,255,0.09);
  --glass-border:rgba(255,255,255,0.09);
  --text-dim:rgba(245,246,250,0.56);
  --text-faint:rgba(245,246,250,0.34);
  --good:#34D399;
  --radius-xl:30px;
  --radius-lg:22px;
  --radius-md:16px;
  --radius-sm:12px;
  --blur-glass:20px;
  --blur-nav:28px;
}
html[data-theme="light"]{
  --bg:#F4F5F8;
  --surface-0:#FFFFFF;
  --surface-1:#FFFFFF;
  --surface-2:#EEEFF3;
  --surface-3:#DFE1E8;
  --text:#12131A;
  --text-secondary:#5E6270;
  --text-muted:#9096A3;
  --border:rgba(15,17,22,0.08);
  --border-strong:rgba(15,17,22,0.14);
  --accent:#6A5CE0;
  --accent-b:#8B3FE8;
  --accent-tint:rgba(106,92,224,0.12);
  --accent-gradient:linear-gradient(135deg,var(--accent) 0%,var(--accent-b) 100%);
  --green:#1FAE73;
  --green-tint:rgba(31,174,115,0.12);
  --red:#E23F63;
  --red-tint:rgba(226,63,99,0.1);
  --orange:#E08A1E;
  --orange-tint:rgba(224,138,30,0.12);
  --purple:#8654E0;
  --purple-tint:rgba(134,84,224,0.12);

  /* ── Glass-токены для светлой темы (мягче, без орбов на весь экран) ── */
  --glow-a:#3B6BFF;
  --glow-b:#A24BFF;
  --glow-c:#FF4FA3;
  --glass:rgba(18,19,26,0.035);
  --glass-hover:rgba(18,19,26,0.06);
  --glass-border:rgba(18,19,26,0.08);
  --text-dim:rgba(18,19,26,0.56);
  --text-faint:rgba(18,19,26,0.34);
  --good:#1FAE73;
  --radius-xl:30px;
  --radius-lg:22px;
  --radius-md:16px;
  --radius-sm:12px;
  --blur-glass:20px;
  --blur-nav:28px;
}

/* ── КОМПОНЕНТЫ ДИЗАЙН-КОНЦЕПТА (Этап 1) ──────────────────────────────────
   Зеркалит .orb-bg/.glass-card/.hero-glass/.pill/.action-tile/.glass-navbar
   из site-theme.css — mini-app не подключает site-theme.css отдельным
   файлом, поэтому та же разметка компонентов продублирована здесь, чтобы
   экраны (Этап 2+) могли использовать одинаковые классы на сайте и в
   приложении. Источник правды по значениям — DESIGN_SYSTEM.md. */
.orb-bg{ position:fixed; inset:0; overflow:hidden; z-index:0; pointer-events:none; }
.orb{ position:fixed; border-radius:50%; filter:blur(90px); opacity:.35; }
.orb-a{ width:280px; height:280px; top:-120px; left:-100px; background:var(--glow-a); animation:orb-float-1 22s ease-in-out infinite; }
.orb-b{ width:260px; height:260px; top:80px; right:-120px; background:var(--glow-c); opacity:.22; animation:orb-float-2 26s ease-in-out infinite; }
.orb-c{ width:220px; height:220px; bottom:-100px; left:15%; background:var(--glow-b); opacity:.2; animation:orb-float-1 30s ease-in-out infinite reverse; }
@keyframes orb-float-1{ 0%,100%{ transform:translate(0,0); } 50%{ transform:translate(20px,26px); } }
@keyframes orb-float-2{ 0%,100%{ transform:translate(0,0); } 50%{ transform:translate(-26px,14px); } }

.glass-card{
  background:var(--glass);
  border:1px solid var(--glass-border);
  border-radius:var(--radius-lg);
  backdrop-filter:blur(var(--blur-glass));
  -webkit-backdrop-filter:blur(var(--blur-glass));
}

.hero-glass{
  position:relative; isolation:isolate; overflow:hidden;
  border-radius:var(--radius-xl);
  padding:26px 24px 22px;
  background:
    radial-gradient(120% 140% at 8% 0%, #6A8BFF 0%, transparent 55%),
    radial-gradient(120% 140% at 95% 15%, #C15BFF 0%, transparent 50%),
    radial-gradient(140% 160% at 60% 120%, #FF5FA8 0%, transparent 55%),
    linear-gradient(155deg, #2A2F7A 0%, #3A1F6B 55%, #4A1F4F 100%);
  background-size:180% 180%, 180% 180%, 180% 180%, 100% 100%;
  animation:hero-shift 16s ease-in-out infinite;
  box-shadow:0 24px 50px -18px rgba(80,50,220,0.55);
  color:#fff;
}
@keyframes hero-shift{
  0%,100%{ background-position:0% 0%, 100% 0%, 50% 100%, 0 0; }
  50%{ background-position:30% 20%, 70% 30%, 40% 80%, 0 0; }
}
.hero-glass::before{
  content:""; position:absolute; inset:0;
  background:linear-gradient(155deg, rgba(255,255,255,.16), rgba(255,255,255,0) 40%);
  mix-blend-mode:overlay;
}
.hero-glass::after{
  content:""; position:absolute; width:220px; height:220px; border-radius:50%;
  right:-70px; top:-70px;
  background:radial-gradient(circle, rgba(255,255,255,.22), transparent 65%);
  filter:blur(2px);
}

.pill{ display:inline-block; font-size:10.5px; font-weight:700; padding:2.5px 8px; border-radius:100px; }
.pill.ok{ background:rgba(52,211,153,.15); color:var(--good); }
.pill.wip{ background:rgba(255,182,72,.16); color:var(--orange); }

.action-tile{
  display:flex; flex-direction:column; align-items:center; gap:9px;
  padding:16px 4px 13px;
  background:var(--glass); border:1px solid var(--glass-border);
  border-radius:var(--radius-md);
  backdrop-filter:blur(var(--blur-glass)); -webkit-backdrop-filter:blur(var(--blur-glass));
  cursor:pointer;
  transition:transform .15s cubic-bezier(.3,.7,.4,1), background .15s ease;
}
.action-tile:active{ transform:scale(.94); background:var(--glass-hover); }
.action-tile .sq{ width:44px; height:44px; border-radius:14px; display:flex; align-items:center; justify-content:center; color:#fff; }
.action-tile .sq.b1{ background:linear-gradient(140deg,#5C7CFF,#8A5CFF); }
.action-tile .sq.b2{ background:linear-gradient(140deg,#22C1A0,#2AD48B); }
.action-tile .sq.b3{ background:linear-gradient(140deg,#FF7A5C,#FF5C9A); }
.action-tile .sq.b4{ background:linear-gradient(140deg,#FFB648,#FF8A3D); }

.glass-navbar{
  position:fixed; left:50%; bottom:18px; transform:translateX(-50%);
  width:calc(100% - 32px); max-width:396px;
  background:rgba(20,20,26,0.72);
  border:1px solid rgba(255,255,255,0.09);
  backdrop-filter:blur(var(--blur-nav)) saturate(160%);
  -webkit-backdrop-filter:blur(var(--blur-nav)) saturate(160%);
  border-radius:100px;
  display:flex; align-items:center; justify-content:space-around;
  padding:10px 6px; z-index:5;
  box-shadow:0 16px 40px -14px rgba(0,0,0,.6);
}
html[data-theme="light"] .glass-navbar{ background:rgba(255,255,255,0.72); box-shadow:0 16px 40px -14px rgba(0,0,0,.18); }

/* ── RESET ──────────────────────────────────────────────────────────────── */
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html{height:100%;-webkit-text-size-adjust:none}
body{
  min-height:100%;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display",Segoe UI,Roboto,sans-serif;
  background:var(--bg);
  color:var(--text);
  padding-bottom:calc(80px + env(safe-area-inset-bottom));
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}

/* ── LAYOUT ─────────────────────────────────────────────────────────────── */
.container{max-width:460px;margin:0 auto;position:relative;z-index:1}
.page{padding:0 0 8px}
.px{padding-left:16px;padding-right:16px}

/* ── TAB BAR ────────────────────────────────────────────────────────────── */
.tabbar{
  position:fixed;bottom:0;left:0;right:0;
  display:flex;
  background:rgba(8,8,11,0.88);
  backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
  border-top:0.5px solid var(--border);
  padding-bottom:env(safe-area-inset-bottom);
  max-width:460px;margin:0 auto;
  z-index:50;
}
html[data-theme="light"] .tabbar{background:rgba(244,245,248,0.9)}
.tab{
  flex:1;text-align:center;
  padding:10px 0 8px;
  font-size:10px;font-weight:500;
  color:var(--text-muted);
  cursor:pointer;
  transition:color .15s ease;
  display:flex;flex-direction:column;align-items:center;gap:3px;
}
.tab.active{color:var(--accent)}
.tab i{font-size:22px;display:block}
.hidden{display:none!important}

/* ── TOPBAR ─────────────────────────────────────────────────────────────── */
.topbar{
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:16px 16px 10px;
}
.topbar-title{font-size:22px;font-weight:700;letter-spacing:-0.02em}
.topbar-sub{
  font-size:13px;color:var(--text-secondary);
  margin-top:1px;
  display:flex;align-items:center;gap:3px;cursor:pointer;
}
.topbar-sub i{font-size:11px;color:var(--text-muted)}
.bell-btn{
  width:34px;height:34px;border-radius:50%;
  background:var(--surface-1);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;
  border:0.5px solid var(--border);
}
.bell-btn i{font-size:17px;color:var(--text-secondary)}

/* ── BACK HEADER ─────────────────────────────────────────────────────────  */
.back-header{
  display:flex;align-items:center;gap:10px;
  padding:14px 16px 10px;
}
.back-btn{
  width:30px;height:30px;border-radius:50%;
  background:var(--surface-1);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;border:0.5px solid var(--border);flex-shrink:0;
}
.back-btn i{font-size:15px;color:var(--text-secondary)}
.back-header-title{font-size:17px;font-weight:700}

/* ── SHIFT BAR (используется тж. в Кассе) ── */
.shift-bar{
  margin:10px 16px 0;
  background:var(--surface-1);border-radius:16px;
  padding:12px 16px;
  display:flex;align-items:center;gap:12px;
  border:0.5px solid var(--border);
}
.shift-bar i{font-size:17px;color:var(--text-muted)}
.shift-bar .sb-body{flex:1}
.shift-bar .sb-text{font-size:13px;font-weight:500;margin-bottom:6px}
.shift-bar .sb-sub{font-size:11px;color:var(--text-muted);margin-bottom:6px}
.sb-track{height:4px;background:var(--surface-2);border-radius:2px}
.sb-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease}

/* ── WAVE CHART (используется тж. в Отчётах) ── */
.wave-chart{margin-top:14px}
.wave-chart svg{display:block;width:100%;height:44px}

/* ── SECTION LABEL (используется на многих экранах, не только «Главная») ── */
.section-label{
  font-size:13px;font-weight:600;color:var(--text-secondary);
  padding:14px 16px 6px;
  display:flex;justify-content:space-between;align-items:center;
}
.section-label .see-all{
  font-size:12px;font-weight:500;color:var(--text-muted);cursor:pointer;
}

/* ── HOME SCREEN v2 (Glass/Orb, Этап 2) ────────────────────────────────
   Новый макет «Главной» по main-page-concept.html. Использует токены и
   базовые компоненты из блока «КОМПОНЕНТЫ ДИЗАЙН-КОНЦЕПТА» выше
   (.orb-bg, .glass-card, .hero-glass, .pill, .action-tile). Классы ниже —
   специфичные для расположения элементов именно на «Главной». */
.home-wrap{ position:relative; padding:14px 16px calc(96px + env(safe-area-inset-bottom,0px)); }

.home-topbar{ display:flex; align-items:center; justify-content:space-between; padding:2px 2px 16px; }
.home-who{ display:flex; align-items:center; gap:11px; }
.home-avatar{
  width:38px; height:38px; border-radius:50%;
  background:linear-gradient(135deg,var(--glow-a),var(--glow-b));
  display:flex; align-items:center; justify-content:center;
  font-weight:700; font-size:14px; color:#fff; flex-shrink:0;
}
.home-who-text .hi{ font-size:12px; color:var(--text-faint); font-weight:500; }
.home-who-text .name{ font-size:15px; font-weight:700; margin-top:1px; }
.home-branch-chip{
  display:flex; align-items:center; gap:6px;
  background:var(--glass); border:1px solid var(--glass-border);
  padding:9px 13px 9px 12px; border-radius:100px;
  font-size:13px; font-weight:600; color:var(--text);
  backdrop-filter:blur(var(--blur-glass)); -webkit-backdrop-filter:blur(var(--blur-glass));
  cursor:pointer; max-width:52%;
}
.home-branch-chip span{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.home-branch-chip i{ opacity:.55; font-size:12px; flex-shrink:0; }

.home-hero{ padding:26px 22px 20px; }
.home-hero-top{ display:flex; justify-content:space-between; align-items:flex-start; position:relative; z-index:1; }
.home-hero-label{ font-size:13px; font-weight:600; color:rgba(255,255,255,.72); }
.home-hero-badge{
  font-size:12px; font-weight:700; color:#0A0A0C;
  background:rgba(255,255,255,.92);
  padding:5px 10px; border-radius:100px;
  display:flex; align-items:center; gap:4px;
}
.home-hero-badge.negative{ background:rgba(20,20,26,.55); color:#fff; }
.home-hero-sum{
  position:relative; z-index:1;
  font-size:40px; font-weight:700; letter-spacing:-1.2px;
  margin:10px 0 2px; font-variant-numeric:tabular-nums; color:#fff;
}
.home-hero-sum span{ font-size:19px; font-weight:600; opacity:.55; margin-left:2px; }
.home-hero-sub{ position:relative; z-index:1; font-size:13px; color:rgba(255,255,255,.62); font-weight:500; }
.home-hero-wave{ position:relative; z-index:1; margin-top:16px; height:36px; }
.home-hero-wave svg{ width:100%; height:100%; display:block; }

.home-segmented{
  display:flex; gap:2px; margin-top:14px;
  background:var(--glass); border:1px solid var(--glass-border);
  padding:3px; border-radius:100px;
  backdrop-filter:blur(var(--blur-glass)); -webkit-backdrop-filter:blur(var(--blur-glass));
}
.home-seg{ flex:1; text-align:center; padding:9px 0; font-size:13px; font-weight:600; color:var(--text-dim); border-radius:100px; cursor:pointer; transition:color .2s; }
.home-seg.active{ background:var(--glass-hover); color:var(--text); }

.home-stats{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:14px; }
.home-stat .ic{
  width:26px; height:26px; border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  background:var(--accent-tint); color:var(--accent); margin-bottom:10px; font-size:13px;
}
.home-stat{ padding:14px 12px; }
.home-stat .val{ font-size:18px; font-weight:700; letter-spacing:-.3px; font-variant-numeric:tabular-nums; }
.home-stat .lab{ font-size:11px; color:var(--text-faint); margin-top:2px; font-weight:500; }

.home-section{ margin-top:24px; }
.home-section-head{ display:flex; align-items:baseline; justify-content:space-between; padding:0 2px 12px; }
.home-section-head h2{ font-size:16px; font-weight:700; margin:0; letter-spacing:-.2px; }
.home-section-head a{ font-size:12.5px; color:var(--text-dim); font-weight:600; cursor:pointer; }

.home-actions{ display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
.home-actions .lab{ font-size:10.5px; font-weight:600; color:var(--text-dim); text-align:center; line-height:1.25; }

.home-list .row{
  display:flex; align-items:center; gap:12px;
  padding:13px 16px; border-bottom:1px solid rgba(255,255,255,.055);
  cursor:pointer;
}
html[data-theme="light"] .home-list .row{ border-bottom-color:rgba(15,17,22,.06); }
.home-list .row:last-child{ border-bottom:none; }
.home-row-ic{
  width:38px; height:38px; border-radius:12px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  background:var(--glass-hover); color:var(--text-dim); font-size:16px;
}
.home-row-mid{ flex:1; min-width:0; }
.home-row-title{ font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.home-row-sub{ font-size:12px; color:var(--text-faint); margin-top:2px; }
.home-row-right{ text-align:right; flex-shrink:0; }
.home-row-price{ font-size:14.5px; font-weight:700; font-variant-numeric:tabular-nums; }

.home-team{ display:flex; gap:14px; overflow-x:auto; padding:2px 2px 4px; scrollbar-width:none; }
.home-team::-webkit-scrollbar{ display:none; }
.home-member{ flex-shrink:0; width:64px; text-align:center; cursor:pointer; }
.home-member .av{
  width:52px; height:52px; border-radius:50%; margin:0 auto 8px;
  display:flex; align-items:center; justify-content:center;
  font-weight:700; font-size:15px; position:relative;
  background:linear-gradient(140deg, rgba(255,255,255,.14), rgba(255,255,255,.03));
  border:1px solid var(--glass-border);
}
html[data-theme="light"] .home-member .av{ background:linear-gradient(140deg, rgba(15,17,22,.08), rgba(15,17,22,.02)); }
.home-member .dot{
  position:absolute; bottom:1px; right:1px; width:12px; height:12px; border-radius:50%;
  background:var(--good); border:2.5px solid var(--bg);
}
.home-member .dot.off{ background:var(--text-muted); }
.home-member .nm{ font-size:11.5px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.home-member .amt{ font-size:10.5px; color:var(--text-faint); margin-top:1px; font-variant-numeric:tabular-nums; }
.home-member.more .av{ border:1.5px dashed var(--glass-border); background:transparent; color:var(--text-faint); }

@media (max-width:380px){
  .home-hero-sum{ font-size:34px; }
  .home-actions .lab{ font-size:10px; }
}

/* ── OPERATIONS LIST ─────────────────────────────────────────────────────── */
.op-list{margin:0 16px;background:var(--glass);border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--glass-border);backdrop-filter:blur(var(--blur-glass));-webkit-backdrop-filter:blur(var(--blur-glass))}
.op-row{
  display:flex;align-items:center;gap:12px;
  padding:11px 14px;cursor:pointer;
  transition:background .1s;
}
.op-row+.op-row{border-top:1px solid var(--glass-border)}
.op-row:active{background:var(--glass-hover)}
.op-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}
.op-dot.orange{background:var(--orange)}
.op-info{flex:1;min-width:0}
.op-name{font-size:13px;font-weight:600;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.op-meta{font-size:11px;color:var(--text-muted);margin:1px 0 0}
.op-price{font-size:14px;font-weight:700;color:var(--text);white-space:nowrap}

/* ── EXPENSE ROW ─────────────────────────────────────────────────────────── */
.expense-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 14px;
}
.expense-row+.expense-row{border-top:0.5px solid var(--border)}
.expense-name{font-size:14px;font-weight:500}
.expense-right{display:flex;align-items:center;gap:10px}
.expense-amount{font-size:14px;font-weight:600;color:var(--red)}
.expense-del{font-size:12px;color:var(--red);cursor:pointer;font-weight:500;padding:2px 6px}

/* ── КНОПКИ ──────────────────────────────────────────────────────────────── */
button{font-family:inherit;cursor:pointer;border:none;outline:none}
.btn{
  width:100%;height:52px;border-radius:14px;
  background:var(--accent-gradient);color:#fff;
  box-shadow:0 4px 14px rgba(106,139,255,0.28);
  font-size:16px;font-weight:600;
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:transform .12s cubic-bezier(0,0,.2,1),opacity .12s;
}
.btn:active{transform:scale(0.97);opacity:.9}
.btn.secondary{background:var(--surface-1);color:var(--text);border:0.5px solid var(--border)}
.btn.danger-outline{background:var(--red-tint);color:var(--red)}
.btn.ghost{background:transparent;color:var(--text-secondary);border:0.5px solid var(--border)}
.btn-sm{height:44px;font-size:14px;border-radius:12px}
.btn-wrap{padding:12px 16px}
.btn-logout{
  width:100%;height:50px;border-radius:14px;
  background:var(--red-tint);color:var(--red);
  font-size:16px;font-weight:600;margin-top:10px;
}

/* ── LOADING STATE ───────────────────────────────────────────────────────── */
.btn.loading{color:transparent;pointer-events:none;position:relative}
.btn.loading::after{
  content:"";position:absolute;left:50%;top:50%;
  width:18px;height:18px;margin:-9px 0 0 -9px;
  border-radius:50%;border:2px solid rgba(255,255,255,0.3);
  border-top-color:#fff;animation:spin .7s linear infinite;
}
.btn.secondary.loading::after,.btn.ghost.loading::after{border:2px solid rgba(255,255,255,0.2);border-top-color:rgba(255,255,255,.6)}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── FORM ELEMENTS ───────────────────────────────────────────────────────── */
.field-label{font-size:12px;color:var(--text-muted);font-weight:600;padding:0 2px 6px;text-transform:uppercase;letter-spacing:0.04em}
.field-wrap{padding:0 16px 12px}
input,select,textarea{
  width:100%;padding:14px 16px;
  border-radius:14px;border:none;
  background:var(--surface-1);color:var(--text);
  font-size:15px;font-family:inherit;
  -webkit-appearance:none;appearance:none;
  border:0.5px solid var(--border);
}
input:focus,select:focus,textarea:focus{outline:1px solid var(--accent)}
textarea{resize:none;min-height:72px}
::placeholder{color:var(--text-muted)}
.field-select{position:relative}
.field-select select{padding-right:36px}
.field-select::after{
  content:"";position:absolute;right:14px;top:50%;
  transform:translateY(-60%) rotate(45deg);
  width:7px;height:7px;
  border-right:1.5px solid var(--text-muted);
  border-bottom:1.5px solid var(--text-muted);
  pointer-events:none;
}

/* ── CARD ────────────────────────────────────────────────────────────────── */
.card{
  background:var(--glass);border-radius:var(--radius-lg);
  border:1px solid var(--glass-border);overflow:hidden;
  margin:0 16px;
  backdrop-filter:blur(var(--blur-glass));-webkit-backdrop-filter:blur(var(--blur-glass));
}
.card+.card{margin-top:10px}
.card-pad{padding:16px}

/* ── ROW ─────────────────────────────────────────────────────────────────── */
.row{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 16px;cursor:pointer;
  transition:background .1s;
}
.row+.row{border-top:1px solid var(--glass-border)}
.row:active{background:var(--glass-hover)}
.row-name{font-size:15px;font-weight:500;display:flex;align-items:center;gap:10px}
.row-sub{font-size:12px;color:var(--text-muted);margin-top:2px}
.row-right{text-align:right;display:flex;flex-direction:column;align-items:flex-end}
.row-price{font-size:15px;font-weight:700}
.chevron{color:var(--text-muted);font-size:15px}

/* ── ICON BADGE ──────────────────────────────────────────────────────────── */
.ib{
  width:30px;height:30px;border-radius:9px;
  display:inline-flex;align-items:center;justify-content:center;
  font-size:15px;flex-shrink:0;
}
.ib.blue{background:rgba(0,122,255,0.15);color:var(--accent)}
.ib.green{background:var(--green-tint);color:var(--green)}
.ib.orange{background:var(--orange-tint);color:var(--orange)}
.ib.red{background:var(--red-tint);color:var(--red)}
.ib.purple{background:var(--purple-tint);color:var(--purple)}
.ib.gray{background:var(--surface-2);color:var(--text-muted)}

/* ── SEGMENTED CONTROL ───────────────────────────────────────────────────── */
.segmented{
  display:flex;background:var(--glass);border-radius:100px;padding:3px;
  margin:0 16px 14px;border:1px solid var(--glass-border);
  backdrop-filter:blur(var(--blur-glass));-webkit-backdrop-filter:blur(var(--blur-glass));
}
.seg{
  flex:1;text-align:center;padding:8px 0;
  font-size:13px;font-weight:600;color:var(--text-secondary);
  border-radius:100px;cursor:pointer;transition:all .15s;
}
.seg.active{background:var(--accent-gradient);color:#fff}
html[data-theme="light"] .seg.active{background:var(--accent-gradient);color:#fff}

/* ── МОЯ СМЕНА: раскрывающийся список машин по дням ──────────────────────── */
.my-stats-day-cars{margin-top:10px;padding-top:10px;border-top:0.5px solid var(--border)}
.my-stats-car-row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;color:var(--text-secondary)}
.my-stats-car-row span:last-child{font-weight:600;color:var(--text-primary)}

/* ── ДОNUT ───────────────────────────────────────────────────────────────── */
.donut-wrap{display:flex;align-items:center;gap:22px;padding:18px 16px}
.donut{width:110px;height:110px;border-radius:50%;flex-shrink:0;position:relative;display:flex;align-items:center;justify-content:center}
.donut::after{content:"";position:absolute;inset:14px;background:var(--surface-1);border-radius:50%}
.donut .center{position:relative;z-index:1;text-align:center}
.donut .center b{font-size:13px;display:block;font-weight:700}
.donut .center span{font-size:10px;color:var(--text-muted)}
.legend{flex:1}
.legend .item{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12px}
.legend .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.legend .item b{margin-left:auto;font-weight:700}

/* ── WORKER CARD ─────────────────────────────────────────────────────────── */
.worker-card{padding:14px 16px;cursor:pointer;transition:background .1s}
.worker-card+.worker-card{border-top:0.5px solid var(--border)}
.worker-card:active{background:var(--surface-2)}
.wc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.wc-info{display:flex;align-items:center;gap:10px}
.wc-av{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;flex-shrink:0;
}
.wc-name{font-size:14px;font-weight:600}
.wc-sub{font-size:11px;color:var(--text-muted);margin-top:1px}
.wc-sal{font-size:16px;font-weight:700}
.wc-bar{height:4px;background:var(--surface-2);border-radius:2px;margin-top:2px}
.wc-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--green),#2fb34a);transition:width .4s}
.wc-pct{font-size:11px;color:var(--text-muted);text-align:right;margin-top:4px}

/* ── ADD WORKER BTN ──────────────────────────────────────────────────────── */
.add-worker-btn{
  display:flex;align-items:center;justify-content:center;gap:7px;
  color:var(--accent);font-size:15px;font-weight:600;
  padding:14px 16px;cursor:pointer;
}
.add-worker-btn:active{opacity:.7}

/* ── SETTINGS ────────────────────────────────────────────────────────────── */
.settings-avatar{
  width:72px;height:72px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:26px;font-weight:700;margin:0 auto 6px;
}
.settings-name{font-size:17px;font-weight:700;text-align:center;margin:0 0 2px}
.settings-role{font-size:13px;color:var(--text-muted);text-align:center;margin:0 0 20px}
.settings-section{margin:16px 0 0}
.settings-section-label{
  font-size:11px;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:0.05em;font-weight:600;
  padding:0 20px 8px;
}
.settings-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;cursor:pointer;transition:background .1s;
}
.settings-row+.settings-row{border-top:0.5px solid var(--border)}
.settings-row:active{background:var(--surface-2)}
.sr-left{display:flex;align-items:center;gap:12px}
.sr-label{font-size:15px;font-weight:500}
.sr-right{display:flex;align-items:center;gap:6px;color:var(--text-muted)}
.sr-right i{font-size:14px}
.sr-badge{font-size:12px;color:var(--text-muted)}

/* ── BRANCH PICKER ───────────────────────────────────────────────────────── */
.branch-card{
  background:var(--surface-1);border-radius:18px;
  padding:16px;margin:0 16px 10px;
  cursor:pointer;border:0.5px solid var(--border);
  transition:transform .15s,border-color .15s;
  display:flex;justify-content:space-between;align-items:flex-start;
}
.branch-card:active{transform:scale(0.98)}
.branch-card.selected{border-color:var(--accent)}
.bc-pin{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--accent);margin-bottom:4px;font-weight:600}
.bc-amount{font-size:20px;font-weight:700;margin:2px 0}
.bc-sub{font-size:12px;color:var(--text-muted)}
.bc-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.bc-trend{color:var(--green);font-size:13px}
.bc-mini-chart{width:80px;height:30px}

/* ── СВАЙП КАРТОЧКА ──────────────────────────────────────────────────────── */
.swipe-card{
  background:var(--surface-1);border-radius:16px;padding:16px;
  position:relative;touch-action:pan-y;border:0.5px solid var(--border);
  margin:0 16px;
}
.swipe-card .sc-counter{position:absolute;top:12px;right:14px;font-size:11px;color:var(--text-muted)}
.swipe-card .sc-car{font-size:17px;font-weight:700;margin:0 0 3px}
.swipe-card .sc-sub{font-size:12px;color:var(--text-secondary);margin:0 0 10px}
.swipe-card .sc-price{font-size:24px;font-weight:700}
.swipe-card .sc-status{
  display:inline-flex;align-items:center;margin-top:10px;
  font-size:11px;font-weight:700;padding:3px 10px;border-radius:8px;cursor:pointer;
}
.swipe-nav{display:flex;align-items:center;justify-content:center;gap:14px;margin:10px 16px 0}
.swipe-nav button{
  width:30px;height:30px;border-radius:50%;
  background:var(--surface-1);border:0.5px solid var(--border);
  color:var(--text);display:flex;align-items:center;justify-content:center;
}
.swipe-dots{display:flex;gap:5px}
.swipe-dots span{width:5px;height:5px;border-radius:50%;background:var(--surface-3)}
.swipe-dots span.on{background:var(--text)}

/* ── SWIPE TO DELETE ─────────────────────────────────────────────────────── */
.swipe-item{position:relative;overflow:hidden;border-radius:14px;margin-bottom:8px}
.swipe-bg{position:absolute;inset:0;background:var(--red);display:flex;align-items:center;justify-content:flex-end;padding-right:20px;border-radius:14px}
.swipe-bg i{color:#fff;font-size:20px}
.swipe-fg{position:relative;background:var(--surface-1);border-radius:14px;transition:transform .18s ease;touch-action:pan-y}
.swipe-fg.dragging{transition:none}

/* ── STATUS BADGE ────────────────────────────────────────────────────────── */
.status-badge{
  font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;
  display:inline-block;margin-top:3px;
}
.status-done{background:rgba(34,197,94,0.15);color:#22C55E}
.status-progress{background:rgba(249,115,22,0.15);color:#F97316}

/* ── REPORT TILES ────────────────────────────────────────────────────────── */
.tile-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0 16px}
.tile{
  background:var(--glass);border-radius:var(--radius-md);padding:16px 10px;
  text-align:center;cursor:pointer;border:1px solid var(--glass-border);
  transition:transform .12s;backdrop-filter:blur(var(--blur-glass));-webkit-backdrop-filter:blur(var(--blur-glass));
}
.tile:active{transform:scale(0.96)}
.tile.primary{background:var(--accent-gradient);border-color:transparent}
.tile.primary i,.tile.primary p{color:#fff!important}
.tile i{font-size:22px;color:var(--text-secondary)}
.tile p{font-size:12px;font-weight:500;color:var(--text-secondary);margin-top:6px}

/* ── CHIP SERVICES ───────────────────────────────────────────────────────── */
.chip-label{
  display:flex;justify-content:space-between;align-items:center;
  padding:13px 16px;cursor:pointer;transition:background .1s;
}
.chip-label+.chip-label{border-top:0.5px solid var(--border)}
.chip-label.active{background:var(--surface-2)}
.chip-l{font-size:14px;font-weight:500}
.chip-r{display:flex;align-items:center;gap:10px}
.chip-p{font-size:13px;color:var(--text-secondary)}
.tick{
  width:22px;height:22px;border-radius:50%;
  border:1.5px solid var(--border-strong);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;color:transparent;flex-shrink:0;
  transition:all .15s;
}
.tick.on{background:var(--accent);border-color:var(--accent);color:#fff;transform:scale(1.06)}

/* ── PRESET CHIPS ────────────────────────────────────────────────────────── */
.preset-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;margin-bottom:14px}
.preset-row::-webkit-scrollbar{display:none}
.preset-chip{
  flex-shrink:0;background:var(--surface-1);border:0.5px solid var(--border);
  border-radius:12px;padding:9px 14px;cursor:pointer;transition:transform .12s;
}
.preset-chip:active{transform:scale(0.96)}
.preset-chip .pc-name{font-size:12px;font-weight:600;display:block}
.preset-chip .pc-count{font-size:10px;color:var(--text-muted)}

/* ── SEARCH ──────────────────────────────────────────────────────────────── */
.search-wrap{position:relative;margin:0 16px 10px}
.search-wrap i.ti-search{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:16px;pointer-events:none}
.search-wrap input{padding-left:40px;margin-bottom:0}
.search-wrap .clear-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:16px;padding:4px;cursor:pointer;display:none}
.search-wrap.has-value .clear-btn{display:block}

/* ── FILTER CHIPS ────────────────────────────────────────────────────────── */
.filter-chips{display:flex;gap:8px;overflow-x:auto;padding:4px 16px 4px;margin-bottom:10px}
.filter-chips::-webkit-scrollbar{display:none}
.filter-chip{
  flex-shrink:0;background:var(--surface-1);border-radius:20px;
  padding:7px 14px;font-size:12px;font-weight:500;color:var(--text-secondary);
  white-space:nowrap;cursor:pointer;border:0.5px solid var(--border);transition:all .1s;
}
.filter-chip.active{background:var(--text);color:var(--bg);border-color:transparent;font-weight:700}

/* ── HISTORY ─────────────────────────────────────────────────────────────── */
.hist-row{padding:11px 16px}
.hist-row+.hist-row{border-top:0.5px solid var(--border)}
.hist-top{display:flex;justify-content:space-between;align-items:center;font-size:13px;margin-bottom:3px}
.hist-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;text-transform:uppercase}
.hist-badge.add{background:var(--green-tint);color:var(--green)}
.hist-badge.edit{background:rgba(10,132,255,0.15);color:#0A84FF}
.hist-badge.delete{background:var(--red-tint);color:var(--red)}
.hist-meta{font-size:11px;color:var(--text-muted);margin:1px 0 0}

/* ── SKELETON ────────────────────────────────────────────────────────────── */
.skeleton{background:var(--surface-1);border-radius:16px;height:56px;margin:0 16px 10px;animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.empty{color:var(--text-muted);font-size:14px;text-align:center;padding:32px 16px}

/* ── EMPTY STATE (единый компонент) ─────────────────────────────────────── */
.empty-state{text-align:center;padding:40px 24px}
.empty-state-icon{
  width:56px;height:56px;border-radius:16px;margin:0 auto 14px;
  background:var(--accent-tint);color:var(--accent);
  display:flex;align-items:center;justify-content:center;font-size:26px;
}
.empty-state-text{color:var(--text-secondary);font-size:14px;line-height:1.4}
.empty-state .btn{margin-top:16px;width:auto;padding:0 20px;height:44px}

/* ── TOAST (единое уведомление об успехе действия) ────────────────────────── */
.toast-wrap{
  position:fixed;left:0;right:0;bottom:calc(76px + env(safe-area-inset-bottom));
  display:flex;justify-content:center;z-index:200;pointer-events:none;
  max-width:460px;margin:0 auto;
}
.toast{
  display:flex;align-items:center;gap:8px;
  background:var(--surface-2);color:var(--text);
  border:0.5px solid var(--border-strong);
  border-radius:14px;padding:10px 16px;
  font-size:14px;font-weight:600;
  box-shadow:0 8px 24px rgba(0,0,0,0.28);
  opacity:0;transform:translateY(8px);
  transition:opacity .18s ease,transform .18s ease;
}
.toast.show{opacity:1;transform:translateY(0)}
.toast i{font-size:16px}
.toast.success i{color:var(--green)}
.toast.error i{color:var(--red)}

/* ── BOTTOM SHEET ────────────────────────────────────────────────────────── */
.sheet-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:90;opacity:0;pointer-events:none;transition:opacity .18s}
.sheet-backdrop.show{opacity:1;pointer-events:auto}
.sheet{
  position:fixed;left:0;right:0;bottom:0;max-width:460px;margin:0 auto;
  background:rgba(20,20,26,0.86);border-radius:var(--radius-xl) var(--radius-xl) 0 0;
  padding:8px 8px calc(12px + env(safe-area-inset-bottom));
  z-index:91;transform:translateY(100%);
  transition:transform .22s cubic-bezier(.32,.72,0,1);
  border-top:1px solid var(--glass-border);
  backdrop-filter:blur(var(--blur-nav)) saturate(160%);-webkit-backdrop-filter:blur(var(--blur-nav)) saturate(160%);
}
html[data-theme="light"] .sheet{background:rgba(255,255,255,0.88)}
.sheet.show{transform:translateY(0)}
.sheet .handle{width:36px;height:4px;background:var(--border-strong);border-radius:2px;margin:6px auto 10px}
.sheet-title{font-size:13px;color:var(--text-muted);text-align:center;padding:0 16px 10px}
.sheet-action{display:flex;align-items:center;gap:12px;padding:14px 16px;font-size:15px;border-radius:12px;cursor:pointer;font-weight:500}
.sheet-action:active{background:var(--glass-hover)}
.sheet-action.destructive{color:var(--red)}
.sheet-action i{font-size:19px;width:22px;text-align:center}

/* ── PULL TO REFRESH ─────────────────────────────────────────────────────── */
.ptr-indicator{display:flex;align-items:center;justify-content:center;height:0;overflow:hidden;color:var(--text-muted);transition:height .15s}
.ptr-indicator i{font-size:18px;animation:spin .7s linear infinite}

/* ── SCHEDULE GRID ───────────────────────────────────────────────────────── */
.sched-grid{display:grid;grid-template-columns:70px repeat(7,1fr);gap:4px;align-items:center}

/* ── WEEK TABLE ──────────────────────────────────────────────────────────── */
.wtable-head{display:grid;grid-template-columns:1.6fr .7fr 1fr;font-size:10px;color:var(--text-muted);padding:10px 16px 6px}
.wtable-row{display:grid;grid-template-columns:1.6fr .7fr 1fr;padding:12px 16px;align-items:center;font-size:13px}
.wtable-row+.wtable-row{border-top:0.5px solid var(--border)}
.wname{display:flex;align-items:center;gap:8px;font-weight:500}
.wdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.wcount{text-align:center;color:var(--text-secondary)}
.wsal{text-align:right;font-weight:700}

/* ── TAG ROW (сотрудники в настройках) ──────────────────────────────────── */
.tag-row{display:flex;flex-wrap:wrap;gap:8px;padding:0 16px}
.tag{background:var(--surface-1);border-radius:12px;padding:7px 12px;display:flex;align-items:center;gap:7px;cursor:pointer;border:0.5px solid var(--border)}
.tag:active{background:var(--surface-2)}
.tag .tav{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.tag span{font-size:12px;font-weight:500}
.tag-add{border:1px dashed var(--border-strong);border-radius:12px;padding:7px 14px;color:var(--text-muted);font-size:12px;display:flex;align-items:center;gap:5px;cursor:pointer}

/* ── GROUP LABEL ─────────────────────────────────────────────────────────── */
.group-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;padding:14px 16px 8px;font-weight:600}

/* ── THEME SWITCH ────────────────────────────────────────────────────────── */
.theme-switch{display:flex;background:var(--surface-2);border-radius:11px;padding:3px;gap:2px;margin:0 16px}
.theme-switch .topt{
  flex:1;text-align:center;padding:9px;font-size:13px;font-weight:600;
  color:var(--text-secondary);border-radius:9px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:all .15s;
}
.theme-switch .topt.active{background:var(--surface-0);color:var(--text)}
html[data-theme="light"] .theme-switch .topt.active{box-shadow:0 1px 4px rgba(0,0,0,.12)}

/* ── SPLIT PAY ───────────────────────────────────────────────────────────── */
.split-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0}
.split-row+.split-row{border-top:0.5px solid var(--border)}

/* ── STAT LABEL ──────────────────────────────────────────────────────────── */
.stat-label{font-size:12px;color:var(--text-muted);padding:6px 16px}

/* ── TIMELINE ────────────────────────────────────────────────────────────── */
.timeline{position:relative;padding-left:16px}
.timeline::before{content:"";position:absolute;left:5px;top:4px;bottom:4px;width:1px;background:var(--border-strong)}
.tl-item{position:relative;margin-bottom:12px;cursor:pointer}
.tl-item:last-child{margin-bottom:0}
.tl-dot{position:absolute;left:-16px;top:4px;width:7px;height:7px;border-radius:50%;background:var(--text-muted)}
.tl-item:first-child .tl-dot{background:var(--green)}
.tl-time{font-size:11px;color:var(--text-muted)}
.tl-name{font-size:13px;font-weight:500;margin:1px 0 0}

/* ── FADE IN ─────────────────────────────────────────────────────────────── */
[id^="view-"]{animation:fadein .18s ease}
@keyframes fadein{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* ── HOME STAT (для страницы мойщиков) ──────────────────────────────────── */
.home-stat-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 16px 0}
.home-stat-box{background:var(--glass);border-radius:var(--radius-md);padding:14px 16px;border:1px solid var(--glass-border);backdrop-filter:blur(var(--blur-glass));-webkit-backdrop-filter:blur(var(--blur-glass))}
.home-stat-box span{font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:4px;margin-bottom:4px;font-weight:500}
.home-stat-box b{font-size:20px;font-weight:700}

/* ── TOOLTIP / BADGE ─────────────────────────────────────────────────────── */
.trend-pill{
  display:inline-flex;align-items:center;
  font-size:11px;font-weight:700;
  padding:3px 8px;border-radius:10px;
  background:rgba(52,199,89,.18);color:var(--green);
}
.trend-pill.negative{background:rgba(255,59,48,.15);color:var(--red)}

/* ── REPORTS STAT GRID ───────────────────────────────────────────────────── */
.rstat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 16px 0}
.rstat-box{background:var(--glass);border-radius:var(--radius-md);padding:14px 16px;border:1px solid var(--glass-border);backdrop-filter:blur(var(--blur-glass));-webkit-backdrop-filter:blur(var(--blur-glass))}
.rstat-box p:first-child{font-size:12px;color:var(--text-secondary);margin-bottom:6px;display:flex;align-items:center;gap:5px}
.rstat-box p:last-child{font-size:19px;font-weight:700}

/* ── EXPENSE SUM ROW ─────────────────────────────────────────────────────── */
.expenses-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:0 4px;
}
.expenses-header .sum{font-size:13px;font-weight:700;color:var(--red)}

/* ── РАСХОД TOTAL CARD ───────────────────────────────────────────────────── */
.total-card{
  margin:0 16px;background:var(--surface-1);border-radius:16px;
  padding:14px 16px;border:0.5px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
}
.total-card .tl{font-size:14px;color:var(--text-secondary)}
.total-card .tr{font-size:24px;font-weight:700}

/* ── REDUCE MOTION ───────────────────────────────────────────────────────── */
@media(prefers-reduced-motion:reduce){
  .btn,.quick-btn,.preset-chip,.tick,.chip-label,.row,.tile,[id^="view-"]{
    animation:none!important;transition:opacity .15s linear!important;
  }
  .btn:active,.quick-btn:active,.preset-chip:active,.tile:active{transform:none!important}
}

<body>
<div class="orb-bg"><div class="orb orb-a"></div><div class="orb orb-b"></div><div class="orb orb-c"></div></div>
<div class="container">
  <div id="view-home"></div>
  <div id="view-add" class="hidden"></div>
  <div id="view-reports" class="hidden"></div>
  <div id="view-workers" class="hidden"></div>
  <div id="view-settings" class="hidden"></div>
</div>

<div class="tabbar">
  <div class="tab active" id="tab-home" data-tab="home"><i class="ti ti-home"></i>Главная</div>
  <div class="tab" id="tab-cash" data-tab="cash"><i class="ti ti-cash"></i>Касса</div>
  <div class="tab" id="tab-cars" data-tab="all-cars"><i class="ti ti-car"></i>Машины</div>
  <div class="tab" id="tab-finance" data-tab="finance"><i class="ti ti-receipt"></i>Финансы</div>
  <div class="tab" id="tab-my-stats" data-tab="my-stats"><i class="ti ti-wallet"></i>Моя смена</div>
  <div class="tab" id="tab-more" data-tab="more"><i class="ti ti-dots"></i>Ещё</div>
</div>

<script>
/* ─── INIT ──────────────────────────────────────────────────────────────── */
const tg = window.Telegram.WebApp;
tg.ready(); tg.expand();
try{ tg.setHeaderColor("#08080B"); tg.setBackgroundColor("#08080B"); }catch(e){}

window.addEventListener("error", (e) => {
  const el = document.getElementById("view-home");
  if(el && !el.innerHTML.trim()){
    el.innerHTML = `<div class="px" style="padding-top:20px"><p class="empty">Ошибка: ${e.message||"неизвестная"}<br><button class="btn secondary btn-sm" style="margin-top:12px" onclick="location.reload()">Обновить</button></p></div>`;
  }
});

const API = "";
const initData = tg.initData || "";
const headers = {"Content-Type":"application/json","X-Init-Data":initData};

let CFG = null, ME = null;
let BRANCH = (tg.initDataUnsafe?.start_param) || null;
let selectedServices = [], customServices = [];

async function api(path, opts={}) {
  const res = await fetch(API+path, {...opts, headers:{...headers,...(opts.headers||{})}});
  if(!res.ok){ tg.showAlert("Ошибка: "+(await res.text())); throw new Error("api"); }
  const ct = res.headers.get("content-type")||"";
  return ct.includes("application/json") ? res.json() : res;
}
function fmt(n){ return (n||0).toLocaleString("ru-RU")+" ₽"; }
function haptic(type="light"){ try{ tg.HapticFeedback.impactOccurred(type); }catch(e){} }
let _toastTimer=null;
function toast(text,type="success"){
  let wrap=document.querySelector(".toast-wrap");
  if(!wrap){
    wrap=document.createElement("div");
    wrap.className="toast-wrap";
    document.body.appendChild(wrap);
  }
  const icon=type==="success"?"ti-circle-check":"ti-alert-circle";
  wrap.innerHTML=`<div class="toast ${type}"><i class="ti ${icon}"></i>${text}</div>`;
  const el=wrap.querySelector(".toast");
  requestAnimationFrame(()=>el.classList.add("show"));
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>{ el.classList.remove("show"); },1800);
}
function initials(name){ return (name||"?").trim().split(/\s+/).map(w=>w[0]).slice(0,2).join("").toUpperCase(); }
const AVATAR_COLORS = ["#FF9F0A","#FF453A","#33D17A","#0A84FF","#BF5AF2","#64D2FF","#FFD60A"];
function avatarColor(name){ let h=0; for(const c of (name||"")) h=(h*31+c.charCodeAt(0))>>>0; return AVATAR_COLORS[h%AVATAR_COLORS.length]; }
function paymentLabel(c){
  if(c.payment_split) return Object.entries(c.payment_split).map(([k,v])=>`${k} ${v}₽`).join(" + ");
  return c.payment;
}
function skeleton(n=3){ return Array(n).fill('<div class="skeleton"></div>').join(""); }
function emptyState(icon,text,cta){
  return `<div class="empty-state">
    <div class="empty-state-icon"><i class="ti ${icon}"></i></div>
    <div class="empty-state-text">${text}</div>
    ${cta?`<button class="btn btn-sm" onclick="${cta.onclick}"><i class="ti ${cta.icon||"ti-plus"}"></i>${cta.label}</button>`:""}
  </div>`;
}

/* ─── WAVE CHART ─────────────────────────────────────────────────────────── */
function buildWaveSvg(values, activeIdx, maxVal, lineColor){
  const w=300,h=44,n=values.length,pad=4;
  const stepX=(w-pad*2)/(Math.max(n-1,1));
  const pts=values.map((v,i)=>{
    const x=pad+i*stepX;
    const y=h-pad-((v||0)/maxVal)*(h-pad*2);
    return [x,y];
  });
  let d=`M ${pts[0][0]} ${pts[0][1]}`;
  for(let i=0;i<pts.length-1;i++){
    const [x0,y0]=pts[i],[x1,y1]=pts[i+1];
    const mx=(x0+x1)/2;
    d+=` C ${mx} ${y0}, ${mx} ${y1}, ${x1} ${y1}`;
  }
  const areaD = d + ` L ${pts[pts.length-1][0]} ${h} L ${pad} ${h} Z`;
  const dots=pts.map(([x,y],i)=>i<=activeIdx
    ?`<circle cx="${x}" cy="${y}" r="${i===activeIdx?4.5:2}" fill="${lineColor}" ${i===activeIdx?`stroke="rgba(255,255,255,0.3)" stroke-width="3"`:""}/>`
    :"").join("");
  const gradId=`g${Math.random().toString(36).slice(2,6)}`;
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <defs><linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${lineColor}" stop-opacity="0.2"/><stop offset="100%" stop-color="${lineColor}" stop-opacity="0"/></linearGradient></defs>
    <path d="${areaD}" fill="url(#${gradId})"/>
    <path d="${d}" fill="none" stroke="${lineColor}" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
    ${dots}
  </svg>`;
}

/* ─── ТЕМА ───────────────────────────────────────────────────────────────── */
function applyTheme(t){
  document.documentElement.setAttribute("data-theme",t);
  try{ localStorage.setItem("cf_theme",t); }catch(e){}
  try{
    if(t==="light"){ tg.setHeaderColor("#F4F5F8"); tg.setBackgroundColor("#F4F5F8"); }
    else{ tg.setHeaderColor("#08080B"); tg.setBackgroundColor("#08080B"); }
  }catch(e){}
}
function currentTheme(){ return document.documentElement.getAttribute("data-theme")||(tg.colorScheme==="light"?"light":"dark"); }
window.setTheme=(t)=>{ haptic(); applyTheme(t); const el=document.getElementById("theme-switch"); if(el) el.outerHTML=renderThemeSwitch(); };
function renderThemeSwitch(){
  const t=currentTheme();
  return `<div class="theme-switch" id="theme-switch" style="margin:14px 16px 0">
    <div class="topt ${t==="dark"?"active":""}" onclick="setTheme('dark')"><i class="ti ti-moon"></i>Тёмная</div>
    <div class="topt ${t==="light"?"active":""}" onclick="setTheme('light')"><i class="ti ti-sun"></i>Светлая</div>
  </div>`;
}

/* ─── LOADING BTN ────────────────────────────────────────────────────────── */
async function withLoading(btn, fn){
  if(!btn||btn.classList.contains("loading")) return;
  btn.classList.add("loading");
  try{ await fn(); }finally{ btn.classList.remove("loading"); }
}

/* ─── BOTTOM SHEET ───────────────────────────────────────────────────────── */
function ensureSheetHost(){
  if(document.getElementById("sheet-backdrop")) return;
  document.body.insertAdjacentHTML("beforeend",`<div class="sheet-backdrop" id="sheet-backdrop" onclick="closeSheet()"></div><div class="sheet" id="sheet"></div>`);
}
function openSheet(title, actions){
  ensureSheetHost();
  const sheet=document.getElementById("sheet");
  sheet.innerHTML=`<div class="handle"></div><div class="sheet-title">${title}</div>`+
    actions.map(a=>`<div class="sheet-action ${a.destructive?"destructive":""}" onclick="closeSheet();(${a.fn})()"><i class="ti ${a.icon}"></i>${a.label}</div>`).join("");
  document.getElementById("sheet-backdrop").classList.add("show");
  sheet.classList.add("show");
}
window.closeSheet=()=>{
  const s=document.getElementById("sheet"),b=document.getElementById("sheet-backdrop");
  if(s) s.classList.remove("show");
  if(b) b.classList.remove("show");
};
window.openSheet=openSheet;

/* ─── PULL TO REFRESH ────────────────────────────────────────────────────── */
function attachPullToRefresh(viewId, onRefresh){
  const el=document.getElementById(viewId);
  if(!el||el.dataset.ptrBound) return;
  el.dataset.ptrBound="1";
  let startY=null,pulling=false;
  const ind=document.createElement("div");
  ind.className="ptr-indicator";
  ind.innerHTML=`<i class="ti ti-loader-2"></i>`;
  el.prepend(ind);
  el.addEventListener("touchstart",e=>{ if(el.scrollTop<=0){startY=e.touches[0].clientY;pulling=true;} },{passive:true});
  el.addEventListener("touchmove",e=>{
    if(!pulling||startY===null) return;
    const dy=e.touches[0].clientY-startY;
    if(dy>0&&el.scrollTop<=0) ind.style.height=Math.min(50,dy*.5)+"px";
  },{passive:true});
  el.addEventListener("touchend",async()=>{
    if(!pulling) return;
    const h=parseInt(ind.style.height||"0",10);
    pulling=false;startY=null;
    if(h>30){haptic("medium");await onRefresh();}
    ind.style.height="0px";
  });
}

/* ─── TABS ───────────────────────────────────────────────────────────────── */
document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>{ haptic(); switchTab(t.dataset.tab); }));
function switchTab(name, editNum){
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.tab===name));
  document.querySelectorAll("[id^=view-]").forEach(v=>v.classList.add("hidden"));
  const viewEl=document.getElementById("view-"+name);
  if(viewEl) viewEl.classList.remove("hidden");
  if(name==="home") renderHome();
  if(name==="add") renderAdd(editNum);
  if(name==="reports") renderReports();
  if(name==="workers") renderWorkers();
  if(name==="my-stats") renderMyStats();
  if(name==="settings") renderSettings();
  if(name==="schedule") renderScheduleWeek();
  if(name==="employees") renderEmployees();
}

async function ensureMe(){
  // ВАЖНО: ME кэшируется по BRANCH — если запросили ME для одного филиала,
  // а BRANCH сменился, нельзя переиспользовать старый ответ (иначе роль
  // "протекает" с одного филиала на другой, например мойщик выглядит
  // админом там, где он не назначен админом).
  if(!ME || ME.__branch !== BRANCH){
    ME = await api(`/api/me?branch=${encodeURIComponent(BRANCH||"")}`);
    ME.__branch = BRANCH;
  }
  // Права считаем СТРОГО по текущему филиалу: владелец или назначенный
  // админ именно этого филиала. Всё остальное — ограниченный доступ
  // "мойщика", независимо от того, числится ли человек сотрудником
  // именно этого филиала (по умолчанию — минимум прав, а не максимум).
  const isPrivileged = !!ME.is_owner || !!ME.is_branch_admin;
  document.getElementById("tab-my-stats")?.classList.toggle("hidden", !ME.is_employee);
  ["tab-home","tab-cash","tab-cars","tab-finance","tab-more"].forEach(id=>{
    document.getElementById(id)?.classList.toggle("hidden", !isPrivileged);
  });
  if(!isPrivileged && document.querySelector(".tab.active")?.dataset.tab!=="my-stats"){
    switchTab("my-stats");
  }
  return ME;
}

/* ─── BRANCH PICKER ──────────────────────────────────────────────────────── */
async function ensureBranch(){
  if(BRANCH) return;
  const el=document.getElementById("view-home");
  el.innerHTML=`<div class="topbar"><div><div class="topbar-title">ClaudeFormula 2.0</div><div style="font-size:12px;color:var(--text-muted);margin-top:2px">Выберите филиал</div></div></div>${skeleton(3)}`;
  try{ CFG=CFG||await api("/api/config"); }
  catch(e){
    el.innerHTML=`<div class="topbar"><div><div class="topbar-title">ClaudeFormula 2.0</div></div></div><div style="padding:24px 16px"><p class="empty">Не удалось связаться с сервером.<br>Проверь подключение.</p><div class="btn-wrap"><button class="btn secondary" onclick="location.reload()">Обновить</button></div></div>`;
    return;
  }
  let branchStats = [];
  try {
    const r = await api("/api/branches/summary");
    branchStats = r.branches || [];
  } catch(e){}
  const statByBranch = {};
  branchStats.forEach(b => { statByBranch[b.branch] = b; });

  el.innerHTML=`
    <div class="topbar"><div><div class="topbar-title">Выбери филиал</div></div></div>
    <div style="padding:8px 0">
      ${CFG.branches.map((b)=>{
        const st = statByBranch[b] || { total: 0, cars: 0, trend: [0,0,0,0,0] };
        const maxT = Math.max(1, ...st.trend);
        const pts = st.trend.map((v,i) => `${i*20},${30 - Math.round((v/maxT)*26)}`).join(" ");
        const trendUp = st.trend[st.trend.length-1] >= (st.trend[0] || 0);
        return `
        <div class="branch-card" onclick="pickBranch('${b.replace(/'/g,"\\'")}')">
          <div>
            <div class="bc-pin"><i class="ti ti-map-pin"></i>${b}</div>
            <div class="bc-amount">${fmt(st.total)}</div>
            <div class="bc-sub">${st.cars} машин сегодня</div>
          </div>
          <div class="bc-right">
            <i class="ti ${trendUp?'ti-trending-up':'ti-trending-down'} bc-trend" style="color:${trendUp?'var(--green)':'var(--red)'}"></i>
            <svg class="bc-mini-chart" viewBox="0 0 80 30"><polyline points="${pts}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
        </div>`;
      }).join("")}
    </div>`;
}
window.pickBranch=(b)=>{ BRANCH=b; ME=null; haptic("medium"); switchTab("home"); };

/* ─── ГЛАВНАЯ ────────────────────────────────────────────────────────────── */
async function renderHome(){
  if(!BRANCH) return ensureBranch();
  await ensureMe();
  if(document.querySelector(".tab.active")?.dataset.tab!=="home") return;
  const el=document.getElementById("view-home");
  el.innerHTML=`<div class="home-wrap"><div class="home-topbar"><div class="home-who"><div class="home-avatar">${initials(ME?.name||"")}</div><div class="home-who-text"><div class="hi">${greetingWord()}</div><div class="name">${(ME?.name||"").split(/\s+/)[0]||"—"}</div></div></div><div class="home-branch-chip" onclick="switchBranch()"><span>${BRANCH}</span><i class="ti ti-chevron-down"></i></div></div>${skeleton(4)}</div>`;
  const [{session,summary},{workers,schedule},week]=await Promise.all([
    api(`/api/session?branch=${encodeURIComponent(BRANCH)}`),
    api(`/api/workers?branch=${encodeURIComponent(BRANCH)}`),
    api(`/api/reports/week?branch=${encodeURIComponent(BRANCH)}`).catch(()=>({grand_total:0,days:[]})),
  ]);
  const totalSalary=Object.values(summary.washer_salaries||{}).reduce((a,b)=>a+b,0);
  const avgCheck=session.cars.length?Math.round(summary.total/session.cars.length):0;
  const now=new Date(), todayIdx=(now.getDay()+6)%7;
  const byDate={};
  (week.days||[]).forEach(d=>{byDate[d.date]=d.total;});
  const weekTotals=[];
  for(let i=0;i<=todayIdx;i++){
    const dt=new Date(now); dt.setDate(now.getDate()-(todayIdx-i));
    const key=dt.toLocaleDateString("ru-RU").split(".").map((p,idx)=>idx<2?p.padStart(2,"0"):p).join(".");
    weekTotals.push(byDate[key]||0);
  }
  const maxVal=Math.max(1,...weekTotals);
  const waveSvg=buildWaveSvg(weekTotals,todayIdx,maxVal,"#fff");

  const prevAvg=weekTotals.slice(0,-1).reduce((a,b)=>a+b,0)/Math.max(1,weekTotals.length-1);
  const trendPct=prevAvg>0?Math.round(((summary.total-prevAvg)/prevAvg)*100):null;
  const trendBadge=trendPct===null?"":
    `<div class="home-hero-badge${trendPct<0?" negative":""}"><i class="ti ${trendPct<0?"ti-trending-down":"ti-trending-up"}" style="font-size:12px"></i>${trendPct>=0?"+":""}${trendPct}%</div>`;

  const workingCount=workers.filter(w=>schedule?.[w]?.working!==false).length;
  const teamHtml=workers.slice(0,6).map(w=>{
    const working=schedule?.[w]?.working!==false;
    const col=avatarColor(w);
    const salary=(summary.washer_salaries||{})[w]||0;
    return `<div class="home-member" onclick="uiWorkerQuick('${w.replace(/'/g,"\\'")}')">
      <div class="av" style="background:linear-gradient(140deg,${col}33,${col}11);color:${col}">${initials(w)}<span class="dot${working?"":" off"}"></span></div>
      <div class="nm">${w}</div>
      <div class="amt">${fmt(salary)}</div>
    </div>`;
  }).join("");
  const moreTeam=workers.length>6?`<div class="home-member more" onclick="switchTab('workers')"><div class="av"><i class="ti ti-dots"></i></div><div class="nm">Ещё</div></div>`:"";

  const recentRows=session.cars.length?session.cars.slice().reverse().slice(0,4).map(c=>{
    const paid=c.payment!=="Долг"&&c.payment!=="unpaid";
    return `<div class="row" onclick="switchTab('cash')">
      <div class="home-row-ic"><i class="ti ti-car"></i></div>
      <div class="home-row-mid"><div class="home-row-title">${c.num||c.brand||"Машина"}${c.service?" · "+c.service:""}</div><div class="home-row-sub">${c.washer||""}${c.time?" · "+c.time:""}</div></div>
      <div class="home-row-right"><div class="home-row-price">${fmt(c.total||0)}</div><span class="pill ${paid?"ok":"wip"}">${paid?"Оплачено":"В работе"}</span></div>
    </div>`;
  }).join(""):"";

  el.innerHTML=`
    <div class="home-wrap">
      <div class="home-topbar">
        <div class="home-who">
          <div class="home-avatar">${initials(ME?.name||"")}</div>
          <div class="home-who-text"><div class="hi">${greetingWord()}</div><div class="name">${(ME?.name||"").split(/\s+/)[0]||"—"}</div></div>
        </div>
        <div class="home-branch-chip" onclick="switchBranch()"><span>${BRANCH}</span><i class="ti ti-chevron-down"></i></div>
      </div>

      <div class="hero-glass home-hero">
        <div class="home-hero-top">
          <div class="home-hero-label">Выручка сегодня</div>
          ${trendBadge}
        </div>
        <div class="home-hero-sum">${(summary.total||0).toLocaleString("ru-RU")} <span>₽</span></div>
        <div class="home-hero-sub">${session.cars.length} машин${workers.length?" · "+workingCount+" мойщик"+(workingCount===1?"":workingCount<5?"а":"ов")+" на смене":""}</div>

window.toggleHomeCarStatus=async(num,cur)=>{
  haptic("medium");
  const next=cur==="done"?"in_progress":"done";
  try{
    await api(`/api/car/${encodeURIComponent(BRANCH)}/${num}/status`,{method:"PATCH",body:JSON.stringify({status:next})});
    const car=HOME_CARS.find(c=>c.num===num);
    if(car) car.status=next;
    renderHomeSwipeCard();
  }catch(e){}
};
function renderHomeSwipeCard(){
  const wrap=document.getElementById("home-swipe-wrap");
  if(!wrap) return;
  if(!HOME_CARS.length){wrap.innerHTML=emptyState("ti-car","Сегодня ещё не было ни одной машины",{label:"Добавить машину",onclick:"switchTab('add')"});return;}
  if(HOME_IDX<0) HOME_IDX=HOME_CARS.length-1;
  if(HOME_IDX>=HOME_CARS.length) HOME_IDX=0;
  const c=HOME_CARS[HOME_IDX];
  const dots=HOME_CARS.slice(0,8).map((_,i)=>`<span class="${i===HOME_IDX?"on":""}"></span>`).join("");
  const cStatus=c.status||"done";
  const isDone=cStatus==="done";
  const statusLabel=isDone?"Оплачено":"В работе";
  const statusColor=isDone?"#22C55E":"#F97316";
  wrap.innerHTML=`
    <div class="swipe-card" id="home-swipe-el">
      <span class="sc-counter">${HOME_IDX+1}/${HOME_CARS.length}</span>
      <p class="sc-car">${c.car||"Машина"}</p>
      <p class="sc-sub">${c.employee} · ${c.service}</p>
      <p class="sc-price">${fmt(c.price)}</p>
      <div style="display:flex;align-items:center;gap:10px;margin-top:10px">
        <span class="sc-status" style="background:${statusColor}22;color:${statusColor}" onclick="toggleHomeCarStatus(${c.num},'${cStatus}')">${statusLabel}</span>
        <span style="font-size:12px;color:var(--text-muted);cursor:pointer" onclick="uiCarQuick(${c.num})">Удалить</span>
      </div>
    </div>
    <div class="swipe-nav">
      <button onclick="homeSwipeStep(-1)"><i class="ti ti-chevron-left"></i></button>
      <div class="swipe-dots">${dots}</div>
      <button onclick="homeSwipeStep(1)"><i class="ti ti-chevron-right"></i></button>
    </div>`;
  const el=document.getElementById("home-swipe-el");
  let startX=null;
  el.addEventListener("touchstart",e=>{startX=e.touches[0].clientX;});
  el.addEventListener("touchend",e=>{
    if(startX===null) return;
    const dx=e.changedTouches[0].clientX-startX;
    if(Math.abs(dx)>40) homeSwipeStep(dx<0?1:-1);
    startX=null;
  });
}

window.uiAddIncomeSplit=(name,amount)=>{
  const cashStr=window.prompt(`Сколько наличными из ${fmt(amount)}₽?`,"0");
  const cash=parseInt((cashStr||"").replace(/[^\d]/g,""),10)||0;
  const visaStr=window.prompt(`Сколько по Visa?`,"0");

  const split={};
  if(cash) split["нал"]=cash;

  api("/api/income",{method:"POST",body:JSON.stringify({branch:BRANCH,name,amount:total,payment_split:split})})

function renderSplitInputs(){

  const on=document.getElementById("f-split-toggle").checked;

  wrap.innerHTML=`<div class="card card-pad" style="margin:0 16px 12px">
    ${CFG.payment_types.map(p=>`
      <div class="split-row">

function getSplitValues(){
  return [...document.querySelectorAll(".split-input")].reduce((acc,inp)=>{
    const v=parseInt(inp.value||"0",10);if(v) acc[inp.dataset.method]=v;return acc;
  },{});
}
function updateTotal(){
  const bodyType=document.getElementById("f-body")?.value;
  let total=selectedServices.reduce((sum,k)=>{
    const s=CFG.services.find(s=>s.key===k);
    return sum+(s.prices[bodyType]??Object.values(s.prices)[0]);
  },0);
  total+=customServices.reduce((sum,c)=>sum+c.price,0);
  const totalEl=document.getElementById("f-total");
  if(totalEl) totalEl.textContent=fmt(total);
  const hint=document.getElementById("f-split-hint");
  if(document.getElementById("f-split-toggle")?.checked&&hint){
    const sum=Object.values(getSplitValues()).reduce((a,b)=>a+b,0);
    const diff=total-sum;
    hint.textContent=diff===0?"Сумма сходится ✓":`Осталось: ${fmt(diff)}`;
    hint.style.color=diff===0?"var(--green)":"var(--red)";
  }
}
window.submitCar=async()=>{
  const btn=document.getElementById("f-submit");
  if(!selectedServices.length&&!customServices.length) return tg.showAlert("Выбери хотя бы одну услугу");
  const emp=document.getElementById("f-emp").value;
  if(!emp) return tg.showAlert("Сначала добавь сотрудника");
  const isSplit=document.getElementById("f-split-toggle").checked;
  let paymentSplit=null;
  if(isSplit){
    paymentSplit=getSplitValues();
    const total=parseInt((document.getElementById("f-total").textContent||"0").replace(/\D/g,""),10);
    const sum=Object.values(paymentSplit).reduce((a,b)=>a+b,0);
    if(!Object.keys(paymentSplit).length) return tg.showAlert("Укажи суммы по способам оплаты");
    if(sum!==total) return tg.showAlert(`Сумма оплаты (${sum}₽) ≠ стоимости (${total}₽)`);
  }
  await withLoading(btn,async()=>{
    const body={
      branch:BRANCH,employee:emp,
      body_type:document.getElementById("f-body").value,
      service_keys:selectedServices,custom_services:customServices,
      car:document.getElementById("f-car").value,
      payment:isSplit?"Раздельно":document.getElementById("f-payment").value,
      payment_split:paymentSplit,
      comment:document.getElementById("f-comment").value,
    };
    if(EDIT_CAR_NUM){
      await api(`/api/car/${encodeURIComponent(BRANCH)}/${EDIT_CAR_NUM}`,{method:"PUT",body:JSON.stringify(body)});
      haptic("medium");toast("Изменения сохранены");switchTab("all-cars");
    }else{
      await api("/api/car",{method:"POST",body:JSON.stringify(body)});
      haptic("medium");toast("Машина добавлена");switchTab("home");
    }
  });
};

    api(`/api/reports/today?branch=${encodeURIComponent(BRANCH)}`),
    api(`/api/reports/week?branch=${encodeURIComponent(BRANCH)}`),

  const dayLetters=["Пн","Вт","Ср","Чт","Пт","Сб","Вс"];
  const now=new Date(),todayIdx=(now.getDay()+6)%7;
  const byDate={};
  (week.days||[]).forEach(d=>{byDate[d.date]=d.total;});
  const weekTotals=[];
  for(let i=0;i<=todayIdx;i++){
    const dt=new Date(now);dt.setDate(now.getDate()-(todayIdx-i));
    const key=dt.toLocaleDateString("ru-RU").split(".").map((p,idx)=>idx<2?p.padStart(2,"0"):p).join(".");
    weekTotals.push(byDate[key]||0);
  }
  const maxVal=Math.max(1,...weekTotals);

  const trendRevenue=yestTotal>0?Math.round(((today.summary.grand_total-yestTotal)/yestTotal)*100):null;

  const weekBarSvg=(()=>{
    const vals=weekTotals;

    return `<svg viewBox="0 0 ${Math.max(total,220)} ${h}" style="width:100%;height:${h}px;overflow:visible">
      ${vals.map((v,i)=>{
        const bh=Math.max(4,Math.round(v/max*(h-6)));
        const x=i*(bw+gap);
        const active=i===vals.length-1;

      </div>

      </div>
      <div class="hc-amount">${fmt(avgCheck)}</div>
      <div class="wave-chart">${buildWaveSvg(weekTotals.map(v=>v||1),todayIdx,maxVal,"#fff")}</div>

    <div class="rstat-grid">

    <div class="section-label">Расходы<span style="color:var(--red);font-size:13px;font-weight:700">-${fmt(today.summary.total_expenses||0)}</span></div>

        ?(today.session.expenses||[]).map(e=>`<div class="expense-row"><span class="expense-name">${e.name}</span><span class="expense-amount">-${fmt(e.amount)}</span></div>`).join("")

          </div>
        </div>
      </div>
    </div>`;
  }).join("");
  wrap.querySelectorAll(".swipe-item").forEach(item=>bindSwipeToDelete(item));

function bindSwipeToDelete(item){
  const fg=item.querySelector(".swipe-fg"),num=parseInt(item.dataset.num,10);
  let startX=null,dx=0,dragging=false,moved=false;
  fg.addEventListener("touchstart",e=>{startX=e.touches[0].clientX;dragging=true;fg.classList.add("dragging");moved=false;});
  fg.addEventListener("touchmove",e=>{
    if(!dragging) return;dx=e.touches[0].clientX-startX;
    if(Math.abs(dx)>6) moved=true;
    if(dx<0) fg.style.transform=`translateX(${Math.max(dx,-84)}px)`;
  });
  fg.addEventListener("touchend",()=>{
    dragging=false;fg.classList.remove("dragging");
    if(dx<-50) fg.style.transform="translateX(-84px)";
    else fg.style.transform="translateX(0)";dx=0;
  });
  fg.addEventListener("click",e=>{if(moved){e.stopPropagation();e.preventDefault();}});
}
function bindLongPress(el,onLongPress){
  let timer=null,moved=false,startX=0,startY=0;
  const clear=()=>{if(timer){clearTimeout(timer);timer=null;}};
  el.addEventListener("touchstart",e=>{moved=false;startX=e.touches[0].clientX;startY=e.touches[0].clientY;timer=setTimeout(()=>{if(!moved){haptic("medium");onLongPress();}},480);},{passive:true});
  el.addEventListener("touchmove",e=>{if(Math.abs(e.touches[0].clientX-startX)>10||Math.abs(e.touches[0].clientY-startY)>10){moved=true;clear();}},{passive:true});
  el.addEventListener("touchend",clear);el.addEventListener("touchcancel",clear);
}
window.openCarQuickMenu=(num)=>{

  const discount=ALL_LOYALTY.filter(l=>l.car_num===num).reduce((s,l)=>s+(l.discount||0),0);
  openSheet(`${c.car||"Машина"} · ${fmt(c.price)}`,[
    {icon:"ti-pencil",label:"Изменить",fn:`()=>switchTab('add',${num})`},
    {icon:"ti-discount-2",label:discount?`Скидка: ${fmt(discount)} (изменить)`:"Добавить скидку",fn:`()=>editCarLoyalty(${num})`},
    {icon:"ti-trash",label:"Удалить",destructive:true,fn:`()=>delCar(${num})`},
  ]);
};
window.editCarLoyalty=async(num)=>{
  const existing=ALL_LOYALTY.map((l,idx)=>({...l,idx})).filter(l=>l.car_num===num);
  const currentTotal=existing.reduce((s,l)=>s+(l.discount||0),0);
  const amountStr=window.prompt("Скидка по этой машине (₽), 0 — убрать:",String(currentTotal||""));
  if(amountStr===null) return;
  const amount=parseInt(amountStr||"0",10)||0;
  haptic("medium");
  try{
    // Убираем старые записи скидки по этой машине и (если нужно) добавляем новую —
    // так один car_num всегда соответствует ОДНОЙ актуальной скидке, без дублей.
    for(const l of existing.slice().reverse()){
      await api(`/api/loyalty/${encodeURIComponent(BRANCH)}/${l.idx}`,{method:"DELETE"});
    }
    if(amount>0){
      await api("/api/loyalty",{method:"POST",body:JSON.stringify({branch:BRANCH,car_num:num,discount:amount})});
    }
    toast(amount>0?"Скидка сохранена":"Скидка удалена");
    renderAllCars();
  }catch(e){ tg.showAlert(e.message||"Не удалось сохранить скидку"); }
};

      {id:"cancel",type:"cancel"},
    ],
  },(id)=>{
    if(id==="schedule") switchTab("schedule");
    else if(id==="add") uiAddWorker();
  });
};

/* ─── WORKER ACTIONS ─────────────────────────────────────────────────────── */
window.uiWorkerRow=(name)=>{
  tg.showPopup({
    title:name,message:"Что сделать с сотрудником?",
    buttons:[
      {id:"schedule",type:"default",text:"График работы"},
      {id:"admin",type:"default",text:"Назначить админом"},
      {id:"remove",type:"destructive",text:"Удалить"},
      {id:"cancel",type:"cancel"},
    ],
  },async(id)=>{
    if(id==="remove"){
      try{await api(`/api/workers/${encodeURIComponent(BRANCH)}/${encodeURIComponent(name)}`,{method:"DELETE"});haptic("medium");toast("Мойщик удалён");renderSettings();}catch(e){}
    }else if(id==="admin"){
      const idStr=window.prompt(`Telegram ID для ${name}:`);const uid=parseInt(idStr||"",10);if(!uid) return;
      try{await api("/api/branch-admin",{method:"POST",body:JSON.stringify({branch:BRANCH,user_id:uid})});haptic("medium");tg.showAlert("Админ назначен");}catch(e){}
    }else if(id==="schedule"){uiSetSchedule(name);}
  });
};
window.uiSetSchedule=(name)=>{
  const refresh=()=>{ const t=document.querySelector(".tab.active")?.dataset.tab||"home"; switchTab(t); };
  const pattern=window.prompt(`График для ${name}\n"3/1" — 3 рабочих, 1 выходной.\nПусто = доступен всегда.`,"3/1");
  if(pattern===null) return;
  if(pattern.trim()===""){
    api(`/api/schedule/${encodeURIComponent(BRANCH)}/${encodeURIComponent(name)}`,{method:"DELETE"})
      .then(()=>{haptic("medium");tg.showAlert("График сброшен");refresh();}).catch(()=>{});
    return;
  }
  const m=pattern.trim().match(/^(\d+)\s*\/\s*(\d+)$/);
  if(!m) return tg.showAlert('Формат: "3/1"');
  const work_days=parseInt(m[1],10),rest_days=parseInt(m[2],10);
  const startStr=window.prompt("С какой даты (ГГГГ-ММ-ДД)?",new Date().toISOString().slice(0,10));
  if(!startStr) return;
  api("/api/schedule",{method:"POST",body:JSON.stringify({branch:BRANCH,name,work_days,rest_days,start_date:startStr})})
    .then(()=>{haptic("medium");tg.showAlert(`График ${work_days}/${rest_days} установлен`);refresh();}).catch(()=>{});
};
window.switchBranch=()=>{BRANCH=null;ME=null;switchTab("home");};
window.uiAddWorker=async()=>{
  const name=window.prompt("Имя мойщика:");if(!name) return;
  try{await api("/api/workers",{method:"POST",body:JSON.stringify({branch:BRANCH,name})});haptic("medium");toast("Мойщик добавлен");renderWorkers();}catch(e){}
};
window.uiSetBranchAdmin=async()=>{
  const idStr=window.prompt("Telegram ID нового админа:");const uid=parseInt(idStr||"",10);if(!uid) return;
  try{await api("/api/branch-admin",{method:"POST",body:JSON.stringify({branch:BRANCH,user_id:uid})});haptic("medium");tg.showAlert("Админ назначен");}catch(e){}
};
window.uiAddUser=async()=>{
  const idStr=window.prompt("Telegram ID пользователя:");const uid=parseInt(idStr||"",10);if(!uid) return;
  const name=window.prompt("Имя пользователя:","")||"Без имени";
  try{await api("/api/users",{method:"POST",body:JSON.stringify({user_id:uid,name})});haptic("medium");tg.showAlert("Доступ выдан");}catch(e){}
};
window.uiRemoveUser=async()=>{
  const idStr=window.prompt("Telegram ID для удаления:");const uid=parseInt(idStr||"",10);if(!uid) return;
  try{await api(`/api/users/${uid}`,{method:"DELETE"});haptic("medium");tg.showAlert("Доступ отозван");}catch(e){}
};
window.uiListUsers=async()=>{
  try{const {users}=await api("/api/users");const lines=users.map(u=>`${u.name} — ${u.user_id}`).join("\n")||"Список пуст";tg.showAlert(lines);}catch(e){}
};

/* ─── ФИНАНСЫ (новый раздел) ─────────────────────────────────────────────── */
async function renderFinance(){
  if(!BRANCH) return ensureBranch();
  const el=document.getElementById("view-finance");
  el.innerHTML=`<div class="topbar"><div><div class="topbar-title">Финансы</div><div class="topbar-sub">${BRANCH}</div></div></div>${skeleton(4)}`;
  let session,summary;
  try{ ({session,summary}=await api(`/api/session?branch=${encodeURIComponent(BRANCH)}`)); }
  catch(e){ el.innerHTML=`<div class="topbar"><div><div class="topbar-title">Финансы</div></div></div><div class="px" style="padding-top:20px"><p class="empty">Не удалось загрузить данные.</p></div>`; return; }
  const expenses=session.expenses||[], incomes=session.incomes||[];
  const net=(summary.total_incomes||0)-(summary.total_expenses||0);
  el.innerHTML=`
    <div class="topbar"><div><div class="topbar-title">Финансы</div><div class="topbar-sub">${BRANCH} · сегодня</div></div></div>
    <div style="display:flex;gap:10px;padding:0 16px 4px">
      <div class="total-card" style="flex:1;margin:0"><div class="tl">Доходы</div><div class="tr" style="color:var(--green)">+${fmt(summary.total_incomes||0)}</div></div>
      <div class="total-card" style="flex:1;margin:0"><div class="tl">Расходы</div><div class="tr" style="color:var(--red)">-${fmt(summary.total_expenses||0)}</div></div>
    </div>
    <div class="total-card" style="margin-top:10px"><div class="tl">Итог за смену</div><div class="tr" style="color:${net>=0?"var(--green)":"var(--red)"}">${net>=0?"+":""}${fmt(net)}</div></div>

    <div class="section-label"><span>Расходы</span></div>
    <div class="card">
      ${expenses.length
        ?expenses.map((e,i)=>`
          <div class="expense-row">
            <span class="expense-name">${e.name}</span>
            <div class="expense-right">
              <span class="expense-amount">-${fmt(e.amount)}</span>
              <span class="expense-del" onclick="delExpense(${i})">Удалить</span>
            </div>
          </div>`).join("")
        :emptyState("ti-receipt-2","Расходов пока нет",{label:"Добавить расход",onclick:"uiAddExpense()"})}
    </div>
    <div class="btn-wrap"><button class="btn secondary btn-sm" onclick="uiAddExpense()"><i class="ti ti-plus"></i>Добавить расход</button></div>

    <div class="section-label"><span>Доходы</span></div>
    <div class="card">
      ${incomes.length
        ?incomes.map((inc,i)=>`
          <div class="expense-row">
            <span class="expense-name">${inc.name}<span style="color:var(--text-muted);font-weight:400"> · ${inc.payment_split?Object.entries(inc.payment_split).map(([k,v])=>`${k} ${v}₽`).join(" + "):(inc.payment||"нал")}</span></span>
            <div class="expense-right">
              <span class="expense-amount" style="color:var(--green)">+${fmt(inc.amount)}</span>
              <span class="expense-del" onclick="delIncome(${i})">Удалить</span>
            </div>
          </div>`).join("")
        :emptyState("ti-cash","Доходов пока нет",{label:"Добавить доход",onclick:"uiAddIncome()"})}
    </div>
    <div class="btn-wrap"><button class="btn secondary btn-sm" onclick="uiAddIncome()"><i class="ti ti-plus"></i>Добавить доход</button></div>
    <div class="btn-wrap"><button class="btn btn-sm" onclick="switchTab('reports')"><i class="ti ti-chart-bar"></i>Отчёты за период</button></div>
  `;
  attachPullToRefresh("view-finance",renderFinance);
}

/* ─── ФИЛИАЛЫ (новый раздел, для владельца) ──────────────────────────────── */

  if(!(ME?.is_owner)){
    el.innerHTML=`<div class="back-header"><div class="back-btn" onclick="switchTab('more')"><i class="ti ti-chevron-left"></i></div><span class="back-header-title">Филиалы</span></div><div class="px" style="padding-top:20px"><p class="empty">Доступно только владельцу.</p></div>`;

      {icon:"ti-chart-bar",label:"Отчёты",tab:"reports"},

/* ─── ДОПОЛНИТЕЛЬНЫЕ ЭКРАНЫ (виртуальные роуты новой навигации) ──────────── */
document.getElementById("view-home").insertAdjacentHTML("afterend",
  `<div id="view-cash" class="hidden"></div><div id="view-day-report" class="hidden"></div><div id="view-all-cars" class="hidden"></div><div id="view-history" class="hidden"></div><div id="view-schedule" class="hidden"></div><div id="view-my-stats" class="hidden"></div><div id="view-my-day-cars" class="hidden"></div><div id="view-employees" class="hidden"></div><div id="view-finance" class="hidden"></div><div id="view-more" class="hidden"></div><div id="view-branches" class="hidden"></div>`
);
const _switchTab=switchTab;
// Виртуальные роуты: экран не в основном наборе switchTab, но должен
// открываться как полноценный раздел (в т.ч. по клику в нижнем меню).
// activeTabName — на какой пункт нижнего меню подсвечиваться для этого роута
// (например «Ещё» подсвечивается и для history/schedule/employees, потому
// что физически они открываются ИЗ раздела «Ещё»).
const VIRTUAL_ROUTES={
  "day-report":{view:"view-day-report",render:()=>renderDayReport(),activeTab:"more"},
  "all-cars":{view:"view-all-cars",render:()=>renderAllCars(),activeTab:"all-cars"},
  "cash":{view:"view-cash",render:()=>renderCash(),activeTab:"cash"},
  "history":{view:"view-history",render:()=>renderHistory(),activeTab:"more"},
  "schedule":{view:"view-schedule",render:()=>renderScheduleWeek(),activeTab:"more"},
  "employees":{view:"view-employees",render:()=>renderEmployees(),activeTab:"more"},
  "my-day-cars":{view:"view-my-day-cars",render:()=>renderMyDayCars(),activeTab:"my-stats"},
  "finance":{view:"view-finance",render:()=>renderFinance(),activeTab:"finance"},
  "branches":{view:"view-branches",render:()=>renderBranchesAdmin(),activeTab:"more"},
  "more":{view:"view-more",render:()=>renderMore(),activeTab:"more"},
};
switchTab=function(name,editNum){
  const route=VIRTUAL_ROUTES[name];
  if(route){
    document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.tab===route.activeTab));
    document.querySelectorAll("[id^=view-]").forEach(v=>v.classList.add("hidden"));
    document.getElementById(route.view).classList.remove("hidden");
    route.render();
    return;
  }
  _switchTab(name,editNum);
};

switchTab("home");
</script>
