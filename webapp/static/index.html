<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>ClaudeFormula 2.0</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  :root{
    --surface-0: var(--tg-theme-bg-color, #ffffff);
    --surface-1: var(--tg-theme-secondary-bg-color, #f2f2f2);
    --text: var(--tg-theme-text-color, #000000);
    --text-secondary: #6b6b6b;
    --text-muted: var(--tg-theme-hint-color, #9a9a9a);
    --border: rgba(0,0,0,0.12);
    --red: #e53935;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --surface-0:#000000; --surface-1:#161616; --text:#ffffff;
      --text-secondary:#a0a0a0; --text-muted:#7a7a7a; --border:rgba(255,255,255,0.14);
    }
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",Segoe UI,Roboto,sans-serif;
    background:var(--surface-0); color:var(--text);
    padding-bottom: calc(90px + env(safe-area-inset-bottom));
    -webkit-font-smoothing:antialiased;
  }
  .container{padding:16px 16px 8px}
  .page-title{font-size:26px;font-weight:600;letter-spacing:-0.02em;margin:6px 0 14px}
  .section-label{font-size:13px;color:var(--text-secondary);margin:18px 2px 8px;font-weight:500}

  .topbar{background:#000;padding:20px 18px 16px;display:flex;align-items:center;gap:10px}
  .topbar span{font-size:15px;font-weight:500;color:#fff}

  .card{border:0.5px solid var(--border);border-radius:14px;overflow:hidden}
  .card + .card{margin-top:12px}
  .card-pad{padding:14px}

  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .stat-card{background:var(--surface-1);border-radius:14px;padding:1rem}
  .stat-label{font-size:12px;color:var(--text-secondary);margin:0 0 4px}
  .stat-value{font-size:20px;font-weight:500;margin:0;letter-spacing:-0.01em}

  .btn{
    width:100%; background:#000; color:#fff; border:0.5px solid #000;
    border-radius:12px; height:48px; font-size:16px; font-weight:500;
    margin-top:8px; transition:opacity .15s, transform .1s;
  }
  @media (prefers-color-scheme: dark){ .btn{ background:#fff; color:#000; border-color:#fff; } }
  .btn:active{opacity:0.7; transform:scale(0.98)}
  .btn.secondary{background:transparent; color:var(--text); border:0.5px solid var(--border)}
  .btn.small{height:38px; font-size:14px; width:auto; padding:0 16px}

  select,input{
    width:100%; padding:12px 14px; border-radius:12px; border:0.5px solid var(--border);
    background:var(--surface-1); color:var(--text); font-size:16px; margin-bottom:10px;
    -webkit-appearance:none; appearance:none;
  }
  select:focus,input:focus{outline:1.5px solid var(--text); outline-offset:-1.5px}
  label{font-size:12px;color:var(--text-muted);display:block;margin:0 0 6px}

  .chip{
    display:inline-flex; align-items:center; padding:9px 14px; border-radius:20px;
    border:0.5px solid var(--border); margin:0 6px 6px 0; font-size:14px; font-weight:500;
    cursor:pointer; user-select:none; transition:background .15s, color .15s;
  }
  .chip.active{background:#000; color:#fff; border-color:#000}
  @media (prefers-color-scheme: dark){ .chip.active{ background:#fff; color:#000; border-color:#fff; } }

  .row{
    display:flex; justify-content:space-between; align-items:center;
    padding:12px; border-bottom:0.5px solid var(--border);
  }
  .row:last-child{border-bottom:none}
  .row .name{font-size:14px;font-weight:500;margin:0}
  .row .sub{font-size:12px;color:var(--text-secondary);margin:2px 0 0}
  .row .price{font-size:14px;font-weight:500}
  .row .meta{text-align:right}

  .del-btn{
    color:var(--red); font-size:12px; font-weight:500; margin-top:3px;
    display:inline-block; padding:2px 0;
  }

  .empty{color:var(--text-muted);font-size:14px;text-align:center;padding:32px 16px}

  .tabbar{
    position:fixed; bottom:0; left:0; right:0; display:flex;
    background:var(--surface-0);
    border-top:0.5px solid var(--border);
    padding:10px 0 6px;
    padding-bottom: calc(6px + env(safe-area-inset-bottom));
  }
  .tab{flex:1;text-align:center;color:var(--text-muted)}
  .tab.active{color:var(--text)}
  .tab .ic{font-size:20px;display:block}
  .tab .lbl{font-size:10px;margin:2px 0 0;font-weight:500}
  .hidden{display:none}

  .branch-pick{
    width:100%; text-align:left; background:transparent; border:0.5px solid var(--border);
    border-radius:14px; padding:16px; font-size:16px; font-weight:500;
    margin-bottom:10px; color:var(--text); display:flex; justify-content:space-between; align-items:center;
  }
  .branch-pick:active{opacity:0.6}
  .chev{color:var(--text-muted); font-size:18px}

  .skeleton{
    background:var(--surface-1); border-radius:14px; height:60px; margin-bottom:10px;
    animation:pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
</style>
</head>
<body>

<div class="topbar">
  <div style="width:26px;height:26px;border-radius:7px;background:#fff;display:flex;align-items:center;justify-content:center"><i class="ti ti-car" style="font-size:15px;color:#000"></i></div>
  <span>ClaudeFormula 2.0</span>
</div>

<div class="container">
  <div id="view-shift"></div>
  <div id="view-add" class="hidden"></div>
  <div id="view-reports" class="hidden"></div>
  <div id="view-workers" class="hidden"></div>
</div>

<div class="tabbar">
  <div class="tab active" data-tab="shift"><i class="ti ti-home ic"></i><p class="lbl">Смена</p></div>
  <div class="tab" data-tab="add"><i class="ti ti-plus ic"></i><p class="lbl">Добавить</p></div>
  <div class="tab" data-tab="reports"><i class="ti ti-chart-bar ic"></i><p class="lbl">Отчёты</p></div>
  <div class="tab" data-tab="workers"><i class="ti ti-users ic"></i><p class="lbl">Мойщики</p></div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready(); tg.expand();
try{ tg.setHeaderColor("#000000"); }catch(e){}

const API = "";
const initData = tg.initData || "";
const headers = { "Content-Type": "application/json", "X-Init-Data": initData };

let CFG = null;
let BRANCH = (tg.initDataUnsafe?.start_param) || null;
let selectedServices = [];
let customServices = [];

async function api(path, opts = {}) {
  const res = await fetch(API + path, { ...opts, headers: { ...headers, ...(opts.headers||{}) } });
  if (!res.ok) { tg.showAlert("Ошибка: " + (await res.text())); throw new Error("api"); }
  return res.json();
}
function fmt(n){ return (n||0).toLocaleString("ru-RU") + " ₽"; }
function haptic(type="light"){ try{ tg.HapticFeedback.impactOccurred(type); }catch(e){} }

document.querySelectorAll(".tab").forEach(t => t.addEventListener("click", () => { haptic(); switchTab(t.dataset.tab); }));
function switchTab(name){
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.tab === name));
  document.querySelectorAll("[id^=view-]").forEach(v => v.classList.add("hidden"));
  document.getElementById("view-" + name).classList.remove("hidden");
  if (name === "shift") renderShift();
  if (name === "add") renderAdd();
  if (name === "reports") renderReports();
  if (name === "workers") renderWorkers();
}

function skeleton(n=3){ return Array(n).fill('<div class="skeleton"></div>').join(""); }

async function ensureBranch() {
  if (BRANCH) return;
  CFG = CFG || await api("/api/config");
  const el = document.getElementById("view-shift");
  el.innerHTML = `<p class="page-title">Выбери филиал</p>` + CFG.branches.map(b =>
    `<button class="branch-pick" onclick="pickBranch('${b}')">${b}<i class="ti ti-chevron-right chev"></i></button>`).join("");
}
window.pickBranch = (b) => { BRANCH = b; haptic("medium"); switchTab("shift"); };

async function renderShift(){
  if (!BRANCH) return ensureBranch();
  const el = document.getElementById("view-shift");
  el.innerHTML = `<p class="page-title">Смена</p>${skeleton(2)}`;
  const { session, summary } = await api(`/api/session?branch=${encodeURIComponent(BRANCH)}`);
  el.innerHTML = `
    <p class="page-title">${BRANCH}</p>
    <p class="section-label">Касса · ${session.date || ""}</p>
    <div class="stat-grid">
      <div class="stat-card"><p class="stat-label">В кассе</p><p class="stat-value">${fmt(summary.total)}</p></div>
      <div class="stat-card"><p class="stat-label">Общая выручка</p><p class="stat-value">${fmt(summary.grand_total)}</p></div>
      <div class="stat-card"><p class="stat-label">Наличные</p><p class="stat-value">${fmt(summary.cash)}</p></div>
      <div class="stat-card"><p class="stat-label">Карта</p><p class="stat-value">${fmt(summary.visa + summary.beznal)}</p></div>
    </div>
    <button class="btn" onclick="switchTab('add')"><i class="ti ti-plus" style="vertical-align:-2px;margin-right:6px"></i>Добавить машину</button>
    <p class="section-label">Машины · ${session.cars.length}</p>
    <div class="card">
      ${session.cars.length ? session.cars.slice().reverse().map(c => `
        <div class="row">
          <div>
            <p class="name">${c.car || "Машина"}</p>
            <p class="sub">${c.service} · ${c.employee}</p>
          </div>
          <div class="meta">
            <p class="price">${fmt(c.price)}</p>
            <span class="del-btn" onclick="delCar(${c.num})">Удалить</span>
          </div>
        </div>`).join("") : `<p class="empty">Машин пока нет</p>`}
    </div>`;
}
window.delCar = async (num) => {
  tg.showConfirm("Удалить машину?", async (ok) => {
    if (!ok) return;
    haptic("medium");
    await api(`/api/car/${encodeURIComponent(BRANCH)}/${num}`, { method: "DELETE" });
    renderShift();
  });
};

async function renderAdd(){
  const el = document.getElementById("view-add");
  if (!BRANCH) { el.innerHTML = `<p class="empty">Сначала выбери филиал во вкладке «Смена»</p>`; return; }
  CFG = CFG || await api("/api/config");
  const { workers } = await api(`/api/workers?branch=${encodeURIComponent(BRANCH)}`);
  selectedServices = []; customServices = [];

  el.innerHTML = `
    <p class="page-title">Новая машина</p>
    <div class="card card-pad">
      <label>Мойщик</label>
      <select id="f-emp">${workers.map(w => `<option>${w}</option>`).join("")}</select>
      <label>Тип кузова</label>
      <select id="f-body">${CFG.body_types.map(b => `<option value="${b.key}">${b.name}</option>`).join("")}</select>
      <label>Марка машины</label>
      <input id="f-car" placeholder="Camry">
    </div>
    <p class="section-label">Услуги</p>
    <div id="f-services"></div>
    <button class="btn secondary small" onclick="addCustomService()" style="margin-top:10px"><i class="ti ti-plus" style="vertical-align:-2px;margin-right:4px"></i>Другое (своя услуга)</button>
    <div id="f-custom"></div>
    <p class="section-label">Оплата</p>
    <select id="f-payment">${CFG.payment_types.map(p => `<option>${p}</option>`).join("")}</select>
    <div class="stat-card" style="margin-top:12px">
      <p class="stat-label">Итого</p>
      <p class="stat-value" id="f-total" style="font-size:24px">0 ₽</p>
    </div>
    <button class="btn" style="margin-bottom:24px" onclick="submitCar()">Сохранить</button>
  `;
  renderServiceChips();
  document.getElementById("f-body").addEventListener("change", renderServiceChips);
}

function renderServiceChips(){
  const bodyType = document.getElementById("f-body").value;
  const wrap = document.getElementById("f-services");
  wrap.innerHTML = `<div class="card card-pad">` + CFG.services.map(s => {
    const price = s.prices[bodyType] ?? Object.values(s.prices)[0];
    const active = selectedServices.includes(s.key);
    return `<span class="chip ${active?'active':''}" data-key="${s.key}" onclick="toggleService('${s.key}')">${s.name} · ${price}₽</span>`;
  }).join("") + `</div>`;
  updateTotal();
}
window.toggleService = (key) => {
  haptic();
  selectedServices = selectedServices.includes(key) ? selectedServices.filter(k=>k!==key) : [...selectedServices, key];
  renderServiceChips();
};

window.addCustomService = () => {
  const name = window.prompt("Название услуги:");
  if (!name) return;
  const price = parseInt(window.prompt("Цена (₽):", "1000") || "0", 10);
  const percent = parseFloat(window.prompt("Процент мойщику (%):", "30") || "30");
  customServices.push({ name, price, percent });
  renderCustomList();
};
function renderCustomList(){
  const wrap = document.getElementById("f-custom");
  if (!customServices.length) { wrap.innerHTML = ""; updateTotal(); return; }
  wrap.innerHTML = `<div class="card" style="margin-top:10px">` + customServices.map((c,i) => `
    <div class="row"><div><p class="name">${c.name}</p><p class="sub">${c.percent}% мойщику</p></div>
    <div class="meta"><p class="price">${c.price}₽</p><span class="del-btn" onclick="removeCustom(${i})">Убрать</span></div></div>
  `).join("") + `</div>`;
  updateTotal();
}
window.removeCustom = (i) => { customServices.splice(i,1); renderCustomList(); };

function updateTotal(){
  const bodyType = document.getElementById("f-body")?.value;
  let total = selectedServices.reduce((sum,k) => {
    const s = CFG.services.find(s=>s.key===k);
    return sum + (s.prices[bodyType] ?? Object.values(s.prices)[0]);
  }, 0);
  total += customServices.reduce((sum,c) => sum + c.price, 0);
  const totalEl = document.getElementById("f-total");
  if (totalEl) totalEl.textContent = fmt(total);
}

window.submitCar = async () => {
  if (!selectedServices.length && !customServices.length) return tg.showAlert("Выбери хотя бы одну услугу");
  const body = {
    branch: BRANCH,
    employee: document.getElementById("f-emp").value,
    body_type: document.getElementById("f-body").value,
    service_keys: selectedServices,
    custom_services: customServices,
    car: document.getElementById("f-car").value,
    payment: document.getElementById("f-payment").value,
  };
  await api("/api/car", { method: "POST", body: JSON.stringify(body) });
  haptic("medium");
  switchTab("shift");
};

async function renderReports(){
  const el = document.getElementById("view-reports");
  if (!BRANCH) { el.innerHTML = `<p class="empty">Сначала выбери филиал</p>`; return; }
  el.innerHTML = `<p class="page-title">Отчёты</p>${skeleton(3)}`;
  const { days } = await api(`/api/archive?branch=${encodeURIComponent(BRANCH)}`);
  el.innerHTML = `<p class="page-title">Отчёты</p><p class="section-label">${BRANCH}</p>` +
    (days.length ? `<div class="card">` + days.map(d => `
      <div class="row"><div><p class="name">${d.date}</p><p class="sub">${(d.cars||[]).length} машин</p></div>
      <p class="price">${fmt(d.grand_total ?? d.total)}</p></div>
    `).join("") + `</div>` : `<p class="empty">Архив пуст</p>`);
}

async function renderWorkers(){
  const el = document.getElementById("view-workers");
  if (!BRANCH) { el.innerHTML = `<p class="empty">Сначала выбери филиал</p>`; return; }
  el.innerHTML = `<p class="page-title">Мойщики</p>${skeleton(3)}`;
  const { session, summary } = await api(`/api/session?branch=${encodeURIComponent(BRANCH)}`);
  const { workers } = await api(`/api/workers?branch=${encodeURIComponent(BRANCH)}`);
  el.innerHTML = `<p class="page-title">Мойщики</p><p class="section-label">${BRANCH} · сегодня</p><div class="card">` +
    workers.map(w => {
      const cnt = session.cars.filter(c => c.employee === w).length;
      const sal = summary.washer_salaries?.[w] || 0;
      return `<div class="row"><div><p class="name">${w}</p><p class="sub">${cnt} машин</p></div><p class="price">${fmt(sal)}</p></div>`;
    }).join("") + `</div>`;
}

switchTab("shift");
</script>
</body>
</html>
