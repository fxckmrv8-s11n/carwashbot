<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>ClaudeFormula 2.0</title>
<script>
  (function(){
    try{
      var t = localStorage.getItem("cf_theme");
      if (t === "light" || t === "dark") document.documentElement.setAttribute("data-theme", t);
    }catch(e){}
  })();
</script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
  :root{
    --bg:#0A0A0B; --surface-0:#141414; --surface-1:#1C1C1E; --surface-2:#242426;
    --text:#FFFFFF; --text-secondary:#9A9A9E; --text-muted:#6C6C70;
    --border:rgba(255,255,255,0.08); --accent:#0A84FF; --accent-tint:rgba(10,132,255,0.16); --green:#33D17A; --red:#FF453A;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html{height:100%}
  html,body{margin:0}
  body{
    min-height:100%;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",Segoe UI,Roboto,sans-serif;
    background:var(--bg); color:var(--text);
    padding-bottom:calc(110px + env(safe-area-inset-bottom));
    -webkit-font-smoothing:antialiased;
  }
  .container{max-width:460px;margin:0 auto}
  .topbar{padding:18px 18px 6px;display:flex;justify-content:space-between;align-items:flex-start}
  .topbar h1{font-size:20px;font-weight:600;margin:0}
  .topbar p{font-size:12px;color:var(--text-secondary);margin:2px 0 0}
  .bell{width:36px;height:36px;border-radius:50%;background:var(--surface-1);display:flex;align-items:center;justify-content:center}
  .bell i{font-size:17px}
  .back-header{padding:14px 16px;display:flex;align-items:center;gap:12px}
  .back-header .back{width:32px;height:32px;border-radius:50%;background:var(--surface-1);display:flex;align-items:center;justify-content:center}
  .back-header .back i{font-size:16px}
  .back-header span{font-size:16px;font-weight:600}

  .content{padding:12px 16px 8px}
  .page-title{font-size:20px;font-weight:600;margin:0 0 14px}
  .label{font-size:12px;color:var(--text-muted);margin:0 0 6px;font-weight:500}
  .section-label{font-size:13px;color:var(--text-secondary);margin:16px 2px 8px;font-weight:500;display:flex;justify-content:space-between;align-items:center}
  .section-label .more{color:var(--text-muted);font-size:12px;font-weight:500}

  .hero-card{background:linear-gradient(135deg,#3B82F6,#6366F1);border-radius:20px;padding:18px;margin-top:4px;position:relative;overflow:hidden}
  .hero-card.green{background:linear-gradient(135deg,#22C55E,#16A34A)}
  .hero-card.flat{background:var(--surface-1)}
  .hero-card .row1{display:flex;justify-content:space-between;align-items:center}
  .hero-card .lbl{font-size:13px;color:rgba(255,255,255,0.75);margin:0}
  .hero-card.flat .lbl{color:var(--text-secondary)}
  .hero-card .pill{background:rgba(0,0,0,0.18);color:#fff;font-size:12px;font-weight:700;padding:3px 9px;border-radius:20px}
  .hero-card .amount-row{display:flex;align-items:baseline;gap:8px;margin-top:2px}
  .hero-card .amount{font-size:34px;font-weight:700;margin:0;letter-spacing:-0.02em;color:#fff}
  .hero-card.flat .amount{color:var(--text)}
  .hero-card .sub{font-size:12px;color:rgba(255,255,255,0.7);margin:4px 0 0}
  .hero-card.flat .sub{color:var(--text-muted)}
  .wave-chart{margin-top:14px}
  .wave-chart svg{display:block;width:100%;height:44px}
  .spark{display:flex;align-items:flex-end;gap:4px;height:36px;margin-top:16px}
  .spark .bar{flex:1;background:var(--border-strong,rgba(255,255,255,0.15));border-radius:3px;min-height:4px}
  .spark .bar.today{background:var(--accent)}
  .spark-labels{display:flex;justify-content:space-between;margin-top:6px}
  .spark-labels span{font-size:10px;color:var(--text-muted);flex:1;text-align:center}
  .spark-labels span.today{color:var(--text)}

  .avatar-row{display:flex;gap:14px;overflow-x:auto;padding-bottom:2px}
  .avatar-row .av{text-align:center;flex-shrink:0}
  .avatar-row .circle{width:44px;height:44px;border-radius:50%;background:var(--surface-1);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;margin:0 auto 4px}
  .avatar-row .circle.more{border:1px dashed var(--border-strong,var(--text-muted));background:none;font-size:16px}
  .avatar-row p{font-size:10px;color:var(--text-secondary);margin:0;max-width:48px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  .card{border:0.5px solid var(--border);border-radius:16px;overflow:hidden;background:var(--surface-1)}
  .card + .card{margin-top:14px}
  .card-pad{padding:14px 16px}

  .row{display:flex;justify-content:space-between;align-items:center;padding:13px 14px}
  .row + .row{border-top:0.5px solid var(--border)}
  .row .name{font-size:14px;font-weight:500;margin:0;display:flex;align-items:center;gap:10px}
  .row .sub{font-size:12px;color:var(--text-muted);margin:2px 0 0}
  .row .price{font-size:14px;font-weight:600;margin:0}
  .row .meta{text-align:right}
  .row.link{cursor:pointer;transition:background 120ms cubic-bezier(0,0,0.2,1)}
  .row.link:active{background:var(--surface-2)}
  .row .chevron{color:var(--text-muted);font-size:16px}
  .row .icon-badge{width:26px;height:26px;border-radius:8px;background:var(--accent-tint);color:var(--accent);display:inline-flex;align-items:center;justify-content:center;font-size:14px;margin-right:8px;vertical-align:-7px}

  .stat2{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:14px}
  .stat2 .box{background:var(--surface-1);border-radius:16px;padding:12px 14px}
  .stat2 .box span{font-size:11px;color:var(--text-muted);display:block;margin-bottom:3px}
  .stat2 .box b{font-size:18px;font-weight:600;display:block}

  .quick3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px}
  .quick3 .box{background:var(--surface-1);border-radius:16px;padding:14px 6px;text-align:center;cursor:pointer;transition:transform 150ms cubic-bezier(0,0,0.2,1)}
  .quick3 .box:active{transform:scale(0.96)}
  .quick3 .box i{font-size:18px;margin-bottom:6px;display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:10px;background:var(--accent-tint);color:var(--accent);margin-left:auto;margin-right:auto}
  .quick3 .box span{font-size:11px;color:var(--text-secondary)}

  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
  .stat-card{background:var(--surface-1);border-radius:16px;padding:14px 16px}
  .stat-card p:first-child{font-size:12px;color:var(--text-secondary);margin:0 0 6px}
  .stat-card p:last-child{font-size:19px;font-weight:600;margin:0}

  .worker-row{padding:12px 14px}
  .worker-row + .worker-row{border-top:0.5px solid var(--border)}
  .worker-row .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .worker-row .top .name{font-size:14px;font-weight:500;margin:0;display:flex;align-items:center;gap:8px}
  .worker-row .top .price{font-size:15px;font-weight:600}
  .worker-row .bar-track{height:4px;background:var(--border);border-radius:2px;margin-left:36px}
  .worker-row .bar-fill{height:100%;background:linear-gradient(90deg,#22C55E,#16A34A);border-radius:2px}
  .worker-row .meta{font-size:11px;color:var(--text-muted);margin:5px 0 0 36px}
  .icon-badge.blue{background:rgba(59,130,246,0.16);color:#3B82F6}
  .icon-badge.green{background:rgba(34,197,94,0.16);color:#22C55E}
  .icon-badge.orange{background:rgba(249,115,22,0.16);color:#F97316}
  .icon-badge.purple{background:rgba(139,92,246,0.16);color:#8B5CF6}
  .icon-badge.red{background:rgba(239,68,68,0.16);color:#EF4444}

  button{font-family:inherit;cursor:pointer}
  .btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:14px;height:50px;font-size:15px;font-weight:600;margin-top:8px;transition:transform 150ms cubic-bezier(0,0,0.2,1),opacity 150ms cubic-bezier(0,0,0.2,1)}
  .btn:active{transform:scale(0.97);opacity:0.9}
  .btn.secondary{background:var(--surface-1);color:#fff}
  .btn.ghost{background:transparent;color:var(--text-secondary);border:0.5px solid var(--border)}

  select,input,textarea{width:100%;padding:14px;border-radius:14px;border:none;background:var(--surface-1);color:var(--text);font-size:15px;margin-bottom:12px;-webkit-appearance:none;appearance:none}
  select:focus,input:focus,textarea:focus{outline:1px solid rgba(255,255,255,0.3)}
  textarea{resize:none;min-height:70px;font-family:inherit}
  ::placeholder{color:var(--text-muted)}

  .field-select{position:relative}
  .field-select select{padding-right:36px}
  .field-select::after{content:"";position:absolute;right:14px;top:50%;transform:translateY(-60%) rotate(45deg);width:7px;height:7px;border-right:1.5px solid var(--text-muted);border-bottom:1.5px solid var(--text-muted);pointer-events:none}

  .chip-label{display:flex;justify-content:space-between;align-items:center;padding:13px 14px;cursor:pointer;transition:background 150ms cubic-bezier(0,0,0.2,1)}
  .chip-label + .chip-label{border-top:0.5px solid var(--border)}
  .chip-label.active{background:var(--surface-2)}
  .chip-label .l{font-size:14px}
  .chip-label .r{display:flex;align-items:center;gap:10px}
  .chip-label .p{font-size:13px;color:var(--text-secondary)}
  .tick{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;color:transparent;flex-shrink:0;transition:transform 150ms cubic-bezier(0,0,0.2,1),background 150ms cubic-bezier(0,0,0.2,1),border-color 150ms cubic-bezier(0,0,0.2,1)}
  .tick.on{background:var(--accent);border-color:var(--accent);color:var(--bg);transform:scale(1.05)}
  input[type=checkbox]{width:18px;height:18px;margin:0;accent-color:#fff}

  .del{color:var(--red);font-size:12px;font-weight:500}
  .empty{color:var(--text-muted);font-size:14px;text-align:center;padding:32px 16px}
  .skeleton{background:var(--surface-1);border-radius:16px;height:56px;margin-bottom:10px;animation:pulse 1.2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}

  @media (prefers-reduced-motion: reduce){
    .btn, .quick3 .box, .preset-chip, .tick, .chip-label, .row.link, .theme-switch .opt{
      transition:opacity 150ms linear !important;
    }
    .btn:active, .quick3 .box:active, .preset-chip:active{transform:none !important}
    .tick.on{transform:none !important}
  }

  .branch-pick{width:100%;text-align:left;background:var(--surface-1);border:none;border-radius:16px;padding:16px;font-size:15px;font-weight:500;margin-bottom:10px;color:var(--text);display:flex;justify-content:space-between;align-items:center}
  .branch-pick:active{opacity:0.7}

  .avatar{width:30px;height:30px;border-radius:50%;background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}
  .avatar.lg{width:64px;height:64px;font-size:22px;margin:0 auto}

  .tabbar{position:fixed;bottom:0;left:0;right:0;display:flex;background:rgba(20,20,20,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:0.5px solid var(--border);padding-bottom:env(safe-area-inset-bottom);max-width:460px;margin:0 auto}
  .tab{flex:1;text-align:center;padding:10px 0 6px;font-size:10px;color:var(--text-muted);font-weight:500}
  .tab.active{color:#3B82F6}
  .tab i{font-size:20px;display:block;margin-bottom:2px}
  .hidden{display:none}

  .segmented{display:flex;background:var(--surface-1);border-radius:12px;padding:3px;margin-bottom:14px}
  .segmented .seg{flex:1;text-align:center;padding:8px 0;font-size:13px;font-weight:600;color:var(--text-secondary);border-radius:10px}
  .segmented .seg.active{background:#fff;color:#000}

  .donut-wrap{display:flex;align-items:center;gap:20px;padding:18px 16px}
  .donut{width:120px;height:120px;border-radius:50%;flex-shrink:0;position:relative;display:flex;align-items:center;justify-content:center}
  .donut::after{content:"";position:absolute;inset:14px;background:var(--surface-1);border-radius:50%}
  .donut .center{position:relative;z-index:1;text-align:center}
  .donut .center b{font-size:15px;display:block}
  .donut .center span{font-size:10px;color:var(--text-muted)}
  .legend{flex:1}
  .legend .item{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12px}
  .legend .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .legend .item b{margin-left:auto;font-weight:600}

  .swipe-card{background:var(--surface-1);border-radius:16px;padding:16px;position:relative;touch-action:pan-y}
  .swipe-card .counter{position:absolute;top:12px;right:14px;font-size:11px;color:var(--text-muted)}
  .swipe-card .car-name{font-size:16px;font-weight:600;margin:0 0 3px}
  .swipe-card .car-sub{font-size:12px;color:var(--text-secondary);margin:0 0 10px}
  .swipe-card .car-price{font-size:22px;font-weight:600;margin:0}
  .swipe-nav{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:10px}
  .swipe-nav button{width:30px;height:30px;border-radius:50%;background:var(--surface-1);border:none;color:var(--text);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .swipe-dots{display:flex;gap:4px}
  .swipe-dots span{width:5px;height:5px;border-radius:50%;background:var(--border,rgba(255,255,255,0.15))}
  .swipe-dots span.on{background:#fff}

  .tag-row{display:flex;flex-wrap:wrap;gap:8px}
  .tag{background:var(--surface-1);border-radius:12px;padding:7px 12px;display:flex;align-items:center;gap:7px;cursor:pointer}
  .tag:active{background:var(--surface-2)}
  .tag .av{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;flex-shrink:0}
  .tag span{font-size:12px}
  .tag-add{border:1px dashed var(--text-muted);border-radius:12px;padding:7px 14px;color:var(--text-muted);font-size:12px;display:flex;align-items:center;gap:5px;cursor:pointer}
  .group-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.03em;margin:16px 2px 8px}

  .wtable-head{display:grid;grid-template-columns:1.6fr 0.7fr 1fr;font-size:10px;color:var(--text-muted);padding:0 14px 8px}
  .wtable-row{display:grid;grid-template-columns:1.6fr 0.7fr 1fr;padding:10px 14px;align-items:center;font-size:13px}
  .wtable-row + .wtable-row{border-top:0.5px solid var(--border)}
  .wtable-row .wname{display:flex;align-items:center;gap:7px}
  .wtable-row .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
  .wtable-row .wcount{text-align:center;color:var(--text-secondary)}
  .wtable-row .wsal{text-align:right;font-weight:600}

  .tile-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .tile{background:var(--surface-1);border-radius:12px;padding:14px 6px;text-align:center;cursor:pointer}
  .tile.primary{background:#fff;color:#000}
  .tile i{font-size:18px}
  .tile p{font-size:11px;margin:6px 0 0;font-weight:500}

  .timeline{position:relative;padding-left:16px}
  .timeline::before{content:"";position:absolute;left:4px;top:4px;bottom:4px;width:1px;background:var(--border)}
  .timeline-item{position:relative;margin-bottom:14px;cursor:pointer}
  .timeline-item:last-child{margin-bottom:0}
  .timeline-item .tdot{position:absolute;left:-16px;top:4px;width:6px;height:6px;border-radius:50%;background:var(--text-muted)}
  .timeline-item:first-child .tdot{background:var(--text)}
  .timeline-item .ttime{font-size:11px;color:var(--text-muted);margin:0}
  .timeline-item .tname{font-size:13px;margin:2px 0 0}

  /* ── поиск / фильтр машин ─────────────────────────────────────────── */
  .search-wrap{position:relative;margin-bottom:12px}
  .search-wrap i.ti-search{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:16px}
  .search-wrap input{padding-left:38px;margin-bottom:0}
  .search-wrap .clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:16px;padding:4px;cursor:pointer;display:none}
  .search-wrap.has-value .clear{display:block}
  .filter-chips{display:flex;gap:8px;overflow-x:auto;margin:10px 0 14px;padding-bottom:2px}
  .filter-chip{flex-shrink:0;background:var(--surface-1);border-radius:20px;padding:7px 13px;font-size:12px;color:var(--text-secondary);white-space:nowrap;cursor:pointer}
  .filter-chip.active{background:#fff;color:#000;font-weight:600}

  /* ── swipe-to-delete карточки списка ──────────────────────────────── */
  .swipe-item{position:relative;overflow:hidden;border-radius:14px;margin-bottom:8px}
  .swipe-item .swipe-bg{position:absolute;inset:0;background:var(--red);display:flex;align-items:center;justify-content:flex-end;padding-right:20px;border-radius:14px}
  .swipe-item .swipe-bg i{color:#fff;font-size:18px}
  .swipe-item .swipe-fg{position:relative;background:var(--surface-1);border-radius:14px;transition:transform .18s ease;touch-action:pan-y}
  .swipe-item .swipe-fg.dragging{transition:none}
  .swipe-item .row{border-radius:14px}

  /* ── long-press quick menu (bottom sheet) ─────────────────────────── */
  .sheet-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:90;opacity:0;pointer-events:none;transition:opacity .18s ease}
  .sheet-backdrop.show{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:0;right:0;bottom:0;max-width:460px;margin:0 auto;background:var(--surface-1);border-radius:20px 20px 0 0;padding:8px 8px calc(10px + env(safe-area-inset-bottom));z-index:91;transform:translateY(100%);transition:transform .22s cubic-bezier(.32,.72,0,1)}
  .sheet.show{transform:translateY(0)}
  .sheet .handle{width:36px;height:4px;background:var(--border-strong,rgba(255,255,255,0.2));border-radius:2px;margin:6px auto 10px}
  .sheet .sheet-title{font-size:13px;color:var(--text-muted);text-align:center;padding:0 16px 8px}
  .sheet-action{display:flex;align-items:center;gap:12px;padding:14px 16px;font-size:15px;border-radius:12px;cursor:pointer}
  .sheet-action:active{background:var(--surface-2)}
  .sheet-action.destructive{color:var(--red)}
  .sheet-action i{font-size:18px;width:20px;text-align:center}

  /* ── loading spinner в кнопке ──────────────────────────────────────── */
  .btn.loading{color:transparent;pointer-events:none;position:relative}
  .btn.loading::after{
    content:"";position:absolute;left:50%;top:50%;width:18px;height:18px;margin:-9px 0 0 -9px;
    border-radius:50%;border:2px solid rgba(0,0,0,0.25);border-top-color:#000;
    animation:spin .7s linear infinite;
  }
  .btn.secondary.loading::after,.btn.ghost.loading::after{border:2px solid rgba(255,255,255,0.25);border-top-color:#fff}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ── плавные переходы между вкладками ─────────────────────────────── */
  [id^="view-"]{animation:fadein .18s ease}
  @keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

  /* ── pull-to-refresh ───────────────────────────────────────────────── */
  .ptr-indicator{display:flex;align-items:center;justify-content:center;height:0;overflow:hidden;color:var(--text-muted);transition:height .15s ease}
  .ptr-indicator i{font-size:18px;animation:spin .7s linear infinite}

  /* ── пресеты услуг ─────────────────────────────────────────────────── */
  .preset-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;margin-bottom:14px}
  .preset-chip{flex-shrink:0;background:var(--surface-1);border:0.5px solid var(--border);border-radius:14px;padding:9px 14px;cursor:pointer;transition:transform 150ms cubic-bezier(0,0,0.2,1)}
  .preset-chip:active{transform:scale(0.96)}
  .preset-chip .pname{font-size:12px;font-weight:600;display:block}
  .preset-chip .pcount{font-size:10px;color:var(--text-muted)}
  .preset-chip-add{flex-shrink:0;border:1px dashed var(--text-muted);border-radius:14px;padding:9px 14px;color:var(--text-muted);font-size:12px;display:flex;align-items:center;gap:5px;cursor:pointer}

  /* ── тема (переключатель) ─────────────────────────────────────────── */
  html[data-theme="light"]{
    --bg:#F2F2F7; --surface-0:#FFFFFF; --surface-1:#FFFFFF; --surface-2:#EDEDF2;
    --text:#000000; --text-secondary:#6E6E73; --text-muted:#9A9A9E;
    --border:rgba(0,0,0,0.08); --accent:#007AFF; --accent-tint:rgba(0,122,255,0.12); --green:#1FA971; --red:#FF3B30;
  }
  html[data-theme="light"] .tabbar{background:rgba(255,255,255,0.92)}
  html[data-theme="light"] .btn{background:var(--accent);color:#fff}
  html[data-theme="light"] .btn.secondary{background:var(--surface-2);color:#000}
  html[data-theme="light"] .tick.on{color:#fff}
  html[data-theme="light"] .segmented .seg.active{background:var(--accent);color:#fff}
  .theme-switch{display:flex;background:var(--surface-2,var(--surface-1));border-radius:12px;padding:3px;gap:2px}
  .theme-switch .opt{flex:1;text-align:center;padding:9px 0;font-size:13px;font-weight:600;color:var(--text-secondary);border-radius:9px;display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;transition:background 150ms cubic-bezier(0,0,0.2,1),color 150ms cubic-bezier(0,0,0.2,1)}
  .theme-switch .opt.active{background:var(--surface-0);color:var(--text)}

  /* ── история кассы ─────────────────────────────────────────────────── */
  .hist-row{padding:11px 14px}
  .hist-row + .hist-row{border-top:0.5px solid var(--border)}
  .hist-row .htop{display:flex;justify-content:space-between;font-size:13px}
  .hist-row .hbadge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;text-transform:uppercase}
  .hist-row .hbadge.add{background:rgba(51,209,122,0.15);color:var(--green)}
  .hist-row .hbadge.edit{background:rgba(10,132,255,0.15);color:#0A84FF}
  .hist-row .hbadge.delete{background:rgba(255,69,58,0.15);color:var(--red)}
  .hist-row .hmeta{font-size:11px;color:var(--text-muted);margin:4px 0 0}
</style>
</head>
<body>

<div class="container">
  <div id="view-home"></div>
  <div id="view-add" class="hidden"></div>
  <div id="view-reports" class="hidden"></div>
  <div id="view-workers" class="hidden"></div>
  <div id="view-settings" class="hidden"></div>
</div>

<div class="tabbar">
  <div class="tab active" data-tab="home"><i class="ti ti-home"></i>Главная</div>
  <div class="tab" data-tab="reports"><i class="ti ti-chart-bar"></i>Отчёты</div>
  <div class="tab" data-tab="workers"><i class="ti ti-users"></i>Мойщики</div>
  <div class="tab" data-tab="settings"><i class="ti ti-settings"></i>Настройки</div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready(); tg.expand();
try{ tg.setHeaderColor("#0A0A0B"); tg.setBackgroundColor("#0A0A0B"); }catch(e){}

window.addEventListener("error", (e) => {
  const el = document.getElementById("view-home");
  if (el && !el.innerHTML.trim()) {
    el.innerHTML = `<div class="content"><p class="empty">Ошибка загрузки: ${e.message || "неизвестная"}<br><button class="btn secondary" onclick="location.reload()">Обновить</button></p></div>`;
  }
});

const API = "";
const initData = tg.initData || "";
const headers = { "Content-Type": "application/json", "X-Init-Data": initData };

let CFG = null;
let ME = null;
let BRANCH = (tg.initDataUnsafe?.start_param) || null;
let selectedServices = [];
let customServices = [];

async function api(path, opts = {}) {
  const res = await fetch(API + path, { ...opts, headers: { ...headers, ...(opts.headers||{}) } });
  if (!res.ok) { tg.showAlert("Ошибка: " + (await res.text())); throw new Error("api"); }
  const ct = res.headers.get("content-type") || "";
  return ct.includes("application/json") ? res.json() : res;
}
function fmt(n){ return (n||0).toLocaleString("ru-RU") + " ₽"; }
function haptic(type="light"){ try{ tg.HapticFeedback.impactOccurred(type); }catch(e){} }
function initials(name){ return (name||"?").trim().split(/\s+/).map(w=>w[0]).slice(0,2).join("").toUpperCase(); }

function buildWaveSvg(values, activeIdx, maxVal, lineColor){
  const w = 300, h = 44, n = values.length, pad = 4;
  const stepX = (w - pad*2) / (n - 1);
  const pts = values.map((v, i) => {
    const x = pad + i*stepX;
    const y = h - pad - ((v||0) / maxVal) * (h - pad*2);
    return [x, y];
  });
  let d = `M ${pts[0][0]} ${pts[0][1]}`;
  for (let i=0;i<pts.length-1;i++){
    const [x0,y0]=pts[i], [x1,y1]=pts[i+1];
    const mx=(x0+x1)/2;
    d += ` C ${mx} ${y0}, ${mx} ${y1}, ${x1} ${y1}`;
  }
  const dots = pts.map(([x,y],i) => i<=activeIdx
    ? `<circle cx="${x}" cy="${y}" r="${i===activeIdx?4:2}" fill="${lineColor}" ${i===activeIdx?`stroke="rgba(255,255,255,0.35)" stroke-width="3"`:''}/>`
    : "").join("");
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><path d="${d}" fill="none" stroke="${lineColor}" stroke-width="2" stroke-linecap="round" opacity="0.9"/>${dots}</svg>`;
}
function paymentLabel(c){
  if (c.payment_split) return Object.entries(c.payment_split).map(([k,v]) => `${k} ${v}₽`).join(" + ");
  return c.payment;
}
const AVATAR_COLORS = ["#FF9F0A","#FF453A","#33D17A","#0A84FF","#BF5AF2","#64D2FF","#FFD60A"];
function avatarColor(name){ let h=0; for(const c of (name||"")) h=(h*31+c.charCodeAt(0))>>>0; return AVATAR_COLORS[h%AVATAR_COLORS.length]; }

// ── ТЕМА (пункт "Тёмная/светлая тема вручную") ────────────────────────────
function applyTheme(t){
  document.documentElement.setAttribute("data-theme", t);
  try{ localStorage.setItem("cf_theme", t); }catch(e){}
  try{
    if (t === "light") { tg.setHeaderColor("#F2F2F7"); tg.setBackgroundColor("#F2F2F7"); }
    else { tg.setHeaderColor("#0A0A0B"); tg.setBackgroundColor("#0A0A0B"); }
  }catch(e){}
}
function currentTheme(){
  return document.documentElement.getAttribute("data-theme") ||
    (tg.colorScheme === "light" ? "light" : "dark");
}
window.setTheme = (t) => { haptic(); applyTheme(t); const el = document.getElementById("theme-switch"); if (el) el.outerHTML = renderThemeSwitch(); };
function renderThemeSwitch(){
  const t = currentTheme();
  return `<div class="theme-switch" id="theme-switch">
    <div class="opt ${t==='dark'?'active':''}" onclick="setTheme('dark')"><i class="ti ti-moon"></i>Тёмная</div>
    <div class="opt ${t==='light'?'active':''}" onclick="setTheme('light')"><i class="ti ti-sun"></i>Светлая</div>
  </div>`;
}

// ── LOADING-СОСТОЯНИЕ КНОПКИ ("пункт индикатор загрузки при сохранении") ─
async function withLoading(btn, fn){
  if (!btn || btn.classList.contains("loading")) return;
  btn.classList.add("loading");
  try { await fn(); }
  finally { btn.classList.remove("loading"); }
}

// ── BOTTOM SHEET (быстрое меню по долгому тапу) ───────────────────────────
function ensureSheetHost(){
  if (document.getElementById("sheet-backdrop")) return;
  document.body.insertAdjacentHTML("beforeend", `<div class="sheet-backdrop" id="sheet-backdrop" onclick="closeSheet()"></div><div class="sheet" id="sheet"></div>`);
}
function openSheet(title, actions){
  ensureSheetHost();
  const sheet = document.getElementById("sheet");
  sheet.innerHTML = `<div class="handle"></div><div class="sheet-title">${title}</div>` +
    actions.map(a => `<div class="sheet-action ${a.destructive?'destructive':''}" onclick="closeSheet();(${a.fn})()"><i class="ti ${a.icon}"></i>${a.label}</div>`).join("");
  document.getElementById("sheet-backdrop").classList.add("show");
  sheet.classList.add("show");
}
window.closeSheet = () => {
  const sheet = document.getElementById("sheet");
  const bg = document.getElementById("sheet-backdrop");
  if (sheet) sheet.classList.remove("show");
  if (bg) bg.classList.remove("show");
};
window.openSheet = openSheet;

// ── PULL-TO-REFRESH ────────────────────────────────────────────────────────
function attachPullToRefresh(viewId, onRefresh){
  const el = document.getElementById(viewId);
  if (!el || el.dataset.ptrBound) return;
  el.dataset.ptrBound = "1";
  let startY = null, pulling = false;
  const indicator = document.createElement("div");
  indicator.className = "ptr-indicator";
  indicator.innerHTML = `<i class="ti ti-loader-2"></i>`;
  el.prepend(indicator);
  el.addEventListener("touchstart", (e) => {
    if (el.scrollTop <= 0) { startY = e.touches[0].clientY; pulling = true; }
  }, { passive: true });
  el.addEventListener("touchmove", (e) => {
    if (!pulling || startY === null) return;
    const dy = e.touches[0].clientY - startY;
    if (dy > 0 && el.scrollTop <= 0) indicator.style.height = Math.min(50, dy * 0.5) + "px";
  }, { passive: true });
  el.addEventListener("touchend", async () => {
    if (!pulling) return;
    const h = parseInt(indicator.style.height || "0", 10);
    pulling = false; startY = null;
    if (h > 30) { haptic("medium"); await onRefresh(); }
    indicator.style.height = "0px";
  });
}

document.querySelectorAll(".tab").forEach(t => t.addEventListener("click", () => { haptic(); switchTab(t.dataset.tab); }));
function switchTab(name, editNum){
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.tab === name));
  document.querySelectorAll("[id^=view-]").forEach(v => v.classList.add("hidden"));
  document.getElementById("view-" + name).classList.remove("hidden");
  if (name === "home") renderHome();
  if (name === "add") renderAdd(editNum);
  if (name === "reports") renderReports();
  if (name === "workers") renderWorkers();
  if (name === "settings") renderSettings();
  if (name === "schedule") renderScheduleWeek();
}
function skeleton(n=3){ return `<div class="content">` + Array(n).fill('<div class="skeleton"></div>').join("") + `</div>`; }
async function ensureMe(){ ME = ME || await api(`/api/me?branch=${encodeURIComponent(BRANCH||"")}`); return ME; }

async function ensureBranch() {
  if (BRANCH) return;
  const el = document.getElementById("view-home");
  el.innerHTML = `<div class="topbar"><div><h1>ClaudeFormula 2.0</h1><p>управление автомойкой</p></div></div>${skeleton(3)}`;
  try {
    CFG = CFG || await api("/api/config");
  } catch (e) {
    el.innerHTML = `<div class="topbar"><div><h1>ClaudeFormula 2.0</h1></div></div><div class="content"><p class="empty">Не удалось связаться с сервером.<br>Проверь подключение и перезапусти приложение.</p><button class="btn secondary" onclick="location.reload()">Обновить</button></div>`;
    return;
  }
  el.innerHTML = `<div class="content"><p class="page-title">Выбери филиал</p>` + CFG.branches.map(b =>
    `<button class="branch-pick" onclick="pickBranch('${b}')">${b}<i class="ti ti-chevron-right" style="color:var(--text-muted)"></i></button>`).join("") + `</div>`;
}
window.pickBranch = (b) => { BRANCH = b; ME = null; haptic("medium"); switchTab("home"); };

// ── ГЛАВНАЯ ──────────────────────────────────────────────────────────────
async function renderHome(){
  if (!BRANCH) return ensureBranch();
  const el = document.getElementById("view-home");
  el.innerHTML = `<div class="topbar"><div><h1>ClaudeFormula 2.0</h1><p>управление автомойкой</p></div><div class="bell"><i class="ti ti-bell"></i></div></div>${skeleton(3)}`;
  const { session, summary } = await api(`/api/session?branch=${encodeURIComponent(BRANCH)}`);
  const { workers, schedule } = await api(`/api/workers?branch=${encodeURIComponent(BRANCH)}`);
  const week = await api(`/api/reports/week?branch=${encodeURIComponent(BRANCH)}`).catch(() => ({ grand_total: 0, days: [] }));
  const totalSalary = Object.values(summary.washer_salaries || {}).reduce((a,b)=>a+b,0);

  const dayLetters = ["Пн","Вт","Ср","Чт","Пт","Сб","Вс"];
  const now = new Date();
  const todayIdx = (now.getDay() + 6) % 7;
  const byDate = {};
  (week.days || []).forEach(d => { byDate[d.date] = d.total; });
  const weekTotals = [];
  for (let i = 0; i <= todayIdx; i++) {
    const dt = new Date(now); dt.setDate(now.getDate() - (todayIdx - i));
    const key = dt.toLocaleDateString("ru-RU").split(".").map((p,idx)=>idx<2?p.padStart(2,"0"):p).join(".");
    weekTotals.push(byDate[key] || 0);
  }
  const maxVal = Math.max(1, ...weekTotals);
  const waveSvg = buildWaveSvg(weekTotals, todayIdx, maxVal, "#fff");
  const labels = dayLetters.map((d,i) => `<span class="${i===todayIdx?'today':''}" style="${i>todayIdx?'opacity:0.35':''}">${d}</span>`).join("");

  const prevAvg = weekTotals.slice(0, -1).reduce((a,b)=>a+b,0) / Math.max(1, weekTotals.length - 1);
  const trendPct = prevAvg > 0 ? Math.round(((summary.total - prevAvg) / prevAvg) * 100) : null;
  const trendPill = trendPct === null ? "" :
    `<span class="pill" style="${trendPct < 0 ? 'background:rgba(255,69,58,0.15);color:var(--red)' : ''}">${trendPct >= 0 ? '+' : ''}${trendPct}%</span>`;

  const avatars = workers.slice(0, 4).map(w => {
    const working = schedule?.[w]?.working !== false;
    return `<div class="av" onclick="uiWorkerQuick('${w.replace(/'/g,"\\'")}')" style="${working?'':'opacity:0.4'}">
      <div class="circle" style="cursor:pointer">${initials(w)}</div><p>${w}${working?'':' 🌙'}</p></div>`;
  }).join("");
  const moreAvatar = workers.length > 4
    ? `<div class="av"><div class="circle more" onclick="switchTab('workers')"><i class="ti ti-dots"></i></div><p>Ещё</p></div>`
    : `<div class="av"><div class="circle more" onclick="uiAddWorker()"><i class="ti ti-plus"></i></div><p>Ещё</p></div>`;

  el.innerHTML = `
    <div class="topbar"><div><h1>ClaudeFormula 2.0</h1><p>управление автомойкой</p></div><div class="bell" onclick="switchTab('settings')"><i class="ti ti-bell"></i></div></div>
    <div class="content">
      <div class="hero-card">
        <div class="row1"><p class="lbl">Касса сегодня</p></div>
        <div class="amount-row"><p class="amount">${fmt(summary.total)}</p>${trendPill}</div>
        <p class="sub">${BRANCH} · ${session.date || ""}</p>
        <div class="wave-chart">${waveSvg}</div>
        <div class="spark-labels">${labels}</div>
      </div>
      <div class="stat2">
        <div class="box"><span>Машин сегодня</span><b>${session.cars.length}</b></div>
        <div class="box"><span>В выплате</span><b>${totalSalary.toLocaleString("ru-RU")}₽</b></div>
      </div>
      <p class="section-label">Мойщики сегодня</p>
      <div class="avatar-row">${avatars}${moreAvatar}</div>
      <p class="section-label">Быстрые действия</p>
      <div class="quick3">
        <div class="box" onclick="switchTab('add')"><i class="ti ti-square-rounded-plus"></i><span>Новая машина</span></div>
        <div class="box" onclick="switchTab('reports')"><i class="ti ti-chart-bar"></i><span>Отчёты</span></div>
        <div class="box" onclick="switchTab('workers')"><i class="ti ti-users"></i><span>Мойщики</span></div>
      </div>
      <div class="section-label">Машины сегодня<span class="more" onclick="switchTab('all-cars')">Смотреть все</span></div>
      <div id="home-swipe-wrap"></div>
      <div class="section-label">Расходы<span class="more" style="color:var(--red)">-${fmt(summary.total_expenses || 0)}</span></div>
      <div class="card">
        ${(session.expenses || []).length ? session.expenses.map((e, i) => `
          <div class="row"><span class="name">${e.name}</span>
          <span style="display:flex;align-items:center;gap:10px"><span class="price" style="color:var(--red)">-${fmt(e.amount)}</span>
          <span class="del" onclick="delExpense(${i})">Удалить</span></span></div>`).join("")
          : `<p class="empty">Расходов пока нет</p>`}
      </div>
      <button class="btn secondary" style="margin-top:10px" onclick="uiAddExpense()">+ Добавить расход</button>
      <button class="btn secondary" style="margin-top:16px;margin-bottom:28px" onclick="startNewDay()">Закрыть смену / новый день</button>
    </div>`;
  HOME_CARS = session.cars.slice().reverse();
  HOME_IDX = 0;
  renderHomeSwipeCard();
  attachPullToRefresh("view-home", renderHome);
}
let HOME_CARS = [];
let HOME_IDX = 0;
window.toggleHomeCarStatus = async (num, currentStatus) => {
  haptic("medium");
  const next = currentStatus === "done" ? "in_progress" : "done";
  try {
    await api(`/api/car/${encodeURIComponent(BRANCH)}/${num}/status`, { method: "PATCH", body: JSON.stringify({ status: next }) });
    const car = HOME_CARS.find(c => c.num === num);
    if (car) car.status = next;
    renderHomeSwipeCard();
  } catch(e){}
};
function renderHomeSwipeCard(){
  const wrap = document.getElementById("home-swipe-wrap");
  if (!wrap) return;
  if (!HOME_CARS.length) { wrap.innerHTML = `<p class="empty">Машин пока нет</p>`; return; }
  if (HOME_IDX < 0) HOME_IDX = HOME_CARS.length - 1;
  if (HOME_IDX >= HOME_CARS.length) HOME_IDX = 0;
  const c = HOME_CARS[HOME_IDX];
  const dots = HOME_CARS.slice(0, 8).map((_, i) => `<span class="${i===HOME_IDX?'on':''}"></span>`).join("");
  const cStatus = c.status || "done";
  const cStatusLabel = cStatus === "done" ? "Оплачено" : "В работе";
  const cStatusColor = cStatus === "done" ? "#22C55E" : "#F97316";
  wrap.innerHTML = `
    <div class="swipe-card" id="home-swipe-el">
      <span class="counter">${HOME_IDX+1}/${HOME_CARS.length}</span>
      <p class="car-name">${c.car || "Машина"}</p>
      <p class="car-sub">${c.employee} · ${c.service}</p>
      <p class="car-price">${fmt(c.price)}</p>
      <span onclick="toggleHomeCarStatus(${c.num},'${cStatus}')" style="display:inline-block;margin-top:8px;font-size:11px;font-weight:700;padding:3px 10px;border-radius:10px;background:${cStatusColor}22;color:${cStatusColor}">${cStatusLabel}</span>
      <span class="del" style="display:inline-block;margin-top:6px;margin-left:8px" onclick="uiCarQuick(${c.num})">Удалить</span>
    </div>
    <div class="swipe-nav">
      <button onclick="homeSwipeStep(-1)"><i class="ti ti-chevron-left"></i></button>
      <div class="swipe-dots">${dots}</div>
      <button onclick="homeSwipeStep(1)"><i class="ti ti-chevron-right"></i></button>
    </div>`;
  const el = document.getElementById("home-swipe-el");
  let startX = null;
  el.addEventListener("touchstart", e => { startX = e.touches[0].clientX; });
  el.addEventListener("touchend", e => {
    if (startX === null) return;
    const dx = e.changedTouches[0].clientX - startX;
    if (Math.abs(dx) > 40) homeSwipeStep(dx < 0 ? 1 : -1);
    startX = null;
  });
}
window.homeSwipeStep = (dir) => { haptic(); HOME_IDX += dir; renderHomeSwipeCard(); };
window.uiWorkerQuick = async (name) => {
  const { summary, session } = await api(`/api/session?branch=${encodeURIComponent(BRANCH)}`);
  const { schedule } = await api(`/api/workers?branch=${encodeURIComponent(BRANCH)}`);
  const cnt = session.cars.filter(c => c.employee === name).length;
  const sal = summary.washer_salaries?.[name] || 0;
  const sched = schedule?.[name]?.schedule;
  const working = schedule?.[name]?.working !== false;
  const schedLine = sched ? `График: ${sched.work}/${sched.rest} · сегодня ${working ? "работает" : "отдыхает 🌙"}` : "График не задан (доступен всегда)";
  tg.showPopup({
    title: name,
    message: `${cnt} машин сегодня · к выплате ${fmt(sal)}\n${schedLine}`,
    buttons: [
      { id: "schedule", type: "default", text: "График работы" },
      { id: "cancel", type: "cancel" },
    ],
  }, (id) => { if (id === "schedule") uiSetSchedule(name); });
};
window.uiCarQuick = (num) => {
  tg.showConfirm("Удалить эту машину?", async (ok) => {
    if (!ok) return;
    haptic("medium");
    await api(`/api/car/${encodeURIComponent(BRANCH)}/${num}`, { method: "DELETE" });
    HOME_IDX = Math.max(0, HOME_IDX - 1);
    const activeTab = document.querySelector(".tab.active")?.dataset.tab || "home";
    switchTab(activeTab);
  });
};
window.uiAddExpense = () => {
  const name = window.prompt("Название расхода:");
  if (!name) return;
  const amountStr = window.prompt("Сумма (₽):", "500");
  const amount = parseInt((amountStr || "").replace(/[^\d]/g, ""), 10);
  if (!amount) return tg.showAlert("Введи корректную сумму");
  api("/api/expense", { method: "POST", body: JSON.stringify({ branch: BRANCH, name, amount }) })
    .then(() => { haptic("medium"); renderHome(); })
    .catch(() => {});
};
window.delExpense = (idx) => {
  tg.showConfirm("Удалить расход?", async (ok) => {
    if (!ok) return;
    haptic("medium");
    await api(`/api/expense/${encodeURIComponent(BRANCH)}/${idx}`, { method: "DELETE" });
    renderHome();
  });
};
window.startNewDay = async () => {
  tg.showConfirm("Закрыть смену и начать новый день? Текущая касса уйдёт в архив.", async (ok) => {
    if (!ok) return;
    try { await api(`/api/newday?branch=${encodeURIComponent(BRANCH)}`, { method: "POST" }); }
    catch(e){ return; }
    haptic("medium"); renderHome();
  });
};
window.downloadPdf = () => { window.open(`/api/reports/pdf?branch=${encodeURIComponent(BRANCH)}`, "_blank"); };
window.downloadXlsx = () => { window.open(`/api/reports/xlsx?branch=${encodeURIComponent(BRANCH)}`, "_blank"); };
window.delCar = async (num) => {
  tg.showConfirm("Удалить машину?", async (ok) => {
    if (!ok) return;
    haptic("medium");
    await api(`/api/car/${encodeURIComponent(BRANCH)}/${num}`, { method: "DELETE" });
    if (!document.getElementById("view-all-cars").classList.contains("hidden")) renderAllCars();
    else switchTab("home");
  });
};

// ── ДОБАВЛЕНИЕ / РЕДАКТИРОВАНИЕ МАШИНЫ ────────────────────────────────────

        <span style="font-size:14px;color:var(--text-secondary)">Стоимость</span>

window.applyPreset = (name) => {
  api(`/api/presets?branch=${encodeURIComponent(BRANCH)}`).then(({presets}) => {
    const p = presets.find(x => x.name === name);
    if (!p) return;
    haptic("medium");
    selectedServices = [...p.service_keys];
    customServices = p.custom_services.map(c => ({...c}));
    renderServiceChips(); renderCustomList();
  });
};
window.uiSavePreset = async () => {
  if (!selectedServices.length && !customServices.length) return tg.showAlert("Сначала выбери услуги");
  const name = window.prompt("Название пресета (например: «Стандарт седан»):");
  if (!name) return;
  try {
    await api("/api/presets", { method: "POST", body: JSON.stringify({ branch: BRANCH, name, service_keys: selectedServices, custom_services: customServices }) });
    haptic("medium"); tg.showAlert("Пресет сохранён ✓");
  } catch(e){}
};
function renderServiceChips(){
  const bodyType = document.getElementById("f-body").value;
  const wrap = document.getElementById("f-services");
  wrap.innerHTML = CFG.services.map((s, i) => {
    const price = s.prices[bodyType] ?? Object.values(s.prices)[0];
    const active = selectedServices.includes(s.key);
    return `<div class="chip-label ${active ? 'active' : ''}" data-key="${s.key}" onclick="toggleService('${s.key}')">
      <span class="l">${s.name}</span>
      <span class="r"><span class="p">${price}₽</span><span class="tick ${active ? 'on' : ''}">✓</span></span>
    </div>`;
  }).join("");
  updateTotal();
}
window.toggleService = (key) => {
  haptic();
  selectedServices = selectedServices.includes(key) ? selectedServices.filter(k=>k!==key) : [...selectedServices, key];
  renderServiceChips();
};
window.addCustomService = () => {
  const name = window.prompt("Название услуги:");
  if (!name) return;
  const price = parseInt(window.prompt("Цена (₽):", "1000") || "0", 10);
  const percent = parseFloat(window.prompt("Процент мойщику (%):", "30") || "30");
  customServices.push({ name, price, percent });
  renderCustomList();
};
function renderCustomList(){
  const wrap = document.getElementById("f-custom");
  if (!customServices.length) { wrap.innerHTML = ""; updateTotal(); return; }
  wrap.innerHTML = `<div class="card" style="margin-top:10px">` + customServices.map((c,i) => `
    <div class="row"><div><p class="name">${c.name}</p><p class="sub">${c.percent}% мойщику</p></div>
    <div class="meta"><p class="price">${c.price}₽</p><span class="del" onclick="removeCustom(${i})">Убрать</span></div></div>
  `).join("") + `</div>`;
  updateTotal();
}
window.removeCustom = (i) => { customServices.splice(i,1); renderCustomList(); };
window.toggleSplitRow = () => {
  const cb = document.getElementById("f-split-toggle");
  cb.checked = !cb.checked;
  haptic();
  toggleSplit();
};
window.toggleSplit = () => {
  const on = document.getElementById("f-split-toggle").checked;
  document.getElementById("f-payment").disabled = on;
  renderSplitInputs();
};
function renderSplitInputs(){
  const wrap = document.getElementById("f-split-wrap");
  const on = document.getElementById("f-split-toggle").checked;
  if (!on) { wrap.innerHTML = ""; return; }
  wrap.innerHTML = `
    <div class="card card-pad">
      ${CFG.payment_types.map(p => `
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <span style="font-size:14px">${p}</span>
          <input type="number" inputmode="numeric" class="split-input" data-method="${p}" placeholder="0" style="width:110px;margin:0;text-align:right" oninput="updateTotal()">
        </div>`).join("")}
      <p class="sub" id="f-split-hint" style="margin:4px 0 0"></p>
    </div>`;
  updateTotal();
}
function getSplitValues(){
  return [...document.querySelectorAll(".split-input")].reduce((acc, inp) => {
    const v = parseInt(inp.value || "0", 10);
    if (v) acc[inp.dataset.method] = v;
    return acc;
  }, {});
}
function updateTotal(){
  const bodyType = document.getElementById("f-body")?.value;
  let total = selectedServices.reduce((sum,k) => {
    const s = CFG.services.find(s=>s.key===k);
    return sum + (s.prices[bodyType] ?? Object.values(s.prices)[0]);
  }, 0);
  total += customServices.reduce((sum,c) => sum + c.price, 0);
  const totalEl = document.getElementById("f-total");
  if (totalEl) totalEl.textContent = fmt(total);
  const splitToggle = document.getElementById("f-split-toggle");
  const hint = document.getElementById("f-split-hint");
  if (splitToggle?.checked && hint) {
    const sum = Object.values(getSplitValues()).reduce((a,b)=>a+b,0);
    const diff = total - sum;
    hint.textContent = diff === 0 ? "Сумма сходится ✓" : `Осталось распределить: ${fmt(diff)}`;
    hint.style.color = diff === 0 ? "var(--green)" : "var(--red)";
  }
}
window.submitCar = async () => {
  const btn = document.getElementById("f-submit");
  if (!selectedServices.length && !customServices.length) return tg.showAlert("Выбери хотя бы одну услугу");
  const emp = document.getElementById("f-emp").value;
  if (!emp) return tg.showAlert("Сначала добавь сотрудника в настройках");
  const isSplit = document.getElementById("f-split-toggle").checked;
  let paymentSplit = null;
  if (isSplit) {
    paymentSplit = getSplitValues();
    const total = parseInt((document.getElementById("f-total").textContent || "0").replace(/\D/g,""), 10);
    const sum = Object.values(paymentSplit).reduce((a,b)=>a+b,0);
    if (!Object.keys(paymentSplit).length) return tg.showAlert("Укажи суммы по способам оплаты");
    if (sum !== total) return tg.showAlert(`Сумма раздельной оплаты (${sum}₽) не совпадает со стоимостью (${total}₽)`);
  }
  await withLoading(btn, async () => {
    if (EDIT_CAR_NUM) {
      const body = {
        employee: emp, body_type: document.getElementById("f-body").value,
        service_keys: selectedServices, custom_services: customServices,
        car: document.getElementById("f-car").value,
        payment: isSplit ? "Раздельно" : document.getElementById("f-payment").value,
        payment_split: paymentSplit,
        comment: document.getElementById("f-comment").value,
      };
      await api(`/api/car/${encodeURIComponent(BRANCH)}/${EDIT_CAR_NUM}`, { method: "PUT", body: JSON.stringify(body) });
      haptic("medium"); switchTab("all-cars");
    } else {
      const body = {
        branch: BRANCH, employee: emp,
        body_type: document.getElementById("f-body").value,
        service_keys: selectedServices, custom_services: customServices,
        car: document.getElementById("f-car").value,
        payment: isSplit ? "Раздельно" : document.getElementById("f-payment").value,
        payment_split: paymentSplit,
        comment: document.getElementById("f-comment").value,
      };
      await api("/api/car", { method: "POST", body: JSON.stringify(body) });
      haptic("medium"); switchTab("home");
    }
  });
};

window.toggleCarStatus = async (num, currentStatus) => {
  haptic("medium");
  const next = currentStatus === "done" ? "in_progress" : "done";

    await api(`/api/car/${encodeURIComponent(BRANCH)}/${num}/status`, { method: "PATCH", body: JSON.stringify({ status: next }) });

function renderCarsList(){
  const wrap = document.getElementById("cars-list");
  const searchWrap = document.getElementById("cars-search-wrap");
  const q = (document.getElementById("cars-search")?.value || "").trim().toLowerCase();
  if (searchWrap) searchWrap.classList.toggle("has-value", !!q);
  let list = ALL_CARS;
  if (ALL_CARS_FILTER_EMP) list = list.filter(c => c.employee === ALL_CARS_FILTER_EMP);
  if (q) list = list.filter(c => (c.car||"").toLowerCase().includes(q) || (c.employee||"").toLowerCase().includes(q));

  if (!list.length) { wrap.innerHTML = `<p class="empty">Ничего не найдено</p>`; return; }

  wrap.innerHTML = list.map(c => {
    const status = c.status || "done";
    const statusLabel = status === "done" ? "Оплачено" : "В работе";
    const statusColor = status === "done" ? "#22C55E" : "#F97316";
    return `
    <div class="swipe-item" data-num="${c.num}">
      <div class="swipe-bg" onclick="delCar(${c.num})"><i class="ti ti-trash"></i></div>
      <div class="swipe-fg">
        <div class="row" style="cursor:pointer" data-longpress-num="${c.num}">
          <div><p class="name">${(c.time?c.time+" · ":"")}${c.car || "Машина"} · ${c.service}</p><p class="sub">${c.employee} · ${paymentLabel(c)}</p></div>
          <div class="meta">
            <p class="price">${fmt(c.price)}</p>
            <span onclick="event.stopPropagation();toggleCarStatus(${c.num},'${status}')" style="display:inline-block;margin-top:3px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;background:${statusColor}22;color:${statusColor}">${statusLabel}</span>
          </div>
        </div>
      </div>
    </div>`;
  }).join("");

  wrap.querySelectorAll(".swipe-item").forEach(item => bindSwipeToDelete(item));
  wrap.querySelectorAll("[data-longpress-num]").forEach(row => bindLongPress(row, () => openCarQuickMenu(parseInt(row.dataset.longpressNum, 10))));
}

// свайп-влево-для-удаления (пункт "Свайп для удаления")
function bindSwipeToDelete(item){
  const fg = item.querySelector(".swipe-fg");
  const num = parseInt(item.dataset.num, 10);
  let startX = null, dx = 0, dragging = false, moved = false;
  fg.addEventListener("touchstart", (e) => { startX = e.touches[0].clientX; dragging = true; fg.classList.add("dragging"); moved = false; });
  fg.addEventListener("touchmove", (e) => {
    if (!dragging) return;
    dx = e.touches[0].clientX - startX;
    if (Math.abs(dx) > 6) moved = true;
    if (dx < 0) fg.style.transform = `translateX(${Math.max(dx, -84)}px)`;
  });
  fg.addEventListener("touchend", () => {
    dragging = false; fg.classList.remove("dragging");
    if (dx < -50) fg.style.transform = "translateX(-84px)";
    else fg.style.transform = "translateX(0)";
    dx = 0;
  });
  fg.dataset.wasSwipeMoved = "0";
  fg.addEventListener("click", (e) => { if (moved) { e.stopPropagation(); e.preventDefault(); } });
}

// долгий тап → быстрое меню (пункт "Долгий тап на машину")
function bindLongPress(el, onLongPress){
  let timer = null, moved = false, startX=0, startY=0;
  const clear = () => { if (timer) { clearTimeout(timer); timer = null; } };
  el.addEventListener("touchstart", (e) => {
    moved = false;
    startX = e.touches[0].clientX; startY = e.touches[0].clientY;
    timer = setTimeout(() => { if (!moved) { haptic("medium"); onLongPress(); } }, 480);
  }, { passive: true });
  el.addEventListener("touchmove", (e) => {
    if (Math.abs(e.touches[0].clientX-startX) > 10 || Math.abs(e.touches[0].clientY-startY) > 10) { moved = true; clear(); }
  }, { passive: true });
  el.addEventListener("touchend", clear);
  el.addEventListener("touchcancel", clear);
}
window.openCarQuickMenu = (num) => {
  const c = ALL_CARS.find(x => x.num === num);
  if (!c) return;
  openSheet(`${c.car || "Машина"} · ${fmt(c.price)}`, [
    { icon: "ti-pencil", label: "Изменить", fn: `() => switchTab('add', ${num})` },
    { icon: "ti-trash", label: "Удалить", destructive: true, fn: `() => delCar(${num})` },
  ]);
};

    <div class="content">
      <p class="label">Только для админа · ${BRANCH}</p>
      <div class="card">
        <div class="row link" onclick="uiSetBranchAdmin()"><span class="name"><i class="ti ti-shield-star icon-badge blue"></i>Назначить админа филиала</span><i class="ti ti-chevron-right chevron"></i></div>
        ${ME.is_owner ? `

      </div>
      <p class="group-label">Сотрудники (${workers.length})</p>

        ${workers.map(w => `<div class="tag" onclick="uiWorkerRow('${w.replace(/'/g,"\\'")}')"><span class="av" style="background:${avatarColor(w)}22;color:${avatarColor(w)}">${initials(w)}</span><span>${w}</span></div>`).join("")}

}
window.uiWorkerRow = (name) => {
  tg.showPopup({
    title: name,
    message: "Что сделать с сотрудником?",
    buttons: [
      { id: "schedule", type: "default", text: "График работы" },
      { id: "admin", type: "default", text: "Назначить админом филиала" },
      { id: "remove", type: "destructive", text: "Удалить" },
      { id: "cancel", type: "cancel" },
    ],
  }, async (id) => {
    if (id === "remove") {
      try { await api(`/api/workers/${encodeURIComponent(BRANCH)}/${encodeURIComponent(name)}`, { method: "DELETE" }); haptic("medium"); renderSettings(); }
      catch(e){}
    } else if (id === "admin") {
      const idStr = window.prompt(`Telegram ID для ${name} как админа филиала:`);
      const uid = parseInt(idStr || "", 10);
      if (!uid) return;
      try { await api("/api/branch-admin", { method: "POST", body: JSON.stringify({ branch: BRANCH, user_id: uid }) }); haptic("medium"); tg.showAlert("Админ назначен"); }
      catch(e){}
    } else if (id === "schedule") {
      uiSetSchedule(name);
    }
  });
};
window.uiSetSchedule = (name) => {
  const refresh = () => {
    const activeTab = document.querySelector(".tab.active")?.dataset.tab || "home";
    switchTab(activeTab);
  };
  const pattern = window.prompt(`График для ${name}\nНапример "3/1" — 3 дня работает, 1 отдыхает.\nОставь пустым, чтобы убрать график (доступен всегда).`, "3/1");
  if (pattern === null) return;
  if (pattern.trim() === "") {
    api(`/api/schedule/${encodeURIComponent(BRANCH)}/${encodeURIComponent(name)}`, { method: "DELETE" })
      .then(() => { haptic("medium"); tg.showAlert("График сброшен"); refresh(); }).catch(() => {});
    return;
  }
  const m = pattern.trim().match(/^(\d+)\s*\/\s*(\d+)$/);
  if (!m) return tg.showAlert('Формат: "3/1" (работает/отдыхает)');
  const work_days = parseInt(m[1], 10), rest_days = parseInt(m[2], 10);
  const startStr = window.prompt("С какой даты считать (ГГГГ-ММ-ДД)?", new Date().toISOString().slice(0, 10));
  if (!startStr) return;
  api("/api/schedule", { method: "POST", body: JSON.stringify({ branch: BRANCH, name, work_days, rest_days, start_date: startStr }) })
    .then(() => { haptic("medium"); tg.showAlert(`График ${work_days}/${rest_days} установлен`); refresh(); })
    .catch(() => {});
};
window.switchBranch = () => { BRANCH = null; ME = null; switchTab("home"); };

window.uiListUsers = async () => {

switchTab = function(name, editNum){
  if (name === "day-report") {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll("[id^=view-]").forEach(v => v.classList.add("hidden"));
    document.getElementById("view-day-report").classList.remove("hidden");
    renderDayReport();
    return;
  }
  if (name === "all-cars") {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll("[id^=view-]").forEach(v => v.classList.add("hidden"));
    document.getElementById("view-all-cars").classList.remove("hidden");
    renderAllCars();
    return;
  }
  if (name === "history") {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll("[id^=view-]").forEach(v => v.classList.add("hidden"));
    document.getElementById("view-history").classList.remove("hidden");
    renderHistory();
    return;
  }
  _switchTab(name, editNum);
};
