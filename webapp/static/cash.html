<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CarWash Cloud — касса за смену</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
:root{
  --bg:#0A0A0B;
  --surface-0:#141414;
  --surface-1:#1C1C1E;
  --surface-2:#232325;
  --surface-3:#2C2C2E;
  --text:#FFFFFF;
  --text-secondary:#AEAEB2;
  --text-muted:#6C6C70;
  --border:rgba(255,255,255,0.08);
  --border-strong:rgba(255,255,255,0.14);
  --accent:#007AFF;
  --accent-tint:rgba(0,122,255,0.14);
  --green:#34C759;
  --green-tint:rgba(52,199,89,0.14);
  --red:#FF3B30;
  --red-tint:rgba(255,59,48,0.12);
  --orange:#FF9F0A;
  --orange-tint:rgba(255,159,10,0.14);
  --purple:#BF5AF2;
  --purple-tint:rgba(191,90,242,0.14);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display",Segoe UI,Roboto,sans-serif;
  background:var(--bg); color:var(--text);
  -webkit-font-smoothing:antialiased;
}
.shell{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
.sidebar{background:var(--surface-1);border-right:0.5px solid var(--border);padding:20px 14px;display:flex;flex-direction:column}
.brand{display:flex;align-items:center;gap:10px;padding:6px 8px 24px}
.brand-icon{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#1a6fff 0%,#3B82F6 100%);display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;flex-shrink:0}
.brand-name{font-size:15px;font-weight:700;letter-spacing:-0.01em}
.branch-select{margin-bottom:18px;padding:10px 12px;border-radius:12px;background:var(--surface-2);border:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.branch-select .bs-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
.branch-select .bs-value{font-size:13px;font-weight:600}
.branch-select i{color:var(--text-muted);font-size:14px}
.nav-group-label{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;padding:14px 10px 6px}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:10px;font-size:13.5px;font-weight:500;color:var(--text-secondary);cursor:pointer}
.nav-item i{font-size:17px;width:18px;text-align:center;color:var(--text-muted)}
.nav-item.active{background:var(--accent-tint);color:var(--accent)}
.nav-item.active i{color:var(--accent)}
.nav-item:hover:not(.active){background:var(--surface-2)}
.sidebar-foot{margin-top:auto;padding-top:14px;border-top:0.5px solid var(--border)}
.user-row{display:flex;align-items:center;gap:10px;padding:8px}
.user-av{width:32px;height:32px;border-radius:50%;background:var(--purple-tint);color:var(--purple);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.user-name{font-size:13px;font-weight:600}
.user-role{font-size:11px;color:var(--text-muted)}

.main{padding:24px 32px 48px;max-width:1160px}
.page-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px}
.page-title{font-size:24px;font-weight:700;letter-spacing:-0.02em}
.page-sub{font-size:13px;color:var(--text-secondary);margin-top:3px}
.head-actions{display:flex;gap:8px}
.btn{height:38px;padding:0 16px;border-radius:10px;border:none;font-family:inherit;font-size:13.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px}
.btn.primary{background:var(--accent);color:#fff}
.btn.secondary{background:var(--surface-1);color:var(--text);border:0.5px solid var(--border)}
.btn.danger{background:var(--red);color:#fff}
.btn:disabled{opacity:.5;cursor:default}

.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}
.stat-card{background:var(--surface-1);border:0.5px solid var(--border);border-radius:14px;padding:16px 18px}
.stat-card .sc-label{font-size:12px;color:var(--text-muted);font-weight:500;margin-bottom:8px}
.stat-card .sc-value{font-size:22px;font-weight:700;letter-spacing:-0.01em}
.stat-card.accent-green .sc-value{color:var(--green)}
.stat-card.accent-red .sc-value{color:var(--red)}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start;margin-top:14px}
.panel{background:var(--surface-1);border:0.5px solid var(--border);border-radius:14px;overflow:hidden}
.panel-head{display:flex;justify-content:space-between;align-items:center;padding:16px 18px 12px}
.panel-title{font-size:14.5px;font-weight:700}

.list-row{display:flex;align-items:center;gap:10px;padding:11px 18px;border-top:0.5px solid var(--border)}
.list-row:first-child{border-top:none}
.list-name{flex:1;font-size:13.5px}
.list-amount{font-size:14px;font-weight:700}
.list-amount.neg{color:var(--red)}
.list-amount.pos{color:var(--green)}
.icon-btn{width:26px;height:26px;border-radius:8px;border:0.5px solid var(--border);background:var(--surface-2);color:var(--text-secondary);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.icon-btn:hover{color:var(--red);border-color:var(--red)}
.empty-note{padding:20px 18px;font-size:13px;color:var(--text-muted);text-align:center}

.add-row{display:flex;gap:8px;padding:12px 18px;border-top:0.5px solid var(--border)}
.add-row input, .add-row select{height:36px;border-radius:9px;background:var(--surface-2);border:0.5px solid var(--border-strong);color:var(--text);font-size:13px;padding:0 10px;font-family:inherit}
.add-row .f-name{flex:1}
.add-row .f-amount{width:100px}
.add-row .f-pay{width:100px}
.add-row button{width:36px;border-radius:9px;border:none;background:var(--accent);color:#fff;cursor:pointer;flex-shrink:0}

.pay-tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;white-space:nowrap}
.pay-tag.cash{background:var(--green-tint);color:var(--green)}
.pay-tag.card{background:var(--accent-tint);color:var(--accent)}
.pay-tag.transfer{background:var(--orange-tint);color:var(--orange)}
.pay-tag.split{background:var(--purple-tint);color:var(--purple)}
.list-pay{margin-right:2px}
.split-row{display:none;gap:8px;padding:0 18px 12px;border-top:none}
.split-row.show{display:flex}
.split-row input{height:34px;border-radius:9px;background:var(--surface-2);border:0.5px solid var(--border-strong);color:var(--text);font-size:12.5px;padding:0 8px;font-family:inherit;width:100%}
.split-row .sr-field{flex:1;display:flex;flex-direction:column;gap:3px}
.split-row .sr-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.03em}
.split-hint{padding:0 18px 10px;font-size:11.5px;color:var(--text-muted);display:none}
.split-hint.show{display:block}
.split-hint.err{color:var(--red)}
.err-banner{background:var(--red-tint);color:var(--red);border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:16px;display:none}
.close-panel{background:var(--surface-1);border:0.5px solid var(--border);border-radius:14px;padding:18px;margin-top:14px;display:flex;justify-content:space-between;align-items:center}
.close-panel .cp-title{font-size:14px;font-weight:700}
.close-panel .cp-sub{font-size:12.5px;color:var(--text-muted);margin-top:3px}
</style>
</head>
<body>
<div class="shell">
  <div class="sidebar" id="sidebarRoot"></div>

  <div class="main">
    <div class="err-banner" id="errBanner"></div>

    <div class="page-head">
      <div>
        <div class="page-title">Касса за смену</div>
        <div class="page-sub" id="pageSub">—</div>
      </div>
      <div class="head-actions">
        <button class="btn secondary" id="refreshBtn"><i class="ti ti-refresh"></i>Обновить</button>
        <button class="btn secondary" id="exportBtn"><i class="ti ti-file-export"></i>PDF</button>
      </div>
    </div>

    <div class="stat-row" id="payRow">
      <div class="stat-card"><div class="sc-label">Наличные</div><div class="sc-value">—</div></div>
      <div class="stat-card"><div class="sc-label">Visa</div><div class="sc-value">—</div></div>
      <div class="stat-card"><div class="sc-label">Безнал</div><div class="sc-value">—</div></div>
      <div class="stat-card"><div class="sc-label">Итого (с учётом скидок)</div><div class="sc-value">—</div></div>
    </div>

    <div class="grid-2">
      <div class="panel">
        <div class="panel-head">
          <div class="panel-title">Расходы</div>
          <div style="font-size:13px;color:var(--red);font-weight:700" id="expTotal">0 ₽</div>
        </div>
        <div id="expList"></div>
        <div id="expEmpty" class="empty-note" style="display:none">Расходов пока нет</div>
        <div class="add-row">
          <input class="f-name" id="expName" type="text" placeholder="Название (например, вода)">
          <input class="f-amount" id="expAmount" type="number" placeholder="₽">
          <button id="expAddBtn"><i class="ti ti-plus"></i></button>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <div class="panel-title">Доходы (доп.)</div>
          <div style="font-size:13px;color:var(--green);font-weight:700" id="incTotal">0 ₽</div>
        </div>
        <div id="incList"></div>
        <div id="incEmpty" class="empty-note" style="display:none">Доп. доходов пока нет</div>
        <div class="add-row">
          <input class="f-name" id="incName" type="text" placeholder="Название (например, продажа духов)">
          <input class="f-amount" id="incAmount" type="number" placeholder="₽">
          <select class="f-pay" id="incPay"></select>
          <button id="incAddBtn"><i class="ti ti-plus"></i></button>
        </div>
        <div class="split-row" id="incSplitRow">
          <div class="sr-field"><div class="sr-label">Нал</div><input type="number" id="incSplitCash" placeholder="0"></div>
          <div class="sr-field"><div class="sr-label">Visa</div><input type="number" id="incSplitVisa" placeholder="0"></div>
          <div class="sr-field"><div class="sr-label">Безнал</div><input type="number" id="incSplitBeznal" placeholder="0"></div>
        </div>
        <div class="split-hint" id="incSplitHint"></div>
      </div>
    </div>

    <div class="close-panel" id="closePanel" style="display:none">
      <div>
        <div class="cp-title">Закрыть смену</div>
        <div class="cp-sub">Сохранит день в архив и обнулит кассу филиала «<span id="closeBranchName"></span>»</div>
      </div>
      <button class="btn danger" id="closeBtn"><i class="ti ti-lock"></i>Закрыть смену</button>
    </div>
  </div>
</div>

<script src="/static/site-common.js"></script>
<script>
if (CW.requireAuth()) {
  CW.renderSidebar("cash");

  const branch = CW.getActiveBranch();
  const errEl = document.getElementById("errBanner");
  function showErr(msg) { errEl.textContent = msg; errEl.style.display = "block"; }

  if (!branch) {
    showErr("Филиал не выбран. Выберите филиал в сайдбаре.");
  } else {
    document.getElementById("pageSub").textContent = `${branch} · ${CW.todayLabel()}`;
    document.getElementById("closeBranchName").textContent = branch;
    document.getElementById("exportBtn").onclick = () => {
      window.location.href = `/api/reports/pdf?branch=${encodeURIComponent(branch)}`;
    };

    const role = CW.getRole();
    if (role === "админ" || role === "владелец") {
      document.getElementById("closePanel").style.display = "flex";
    }

    let cfg = null;
    CW.authFetch("/api/config").then(c => {
      cfg = c;
      const sel = document.getElementById("incPay");
      sel.innerHTML = cfg.payment_types.map(p => `<option value="${p}">${p[0].toUpperCase() + p.slice(1)}</option>`).join("")
        + `<option value="раздельная">Раздельная</option>`;
    }).catch(() => {});

    const incSplitRow = document.getElementById("incSplitRow");
    const incSplitHint = document.getElementById("incSplitHint");
    document.getElementById("incPay").addEventListener("change", (e) => {
      const isSplit = e.target.value === "раздельная";
      incSplitRow.classList.toggle("show", isSplit);
      incSplitHint.classList.toggle("show", isSplit);
      updateSplitHint();
    });

    function updateSplitHint() {
      const amount = parseInt(document.getElementById("incAmount").value, 10) || 0;
      const cash = parseInt(document.getElementById("incSplitCash").value, 10) || 0;
      const visa = parseInt(document.getElementById("incSplitVisa").value, 10) || 0;
      const beznal = parseInt(document.getElementById("incSplitBeznal").value, 10) || 0;
      const sum = cash + visa + beznal;
      incSplitHint.classList.toggle("err", sum !== amount);
      incSplitHint.textContent = `Сумма частей: ${sum} ₽ из ${amount} ₽` + (sum !== amount ? " — не совпадает с суммой дохода" : " ✓");
    }
    ["incAmount", "incSplitCash", "incSplitVisa", "incSplitBeznal"].forEach(id => {
      document.getElementById(id).addEventListener("input", updateSplitHint);
    });

    load();
  }

  function payTag(inc) {
    if (inc.payment_split) {
      const parts = Object.entries(inc.payment_split)
        .filter(([, v]) => v)
        .map(([k, v]) => `${k[0].toUpperCase() + k.slice(1)} ${CW.money(v)}`)
        .join(" + ");
      return `<span class="pay-tag split" title="${parts}">Раздельная</span>`;
    }
    const p = (inc.payment || "нал").toLowerCase();
    const cls = p === "нал" ? "cash" : (p === "visa" ? "card" : "transfer");
    const label = p[0].toUpperCase() + p.slice(1);
    return `<span class="pay-tag ${cls}">${label}</span>`;
  }

  async function load() {
    errEl.style.display = "none";
    try {
      const data = await CW.authFetch(`/api/session?branch=${encodeURIComponent(branch)}`);
      const session = data.session || {};
      const summary = data.summary || {};

      document.getElementById("payRow").innerHTML = `
        <div class="stat-card"><div class="sc-label">Наличные</div><div class="sc-value">${CW.money(summary.cash)}</div></div>
        <div class="stat-card"><div class="sc-label">Visa</div><div class="sc-value">${CW.money(summary.visa)}</div></div>
        <div class="stat-card"><div class="sc-label">Безнал</div><div class="sc-value">${CW.money(summary.beznal)}</div></div>
        <div class="stat-card"><div class="sc-label">Итого (с учётом скидок)</div><div class="sc-value">${CW.money(summary.grand_total)}</div></div>
      `;

      document.getElementById("expTotal").textContent = "−" + CW.money(summary.total_expenses);
      document.getElementById("incTotal").textContent = "+" + CW.money(summary.total_incomes);

      const expenses = session.expenses || [];
      const expList = document.getElementById("expList");
      const expEmpty = document.getElementById("expEmpty");
      if (!expenses.length) {
        expList.innerHTML = ""; expEmpty.style.display = "block";
      } else {
        expEmpty.style.display = "none";
        expList.innerHTML = expenses.map((e, i) => `
          <div class="list-row">
            <div class="list-name">${e.name}</div>
            <div class="list-amount neg">−${CW.money(e.amount)}</div>
            <div class="icon-btn" onclick="CW_delExpense(${i})"><i class="ti ti-trash"></i></div>
          </div>
        `).join("");
      }

      const incomes = session.incomes || [];
      const incList = document.getElementById("incList");
      const incEmpty = document.getElementById("incEmpty");
      if (!incomes.length) {
        incList.innerHTML = ""; incEmpty.style.display = "block";
      } else {
        incEmpty.style.display = "none";
        incList.innerHTML = incomes.map((inc, i) => `
          <div class="list-row">
            <div class="list-name">${inc.name}</div>
            <div class="list-pay">${payTag(inc)}</div>
            <div class="list-amount pos">+${CW.money(inc.amount)}</div>
            <div class="icon-btn" onclick="CW_delIncome(${i})"><i class="ti ti-trash"></i></div>
          </div>
        `).join("");
      }
    } catch (e) {
      showErr(e.message);
    }
  }

  document.getElementById("refreshBtn").addEventListener("click", load);

  document.getElementById("expAddBtn").addEventListener("click", async () => {
    const name = document.getElementById("expName").value.trim();
    const amount = parseInt(document.getElementById("expAmount").value, 10);
    if (!name || !amount) { showErr("Укажите название и сумму расхода"); return; }
    try {
      await CW.authFetch("/api/expense", { method: "POST", body: JSON.stringify({ branch, name, amount }) });
      document.getElementById("expName").value = "";
      document.getElementById("expAmount").value = "";
      await load();
    } catch (e) { showErr(e.message); }
  });

  document.getElementById("incAddBtn").addEventListener("click", async () => {
    const name = document.getElementById("incName").value.trim();
    const amount = parseInt(document.getElementById("incAmount").value, 10);
    const payment = document.getElementById("incPay").value;
    if (!name || !amount) { showErr("Укажите название и сумму дохода"); return; }

    const body = { branch, name, amount };
    if (payment === "раздельная") {
      const cash = parseInt(document.getElementById("incSplitCash").value, 10) || 0;
      const visa = parseInt(document.getElementById("incSplitVisa").value, 10) || 0;
      const beznal = parseInt(document.getElementById("incSplitBeznal").value, 10) || 0;
      const sum = cash + visa + beznal;
      if (sum !== amount) { showErr(`Сумма раздельной оплаты (${sum} ₽) не совпадает с суммой дохода (${amount} ₽)`); return; }
      const payment_split = {};
      if (cash) payment_split["нал"] = cash;
      if (visa) payment_split["visa"] = visa;
      if (beznal) payment_split["безнал"] = beznal;
      if (Object.keys(payment_split).length < 2) { showErr("Для раздельной оплаты укажите минимум два способа"); return; }
      body.payment_split = payment_split;
    } else {
      body.payment = payment;
    }

    try {
      await CW.authFetch("/api/income", { method: "POST", body: JSON.stringify(body) });
      document.getElementById("incName").value = "";
      document.getElementById("incAmount").value = "";
      document.getElementById("incSplitCash").value = "";
      document.getElementById("incSplitVisa").value = "";
      document.getElementById("incSplitBeznal").value = "";
      document.getElementById("incSplitRow").classList.remove("show");
      document.getElementById("incSplitHint").classList.remove("show");
      document.getElementById("incPay").value = payment === "раздельная" ? payment : document.getElementById("incPay").value;
      await load();
    } catch (e) { showErr(e.message); }
  });

  window.CW_delExpense = async (idx) => {
    try {
      await CW.authFetch(`/api/expense/${encodeURIComponent(branch)}/${idx}`, { method: "DELETE" });
      await load();
    } catch (e) { showErr(e.message); }
  };
  window.CW_delIncome = async (idx) => {
    try {
      await CW.authFetch(`/api/income/${encodeURIComponent(branch)}/${idx}`, { method: "DELETE" });
      await load();
    } catch (e) { showErr(e.message); }
  };

  const closeBtn = document.getElementById("closeBtn");
  if (closeBtn) {
    closeBtn.addEventListener("click", async () => {
      if (!confirm(`Закрыть смену филиала «${branch}»?\n\nДень будет сохранён в архив, касса обнулится. Отменить это действие нельзя.`)) return;
      closeBtn.disabled = true;
      try {
        await CW.authFetch(`/api/newday?branch=${encodeURIComponent(branch)}`, { method: "POST" });
        await load();
        alert("Смена закрыта и сохранена в архив.");
      } catch (e) {
        showErr(e.message);
      } finally {
        closeBtn.disabled = false;
      }
    });
  }
}
</script>
</body>
</html>
