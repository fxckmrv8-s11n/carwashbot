<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CarWash Cloud — панель управления</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
:root{
  --bg:#0A0A0B;
  --surface-0:#141414;
  --surface-1:#1C1C1E;
  --surface-2:#232325;
  --surface-3:#2C2C2E;
  --text:#FFFFFF;
  --text-secondary:#AEAEB2;
  --text-muted:#6C6C70;
  --border:rgba(255,255,255,0.08);
  --border-strong:rgba(255,255,255,0.14);
  --accent:#007AFF;
  --accent-tint:rgba(0,122,255,0.14);
  --green:#34C759;
  --green-tint:rgba(52,199,89,0.14);
  --red:#FF3B30;
  --red-tint:rgba(255,59,48,0.12);
  --orange:#FF9F0A;
  --orange-tint:rgba(255,159,10,0.14);
  --purple:#BF5AF2;
  --purple-tint:rgba(191,90,242,0.14);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display",Segoe UI,Roboto,sans-serif;
  background:var(--bg); color:var(--text);
  -webkit-font-smoothing:antialiased;
}

.shell{display:grid;grid-template-columns:240px 1fr;min-height:100vh}

.sidebar{
  background:var(--surface-1);border-right:0.5px solid var(--border);
  padding:20px 14px;display:flex;flex-direction:column;
}
.brand{display:flex;align-items:center;gap:10px;padding:6px 8px 24px}
.brand-icon{
  width:32px;height:32px;border-radius:9px;
  background:linear-gradient(135deg,#1a6fff 0%,#3B82F6 100%);
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;flex-shrink:0;
}
.brand-name{font-size:15px;font-weight:700;letter-spacing:-0.01em}

.branch-select{
  margin-bottom:18px;padding:10px 12px;border-radius:12px;
  background:var(--surface-2);border:0.5px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;cursor:default;
}
.branch-select .bs-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
.branch-select .bs-value{font-size:13px;font-weight:600}
.branch-select i{color:var(--text-muted);font-size:14px}

.nav-group-label{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;padding:14px 10px 6px}
.nav-item{
  display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:10px;
  font-size:13.5px;font-weight:500;color:var(--text-secondary);cursor:pointer;
}
.nav-item i{font-size:17px;width:18px;text-align:center;color:var(--text-muted)}
.nav-item.active{background:var(--accent-tint);color:var(--accent)}
.nav-item.active i{color:var(--accent)}
.nav-item:hover:not(.active){background:var(--surface-2)}

.sidebar-foot{margin-top:auto;padding-top:14px;border-top:0.5px solid var(--border)}
.user-row{display:flex;align-items:center;gap:10px;padding:8px}
.user-av{width:32px;height:32px;border-radius:50%;background:var(--purple-tint);color:var(--purple);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.user-name{font-size:13px;font-weight:600}
.user-role{font-size:11px;color:var(--text-muted)}

.main{padding:24px 32px 48px;max-width:1160px}
.page-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px}
.page-title{font-size:24px;font-weight:700;letter-spacing:-0.02em}
.page-sub{font-size:13px;color:var(--text-secondary);margin-top:3px}
.head-actions{display:flex;gap:8px}
.btn{
  height:38px;padding:0 16px;border-radius:10px;border:none;font-family:inherit;
  font-size:13.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;
}
.btn.primary{background:var(--accent);color:#fff}
.btn.secondary{background:var(--surface-1);color:var(--text);border:0.5px solid var(--border)}

.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--surface-1);border:0.5px solid var(--border);border-radius:14px;padding:16px 18px}
.stat-card .sc-label{font-size:12px;color:var(--text-muted);font-weight:500;margin-bottom:8px;display:flex;justify-content:space-between}
.stat-card .sc-value{font-size:24px;font-weight:700;letter-spacing:-0.01em}
.stat-card .sc-delta{font-size:11.5px;color:var(--green);margin-top:4px;font-weight:600}
.stat-card .sc-delta.down{color:var(--red)}
.stat-card .sc-delta.muted{color:var(--text-muted)}

.grid-2{display:grid;grid-template-columns:1.5fr 1fr;gap:14px;align-items:start}
.panel{background:var(--surface-1);border:0.5px solid var(--border);border-radius:14px;overflow:hidden}
.panel-head{display:flex;justify-content:space-between;align-items:center;padding:16px 18px 12px}
.panel-title{font-size:14.5px;font-weight:700}
.panel-link{font-size:12px;color:var(--accent);font-weight:600;cursor:pointer}

table.data{width:100%;border-collapse:collapse}
table.data th{
  text-align:left;font-size:11px;color:var(--text-muted);font-weight:600;
  text-transform:uppercase;letter-spacing:.03em;padding:8px 18px;border-top:0.5px solid var(--border);
}
table.data td{padding:11px 18px;font-size:13.5px;border-top:0.5px solid var(--border)}
table.data tr:hover td{background:var(--surface-2)}
.pay-tag{
  display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;
}
.pay-tag.cash{background:var(--green-tint);color:var(--green)}
.pay-tag.card{background:var(--accent-tint);color:var(--accent)}
.pay-tag.transfer{background:var(--orange-tint);color:var(--orange)}
.emp-cell{display:flex;align-items:center;gap:8px}
.emp-dot{width:7px;height:7px;border-radius:50%}

.worker-row{display:flex;align-items:center;gap:10px;padding:11px 18px;border-top:0.5px solid var(--border)}
.worker-row:first-child{border-top:none}
.worker-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.worker-info{flex:1;min-width:0}
.worker-name{font-size:13px;font-weight:600}
.worker-meta{font-size:11.5px;color:var(--text-muted)}
.worker-sal{font-size:14px;font-weight:700}

.empty-note{padding:24px 18px;font-size:13px;color:var(--text-muted);text-align:center}
.load-note{padding:24px 18px;font-size:13px;color:var(--text-muted);text-align:center}
.err-banner{background:var(--red-tint);color:var(--red);border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:16px;display:none}
</style>
</head>
<body>
<div class="shell">
  <div class="sidebar" id="sidebarRoot"></div>

  <div class="main">
    <div class="err-banner" id="errBanner"></div>

    <div class="page-head">
      <div>
        <div class="page-title">Дашборд</div>
        <div class="page-sub" id="pageSub">—</div>
      </div>
      <div class="head-actions">
        <button class="btn secondary" id="exportBtn"><i class="ti ti-file-export"></i>Экспорт PDF</button>
        <button class="btn primary" id="addCarBtn"><i class="ti ti-plus"></i>Добавить машину</button>
      </div>
    </div>

    <div class="stat-row" id="statRow">
      <div class="stat-card"><div class="sc-label">Дневная выручка</div><div class="sc-value">—</div></div>
      <div class="stat-card"><div class="sc-label">Машин за смену</div><div class="sc-value">—</div></div>
      <div class="stat-card"><div class="sc-label">Зарплаты (всего)</div><div class="sc-value">—</div></div>
      <div class="stat-card"><div class="sc-label">Остаток в кассе</div><div class="sc-value">—</div></div>
    </div>

    <div class="grid-2">
      <div class="panel">
        <div class="panel-head">
          <div class="panel-title">Машины за смену</div>
          <div class="panel-link" id="carsLink">Смотреть все →</div>
        </div>
        <table class="data" id="carsTable">
          <tr><th>Клиент</th><th>Сотрудник</th><th>Услуга</th><th>Оплата</th><th style="text-align:right">Сумма</th></tr>
        </table>
        <div id="carsEmpty" class="empty-note" style="display:none">Машин за сегодня ещё нет</div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <div class="panel-title">Зарплаты сотрудников</div>
          <div class="panel-link" id="workersLink">Все →</div>
        </div>
        <div id="workersList"></div>
        <div id="workersEmpty" class="empty-note" style="display:none">Пока нет данных за смену</div>
      </div>
    </div>
  </div>
</div>

<script src="/static/site-common.js"></script>
<script>
if (CW.requireAuth()) {
  CW.renderSidebar("dashboard");

  const empDotColors = ["#4E9BFF", "#3ED598", "#FFB648", "#A47CF3", "#FF6B8B", "#00C7BE"];
  function empColor(name) {
    let h = 0;
    for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) % empDotColors.length;
    return empDotColors[h];
  }

  function payTag(method) {
    const m = (method || "").toLowerCase();
    if (m.includes("виз") || m === "visa") return `<span class="pay-tag card">Visa</span>`;
    if (m.includes("безнал") || m === "transfer") return `<span class="pay-tag transfer">Безнал</span>`;
    if (m.includes("нал") || m === "cash") return `<span class="pay-tag cash">Нал</span>`;
    return `<span class="pay-tag transfer">${method || "—"}</span>`;
  }

  async function load() {
    const errEl = document.getElementById("errBanner");
    errEl.style.display = "none";

    const branch = CW.getActiveBranch();
    if (!branch) {
      errEl.textContent = "Филиал не выбран. Выберите филиал в сайдбаре.";
      errEl.style.display = "block";
      return;
    }

    document.getElementById("pageSub").textContent = `${branch} · ${CW.todayLabel()}`;
    document.getElementById("exportBtn").onclick = () => {
      CW.downloadFile(`/api/reports/pdf?branch=${encodeURIComponent(branch)}`, `Касса_${branch}.pdf`).catch(e => (typeof showErr === "function" ? showErr(e.message) : alert(e.message)));
    };
    document.getElementById("addCarBtn").onclick = () => { window.location.href = "/static/cars.html"; };
    document.getElementById("carsLink").onclick = () => { window.location.href = "/static/cars.html"; };
    document.getElementById("workersLink").onclick = () => { window.location.href = "/static/workers.html"; };

    try {
      const data = await CW.authFetch(`/api/session?branch=${encodeURIComponent(branch)}`);
      const session = data.session || {};
      const summary = data.summary || {};
      const cars = session.cars || [];

      const totalSalaries = Object.values(summary.washer_salaries || {}).reduce((a, b) => a + b, 0)
        + (summary.admin_salary || 0);

      const statRow = document.getElementById("statRow");
      statRow.innerHTML = `
        <div class="stat-card">
          <div class="sc-label">Дневная выручка</div>
          <div class="sc-value">${CW.money(summary.grand_total)}</div>
        </div>
        <div class="stat-card">
          <div class="sc-label">Машин за смену</div>
          <div class="sc-value">${cars.length}</div>
        </div>
        <div class="stat-card">
          <div class="sc-label">Зарплаты (всего)</div>
          <div class="sc-value">${CW.money(totalSalaries)}</div>
        </div>
        <div class="stat-card">
          <div class="sc-label">Остаток в кассе</div>
          <div class="sc-value">${CW.money(summary.remainder)}</div>
          <div class="sc-delta muted">после расходов</div>
        </div>
      `;

      const table = document.getElementById("carsTable");
      const carsEmpty = document.getElementById("carsEmpty");
      if (!cars.length) {
        table.style.display = "none";
        carsEmpty.style.display = "block";
      } else {
        table.style.display = "table";
        carsEmpty.style.display = "none";
        const rows = cars.slice().reverse().slice(0, 8).map(c => `
          <tr>
            <td>${c.car || "—"}</td>
            <td><div class="emp-cell"><span class="emp-dot" style="background:${empColor(c.employee || "")}"></span>${c.employee || "—"}</div></td>
            <td>${c.service || "—"}</td>
            <td>${payTag(c.payment_split ? Object.keys(c.payment_split)[0] : c.payment)}</td>
            <td style="text-align:right;font-weight:600">${CW.money(c.price)}</td>
          </tr>
        `).join("");
        table.innerHTML = `<tr><th>Клиент</th><th>Сотрудник</th><th>Услуга</th><th>Оплата</th><th style="text-align:right">Сумма</th></tr>${rows}`;
      }

      const workersList = document.getElementById("workersList");
      const workersEmpty = document.getElementById("workersEmpty");
      const salaries = summary.washer_salaries || {};
      const totals = summary.washer_totals || {};
      const names = Object.keys(salaries);

      let workersHtml = names.map(name => {
        const color = empColor(name);
        return `
          <div class="worker-row">
            <div class="worker-av" style="background:${color}26;color:${color}">${CW.initials(name)}</div>
            <div class="worker-info">
              <div class="worker-name">${name}</div>
              <div class="worker-meta">Намыл ${CW.money(totals[name] || 0)}</div>
            </div>
            <div class="worker-sal">${CW.money(salaries[name])}</div>
          </div>
        `;
      }).join("");

      if (summary.admin_salary) {
        const adminName = session.admin_name || "Администратор";
        workersHtml += `
          <div class="worker-row">
            <div class="worker-av" style="background:var(--purple-tint);color:var(--purple)">${CW.initials(adminName)}</div>
            <div class="worker-info">
              <div class="worker-name">${adminName}</div>
              <div class="worker-meta">${session.admin_name ? "Дежурный админ · % от оборота" : "Администратор не назначен · % от оборота"}</div>
            </div>
            <div class="worker-sal">${CW.money(summary.admin_salary)}</div>
          </div>
        `;
      }

      if (!names.length && !summary.admin_salary) {
        workersList.style.display = "none";
        workersEmpty.style.display = "block";
      } else {
        workersList.style.display = "block";
        workersEmpty.style.display = "none";
        workersList.innerHTML = workersHtml;
      }
    } catch (e) {
      errEl.textContent = e.message || "Не удалось загрузить данные";
      errEl.style.display = "block";
    }
  }

  load();
}
</script>
</body>
</html>
