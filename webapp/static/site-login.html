<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CarWash Cloud — вход</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<link rel="stylesheet" href="/static/site-theme.css">
<style>
:root{
  --bg:#08090C; --surface-1:#15171D; --surface-2:#1D1F27; --surface-3:#262832;
  --text:#F4F5F7; --text-secondary:#9096A3; --text-muted:#5E6270;
  --border:rgba(255,255,255,0.08); --border-strong:rgba(255,255,255,0.14);
  --accent:#7C6CF6; --accent-b:#4E9BFF; --accent-tint:rgba(124,108,246,0.14);
  --red:#FF6B8B; --red-tint:rgba(255,107,139,0.13);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display",Segoe UI,Roboto,sans-serif;
  background:
    radial-gradient(circle at 15% 10%, rgba(124,108,246,0.12), transparent 40%),
    radial-gradient(circle at 90% 20%, rgba(78,155,255,0.08), transparent 45%),
    var(--bg);
  color:var(--text); min-height:100vh;
  display:flex; align-items:center; justify-content:center; -webkit-font-smoothing:antialiased;
}
.card{
  width:380px; background:var(--surface-1); border:0.5px solid var(--border);
  border-radius:18px; padding:28px 26px;
}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:22px}
.brand-icon{
  width:34px;height:34px;border-radius:9px;
  background:linear-gradient(135deg,var(--accent) 0%,var(--accent-b) 100%);
  box-shadow:0 4px 14px rgba(124,108,246,0.35);
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:17px;flex-shrink:0;
}
.brand-name{font-size:16px;font-weight:700;letter-spacing:-0.01em}
h1{font-size:19px;font-weight:700;margin-bottom:4px}
.sub{font-size:12.5px;color:var(--text-secondary);margin-bottom:20px}
label{font-size:11.5px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em;display:block;margin:14px 0 6px}
input,select{
  width:100%;height:42px;border-radius:10px;background:var(--surface-2);
  border:0.5px solid var(--border-strong);color:var(--text);font-size:14px;
  padding:0 12px;font-family:inherit;
}
input:focus,select:focus{outline:none;border-color:var(--accent)}
.roles{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:6px}
.role-btn{
  height:40px;border-radius:10px;background:var(--surface-2);border:0.5px solid var(--border-strong);
  color:var(--text-secondary);font-size:12.5px;font-weight:600;cursor:pointer;
}
.role-btn.active{background:var(--accent-tint);color:var(--accent);border-color:var(--accent)}
.btn-submit{
  width:100%;height:44px;border-radius:10px;border:none;
  background:linear-gradient(135deg,var(--accent),var(--accent-b));color:#fff;
  box-shadow:0 4px 14px rgba(124,108,246,0.3);
  font-size:14px;font-weight:700;margin-top:20px;cursor:pointer;
}
.btn-submit:disabled{opacity:.5;cursor:default}
.error{
  margin-top:12px;background:var(--red-tint);color:var(--red);font-size:12.5px;
  padding:9px 12px;border-radius:9px;display:none;
}
.branch-field{display:none}
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <div class="brand-icon"><i class="ti ti-droplet"></i></div>
    <div class="brand-name">CarWash Cloud</div>
  </div>
  <h1>Вход</h1>
  <div class="sub">Общий пароль компании + ваше имя и должность</div>

  <label>Пароль</label>
  <input type="password" id="password" placeholder="Общий пароль">

  <label>Ваше имя</label>
  <input type="text" id="name" placeholder="Например, Иван">

  <label>Должность</label>
  <div class="roles">
    <button type="button" class="role-btn" data-role="мойщик">Мойщик</button>
    <button type="button" class="role-btn" data-role="админ">Админ</button>
    <button type="button" class="role-btn" data-role="владелец">Владелец</button>
  </div>

  <div class="branch-field" id="branchField">
    <label>Филиал</label>
    <select id="branch"><option value="">Загрузка…</option></select>
  </div>

  <button class="btn-submit" id="submitBtn">Войти</button>
  <div class="error" id="err"></div>
</div>

<script>
const API = ""; // тот же хост, что и сайт (FastAPI отдаёт и статику, и API)
let role = "";

document.querySelectorAll(".role-btn").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    document.querySelectorAll(".role-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    role = btn.dataset.role;
    document.getElementById("branchField").style.display = role === "владелец" ? "none" : "block";
  });
});

// подгружаем список филиалов для выбора (публичный справочник)
fetch(API + "/api/config").then(r=>r.json()).then(cfg=>{
  const sel = document.getElementById("branch");
  sel.innerHTML = cfg.branches.map(b=>`<option value="${b}">${b}</option>`).join("");
}).catch(()=>{});

document.getElementById("submitBtn").addEventListener("click", async ()=>{
  const password = document.getElementById("password").value;
  const name = document.getElementById("name").value.trim();
  const branch = document.getElementById("branch").value;
  const errEl = document.getElementById("err");
  errEl.style.display = "none";

  if(!password || !name || !role){
    errEl.textContent = "Заполните пароль, имя и выберите должность";
    errEl.style.display = "block";
    return;
  }

  try{
    const res = await fetch(API + "/api/site/login", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({password, name, role, branch})
    });
    const data = await res.json();
    if(!res.ok){
      errEl.textContent = data.detail || "Ошибка входа";
      errEl.style.display = "block";
      return;
    }
    localStorage.setItem("cw_token", data.token);
    localStorage.setItem("cw_name", data.name);
    localStorage.setItem("cw_role", data.role);
    localStorage.setItem("cw_branch", data.branch || "");
    window.location.href = "/static/dashboard.html";
  }catch(e){
    errEl.textContent = "Не удалось связаться с сервером";
    errEl.style.display = "block";
  }
});
</script>
</body>
</html>
